<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-140 Quiz — Azure Virtual Desktop</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2236;--border:#1e3a5f;--accent:#0078d4;--accent2:#00b4d8;--accent3:#38bdf8;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;--radius:10px;--glow:0 0 20px rgba(0,120,212,.25)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,120,212,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,120,212,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.app{position:relative;z-index:1}
.header{background:linear-gradient(135deg,#0a0e1a,#0d1d3a);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;box-shadow:var(--glow);flex-shrink:0}
.logo-text{display:flex;flex-direction:column}
.logo-title{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px;line-height:1.1}
.logo-sub{font-size:10px;color:var(--accent3);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}
.header-stats{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;font-family:var(--mono);color:var(--text2);display:flex;align-items:center;gap:5px}
.stat-pill .val{color:var(--accent3);font-weight:700}
.progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:20px;height:7px;width:160px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:20px;transition:width .4s;box-shadow:0 0 8px rgba(0,180,216,.5)}
.main{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 62px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:18px 14px;overflow-y:auto;height:calc(100vh - 62px);position:sticky;top:62px}
.sidebar-title{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:12px;padding-left:3px}
.q-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-bottom:18px}
.q-dot{aspect-ratio:1;border-radius:4px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:8px;font-family:var(--mono);color:var(--text3)}
.q-dot:hover{border-color:var(--accent);color:var(--accent3)}
.q-dot.current{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:var(--glow)}
.q-dot.correct{background:rgba(34,197,94,.15);border-color:var(--success);color:var(--success)}
.q-dot.wrong{background:rgba(239,68,68,.15);border-color:var(--danger);color:var(--danger)}
.q-dot.flagged{background:rgba(245,158,11,.15);border-color:var(--warning);color:var(--warning)}
.q-dot.casestudy{border-style:dashed}
.sidebar-legend{display:flex;flex-direction:column;gap:5px;padding:10px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--text2);font-family:var(--mono)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.content{padding:28px;max-width:860px;margin:0 auto;width:100%}
.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.q-number{font-family:var(--mono);font-size:11px;color:var(--accent3);text-transform:uppercase;letter-spacing:1px}
.q-badges{display:flex;gap:7px;align-items:center}
.badge{padding:3px 9px;border-radius:20px;font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;border:1px solid}
.badge-mc{background:rgba(0,120,212,.1);border-color:var(--accent);color:var(--accent3)}
.badge-hotspot{background:rgba(139,92,246,.1);border-color:#8b5cf6;color:#a78bfa}
.badge-dragdrop{background:rgba(245,158,11,.1);border-color:var(--warning);color:var(--warning)}
.badge-cs{background:rgba(16,185,129,.1);border-color:#10b981;color:#34d399}
.flag-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 9px;cursor:pointer;font-size:12px;color:var(--text3);transition:all .15s}
.flag-btn:hover{border-color:var(--warning);color:var(--warning)}
.flag-btn.flagged{border-color:var(--warning);color:var(--warning);background:rgba(245,158,11,.1)}
/* SCENARIO BOX */
.scenario-box{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.3);border-radius:10px;margin-bottom:18px;overflow:hidden}
.scenario-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.scenario-title{font-size:12px;font-weight:700;color:#34d399;font-family:var(--mono);display:flex;align-items:center;gap:8px}
.scenario-toggle{font-size:11px;color:var(--text3);font-family:var(--mono)}
.scenario-body{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s}
.scenario-body.open{max-height:1000px;padding:12px 16px}
.scenario-text{font-size:12px;line-height:1.7;color:var(--text2);white-space:pre-wrap}
.scenario-text strong{color:var(--text)}
/* CARD */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.q-text{font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap;margin-bottom:20px}
/* OPTIONS */
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;font-size:13px;line-height:1.5;color:var(--text2)}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(0,120,212,.08);color:var(--text)}
.option.selected{border-color:var(--accent);background:rgba(0,120,212,.12);color:var(--text)}
.option.correct{border-color:var(--success);background:rgba(34,197,94,.1);color:var(--text)}
.option.wrong{border-color:var(--danger);background:rgba(239,68,68,.1)}
.option.disabled{cursor:default}
.option-key{width:24px;height:24px;border-radius:5px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s}
.option.selected .option-key{background:var(--accent);border-color:var(--accent);color:#fff}
.option.correct .option-key{background:var(--success);border-color:var(--success);color:#fff}
.option.wrong .option-key{background:var(--danger);border-color:var(--danger);color:#fff}
/* HOTSPOT */
.subquestions{display:flex;flex-direction:column;gap:18px}
.subq{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px}
.subq-label{font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.subq-options{display:flex;flex-direction:column;gap:7px}
.subq-option{padding:9px 13px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s;display:flex;align-items:center;gap:9px}
.subq-option:hover:not(.disabled){border-color:var(--accent);color:var(--text)}
.subq-option.selected{border-color:var(--accent);background:rgba(0,120,212,.12);color:var(--text)}
.subq-option.correct{border-color:var(--success);background:rgba(34,197,94,.1);color:var(--text)}
.subq-option.wrong{border-color:var(--danger);background:rgba(239,68,68,.1)}
.subq-option.disabled{cursor:default}
.subq-radio{width:15px;height:15px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;transition:all .15s}
.subq-option.selected .subq-radio{border-color:var(--accent);background:var(--accent)}
.subq-option.correct .subq-radio{border-color:var(--success);background:var(--success)}
.subq-option.wrong .subq-radio{border-color:var(--danger);background:var(--danger)}
/* DRAG DROP */
.dragdrop-container{display:flex;gap:18px;flex-wrap:wrap}
.dd-col{flex:1;min-width:190px}
.dd-col-title{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:9px}
.dd-actions{display:flex;flex-direction:column;gap:5px}
.dd-item{padding:9px 13px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:space-between;gap:7px;user-select:none}
.dd-item:hover:not(.disabled):not(.placed){border-color:var(--accent);color:var(--text)}
.dd-item.placed{opacity:.35;cursor:default}
.dd-item.disabled{cursor:default}
.dd-answer-slot{padding:9px 13px;background:var(--bg);border:1.5px dashed var(--border);border-radius:8px;font-size:12px;color:var(--text3);min-height:40px;display:flex;align-items:center;justify-content:space-between;gap:7px;margin-bottom:5px;transition:all .15s}
.dd-answer-slot.filled{background:rgba(0,120,212,.08);border:1.5px solid var(--accent);color:var(--text)}
.dd-answer-slot.correct{border-color:var(--success);background:rgba(34,197,94,.08);color:var(--text)}
.dd-answer-slot.wrong{border-color:var(--danger);background:rgba(239,68,68,.08)}
.dd-slot-num{width:20px;height:20px;border-radius:4px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-family:var(--mono);font-weight:700;color:var(--text3);flex-shrink:0}
.dd-remove{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 4px;border-radius:3px}
.dd-remove:hover{color:var(--danger)}
/* FEEDBACK */
.feedback{margin-top:18px;padding:14px 18px;border-radius:10px;display:flex;gap:11px;align-items:flex-start;font-size:12px;line-height:1.5;animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.feedback.correct{background:rgba(34,197,94,.1);border:1px solid var(--success);color:#86efac}
.feedback.wrong{background:rgba(239,68,68,.1);border:1px solid var(--danger);color:#fca5a5}
.feedback-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.feedback strong{display:block;margin-bottom:2px}
/* CONTROLS */
.controls{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-top:20px}
.controls-left,.controls-right{display:flex;gap:9px}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:7px}
.btn:disabled{opacity:.3;cursor:default}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(0,120,212,.35)}
.btn-primary:hover:not(:disabled){box-shadow:0 6px 20px rgba(0,120,212,.5);transform:translateY(-1px)}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid transparent}
.btn-ghost:hover:not(:disabled){border-color:var(--border);color:var(--text2)}
.btn-success{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff}
/* SCORE */
.score-screen{padding:48px 28px;max-width:680px;margin:0 auto;text-align:center}
.score-ring{width:170px;height:170px;border-radius:50%;background:conic-gradient(var(--accent) calc(var(--pct)*3.6deg),var(--surface2) 0);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;box-shadow:0 0 40px rgba(0,120,212,.3);position:relative}
.score-ring::before{content:'';position:absolute;inset:15px;background:var(--bg);border-radius:50%}
.score-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
.score-pct{font-size:40px;font-weight:800;color:var(--accent3);line-height:1}
.score-label{font-size:11px;font-family:var(--mono);color:var(--text3);margin-top:3px}
.score-title{font-size:26px;font-weight:800;margin-bottom:7px}
.score-sub{font-size:14px;color:var(--text2);margin-bottom:28px}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.score-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
.score-stat-val{font-size:30px;font-weight:800;margin-bottom:4px}
.score-stat-lbl{font-size:11px;font-family:var(--mono);color:var(--text3)}
/* WELCOME */
.welcome{padding:50px 28px;max-width:680px;margin:0 auto;text-align:center}
.welcome-badge{display:inline-block;background:rgba(0,120,212,.15);border:1px solid var(--accent);border-radius:20px;padding:5px 14px;font-size:10px;font-family:var(--mono);color:var(--accent3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:22px}
.welcome h1{font-size:36px;font-weight:800;line-height:1.1;margin-bottom:14px;background:linear-gradient(135deg,var(--text),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome-sub{font-size:15px;color:var(--text2);margin-bottom:32px;line-height:1.6}
.welcome-stats{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:36px}
.welcome-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 22px;min-width:100px}
.welcome-stat-val{font-size:26px;font-weight:800;color:var(--accent3)}
.welcome-stat-lbl{font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:2px}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.mode-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;text-align:left;transition:all .2s}
.mode-card:hover,.mode-card.selected{border-color:var(--accent);box-shadow:var(--glow)}
.mode-card.selected{background:rgba(0,120,212,.08)}
.mode-card-title{font-size:13px;font-weight:700;margin-bottom:4px}
.mode-card-desc{font-size:11px;color:var(--text3)}
.mode-icon{font-size:22px;margin-bottom:7px}
.count-btn{padding:10px 20px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;min-width:72px}
.count-btn:hover{border-color:var(--accent);color:var(--text)}
.count-btn.count-active{border-color:var(--accent);background:rgba(0,120,212,.15);color:var(--accent3);box-shadow:0 0 12px rgba(0,120,212,.25)}
.count-selector-hidden{opacity:.35;pointer-events:none}
@media(max-width:768px){.main{grid-template-columns:1fr}.sidebar{display:none}.content{padding:16px}.score-grid{grid-template-columns:1fr 1fr}.mode-cards{grid-template-columns:1fr}.welcome h1{font-size:26px}}
</style>
</head>

<div class="app" id="app"></div>
<script>
const ALL_QUESTIONS = [{"id":3,"type":"mc","question":"Dispone de the devices shown in the following table.\n\nPlanea deploy Azure Virtual Desktop for client access to remove virtualized apps.\n¿Cuál devices support the cliente de Escritorio remoto?","options":{"A":"Device1 and Device2 only","B":"Device1 and Device3 only","C":"Device1, Device2, and Device3","D":"Device1 only"},"answer":"B"},{"id":4,"type":"hotspot","question":"Planea deploy Azure Virtual Desktop. Users have the following devices:\n• Tablet: Windows 10 Pro\n• Phone: Android\n• Laptop: macOS\n\nFrom which device types can users connect to Azure Virtual Desktop resources?","subquestions":[{"label":"cliente de Escritorio remoto app","options":["Tablet only","Tablet and phone only","Tablet and laptop only","Tablet, phone, and laptop"],"answer":"Tablet, phone, and laptop"},{"label":"cliente web de Escritorio remoto","options":["Tablet only","Tablet and phone only","Tablet and laptop only","Tablet, phone, and laptop"],"answer":"Tablet and laptop only"}]},{"id":5,"type":"hotspot","question":"Dispone de an Azure Virtual Desktop implementación. Planea create the following grupo de hostss:\n• Pool1: Directly assigned to graphics dept users, heavy graphic rendering and compute-intensive apps, must support premium storage\n• Pool2: Pooled for ~10 users, runs Microsoft Office 365 apps, requires calling/meeting features in Teams, must support premium storage\n\nNecesita recommend the máquina virtual size for each grupo de hosts. La solución debe minimizar los costos.","subquestions":[{"label":"Pool1","options":["Av2-series","Dsv4-series","NVv3-series"],"answer":"NVv3-series"},{"label":"Pool2","options":["Av2-series","Dsv4-series","NVv3-series"],"answer":"Dsv4-series"}]},{"id":6,"type":"mc","question":"You plan to deploy Azure Virtual Desktop to meet the department requirements shown in the following table.\n\nYou plan to use Azure Virtual Desktop grupo de hostss with equilibrio de carga and autoscaling.\nYou need  to a shared folder in storage2.","C":"From SIG1, update the replicación for the latest versión de imagen of Image1.","D":"Configure con redundancia geográfica storage (GRS) replicación for storage1. Copy the VHD file of Image1 to the FSLogix contenedor de perfiles."},"answer":"B"},{"id":10,"type":"mc","question":"You have an Azure Virtual Desktop grupo de hosts named Pool1 in the East US region.\nYou have a cuenta de almacenamiento named storage1 that contains FSLogix contenedor de perfiless. In the East US region, you\nhave a galería de imágenes compartidas named SIG1 that contains a máquina virtual image named Image1. Image1 is used to\ncreate new host de sesións in Pool1.\nYou plan to deploy a new Azure Virtual Desktop grupo de hosts named Pool2 to the South India region.\nYou need to implement a host de sesión implementación solution for Pool2 that meets the following requirements:\n✑ Image1 must replicate in the South India region.\n✑ The host de sesións in Pool2 must be based on Image1.\n✑ Changes to Image1 must be available in the South India and East US regions.\nWhat should you include in the solution?","options":{"A":"Create a new galería de imágenes compartidas named SIG2 in the South India region. Upload a copy of Image1 to SIG2.","B":"Create a new Azure Storage account named storage2 in the South India region. Copy Image1 to a shared folder in storage2.","C":"From SIG1, update the replication for the latest versión de imagen of Image1.","D":"Configure geo-redundant storage (GRS) replication for storage1. Copy the VHD file of Image1 to the FSLogix contenedor de perfiles."},"answer":"C"},{"id":11,"type":"hotspot","question":"Dispone de an local (on-premises) network. All users have computers that run Windows 10 Pro. Planea deploy Azure Virtual Desktop to meet the following department requirements:\n• Research: Run an application that can only run on Windows Server. The application will be publicared as a RemoteApp.\n• Finance: Run Windows 10 Enterprise m 1.\nNecesita ensure that the members of Group1 can store the FSLogix contenedor de perfiless in share1. The solution\nmust use the principle of least privilege.\n¿Cuál two privileges should you assign to Group1? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.","options":{"A":"the Storage Blob Data Contributor role for storage1","B":"the List folder / read data NTFS permissions for share1","C":"the Modify NTFS permissions for share1","D":"the Storage File Data SMB Share Reader role for storage1","E":"the Storage File Data SMB Share Elevated Contributor role for storage1","F":"the Storage File Data SMB Share Contributor role for storage1"},"answer":"C"},{"id":72,"type":"hotspot","question":"Dispone de una implementación de Azure Virtual Desktop con un área de trabajo llamada Workspace1 y un usuario llamado User1. Workspace1 contiene un grupo de aplicaciones de escritorio llamado Pool1Desktop.\nA las 09:00, crea una directiva de Acceso condicional con las siguientes configuraciones:\n• Usuarios y grupos: User1\n• Aplicaciones en la nube: Azure Virtual Desktop\n• Condiciones: 0 condiciones seleccionadas\n• Controles de acceso:\n  - Conceder: Conceder acceso, Requerir MFA\n  - Sesiones: Frecuencia de inicio de sesión: 1 hora\n\nUser1 realiza las siguientes acciones:\n• 09:10 → Abre el cliente de Escritorio remoto y se suscribe a Workspace1\n• 09:20 → Se conecta a Pool1Desktop\n• 11:10 → Cierra sesión de Pool1Desktop y cierra el cliente\n• 12:30 → Abre el cliente de Escritorio remoto\n• 13:50 → Se conecta a Pool1Desktop\n\nPara cada afirmación, seleccione Sí si es verdadera. De lo contrario, seleccione No.","subquestions":[{"label":"A User1 se le solicita MFA a las 09:10.","options":["Sí","No"],"answer":"Sí"},{"label":"A User1 se le solicita MFA a las 09:20.","options":["Sí","No"],"answer":"No"},{"label":"A User1 se le solicita MFA a las 13:50.","options":["Sí","No"],"answer":"Sí"}]},{"id":73,"type":"mc","question":"You ":"mc","question":"Dispone de an Azure Virtual Desktop implementación that contains five host de sesións.\nDispone de users that work from offices in Seattle and Vancouver. The users connect to the host de sesións over the\ninternet.\nNecesita ensure that the users can connect to the host de sesións from only the Seattle and Vancouver offices.\nWhat should you use?\nA.Acceso condicional\nB.RDP Shortpath\nC.a grupo de seguridad de red (NSG)\nD.Azure Firewall","options":{"A":"Acceso condicional","B":"RDP Shortpath","C":"a grupo de seguridad de red (NSG)","D":"Azure Firewall"},"answer":"A"},{"id":109,"type":"mc","question":"You have an Azure suscripción that contains two users named User1 and User2 and the Microsoft Entra groups\nshown in the following table.\n\nYou have an Azure Virtual Desktop grupo de hosts named Pool1 that contains two host de sesións named Host1 and Host2.\nThe host de sesións use FSLogix user profiles.\nHost1 contains the local groups shown in the following table.\n\nHost2 contains the local groups shown in the following table.\n\nUser1 connects to Pool and modifies his desktop.\nUser1 reports that when he reconnects to Pool, the desktop modifications fail to appear.\nYou need to ensure that User1 sees the modified desktop when he connects to Pool. The solution must minimize\nthe impact on other user profiles.\n¿Qué debería hacer?\nA.Add User1 to both FSLogix Profile Include list groups.\nB.Remove Group2 from both FSLogix Profile Exclude list groups.\nC.Remove User1 from Group3.\nD.Remove Group3 from Group2.","options":{"A":"Add User1 to both FSLogix Profile Include list groups.","B":"Remove Group2 from both FSLogix Profile Exclude list groups.","C":"Remove User1 from Group3.","D":"Remove Group3 from Group2."},"answer":"C"},{"id":110,"type":"hotspot","question":"Dispone de una implementación de Azure Virtual Desktop. Los usuarios se conectan a los hosts de sesión mediante dispositivos inscritos en Microsoft Intune. Necesita crear una directiva de Acceso condicional llamada Policy1 con los siguientes requisitos:\n• Requerir autenticación multifactor (MFA)\n• Requerir que los dispositivos estén marcados como compatibles\n\n¿Qué configuraciones de Policy1 debe ajustar para cada requisito?","subquestions":[{"label":"Requerir MFA:","options":["Plataformas de dispositivo en Condiciones","Conceder","Sesión","Recursos de destino"],"answer":"Conceder"},{"label":"Requerir que los dispositivos estén marcados como compatibles:","options":["Plataformas de dispositivo en Condiciones","Conceder","Sesión","Recursos de destino"],"answer":"Conceder"}]},{"id":113,"type":"mc","question":"Your local (on-premises) network contains an Active Directory Domain Services (AD DS) domain named corp.contoso.com.\nThe domain contains two users named User1 and User2.\nYou have a Microsoft Entra tenant named contoso.com that contains a user named User3 and syncs with\ncorp.contoso.com.\nThe sync status of the users is shown in the following table.\n\nYou have an Azure Virtual Desktop implementación that contains Microsoft Entra joined host de sesións.\nYou create an Azure Storage account that has the following configurations:\n•Name: storage1\n•Kind: FileStorage\n•File share: share1\n•Microsoft Entra Kerberos: Enabled\n\nYou need to implement FSLogix contenedor de perfiless on share1.\nFor which users can you implement a contenedor de perfiles?","options":{"A":"User1 only","B":"User2 only","C":"User1 and User2 only","D":"User2 and User3 only","E":"User1, User2, and User3"},"answer":"D"},{"id":114,"type":"mc","question":"You have an Azure suscripción that contains an Azure Virtual Desktop implementación and a Microsoft Entra Domain\nServices domain. The implementación contains 10 host de sesións that are joined to the domain.\nYou plan to deploy FSLogix contenedor de perfiless and store the containers in Azure.\nYou need to configure storage for the containers. The solution must ensure that you can assign share permissions\nto Microsoft Entra accounts.\n¿Cuáles dos actions should you perform? Cada respuesta correcta presenta parte de la solución.\nNOTE: Each correct selection is worth one point.","options":{"A":"From the Data storage settings of the cuenta de almacenamiento, enable an identity source.","B":"Attach a new virtual disk to each host de sesión.","C":"From the Configuration settings of the cuenta de almacenamiento, select Default to Microsoft Entra authorization in the Azure portal.","D":"Create a premium recurso compartido de archivoss cuenta de almacenamiento.","E":"Create a premium block blobs cuenta de almacenamiento."},"answer":"AC"},{"id":115,"type":"mc","question":"HOTSPOT\nYou have an Azure Virtual Desktop implementación.\nYou need to ensure that when users connect to the implementación, they must authenticate by using passwordless\nauthentication.\n¿Cuáles dos features should you configure? To answer, select the appropriate settings in the answer area.\nNOTE: Each correct selection is worth one point.\n\n\nQuestion: 116\n\nCase study This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to\ncomplete each case. However, there may be additional case studies and sections on this exam. You must manage\nyour time to ensure that you are able to complete all questions included on this exam in the time provided.\nTo answer the questions included in a case study, you will need to reference information that is provided in the\ncase study. Case studies might contain exhibits and other resources that provide more information about the\nscenario that is described in the case study. Each question is independent of the other questions in this case study.\nAt the end of this case study, a review screen will appear. This screen allows you to review your answers and to\nmake changes before you move to the next section of the exam. After you begin a new section, you cannot return\nto this section.\nTo start the case study To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore\nthe content of the case study before you answer the questions. Clicking these buttons displays information such\nas business requirements, existing environment, and problem statements. If the case study has an All Information\ntab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you\nare ready to answer a question, click the Question button to return to the question.\n\nOverview Northwind Traders is a manufacturing company based in New York City.\n\nExisting Environment Identity Environment The local (on-premises) network contains an Active Directory Domain Services (AD DS) domain named\nnorthwindtraders.com.\nNorthwind Traders has a Microsoft Entra tenant and a Microsoft Entra Domain Services managed domain. The\nnorthwindtraders.com domain syncs with the Microsoft Entra tenant.\nMáquina virtuals The company has an local (on-premises) Hyper-V máquina virtual named VM1 that has the following configurations:\n•Generation: 1\n•Disk size: 2 TB\n•Disk format: VHDX\n•Disk type: Dynamically expanding\nCloud Services Northwind Traders has a Microsoft 365 E5 suscripción. The suscripción contains 500 users that are assigned\nMicrosoft 365 E5 licenses.\nThe company has an Azure suscripción that contains the resources shown in the following table.\n\nBoth suscripcións are linked to the Microsoft Entra tenant.\n\nRequirements Planned Changes Northwind Traders identifies the following planned changes:\n•Deploy an Azure Virtual Desktop grupo de hosts that will contain 10 host de sesións joined to the Microsoft Entra Domain\nServices managed domain.\n•Configure VM1 as the source image for the Azure Virtual Desktop implementación and upload the image to Azure.\n•The Azure Virtual Desktop implementación will provide access to a custom app named App1.\nPerformance Requirements Northwind Traders identifies the following performance requirements:\n•Each Azure Virtual Desktop host de sesión must support 15 user sessions.\n•Each new user session must be assigned to a single host de sesión until the maximum session limit is reached for\nthat host.\nApplication Requirements Northwind Traders identifies the following application requirements:\n•Microsoft OneDrive must launch when users connect to a RemoteApp session in Azure Virtual Desktop.\n•App1 requires a desktop resolution of 1280 x 1024.\n•Administrative effort must be minimized.\nDisaster Recovery Requirements Northwind Traders identifies the following disaster recovery requirements for the Azure Virtual Desktop\nimplementación:\n•Minimize outages if an Azure region fails.\n•Minimize the recovery time objective (RTO).\n•Minimize administrative effort in the event of a failover.\nSecurity Requirements Northwind Traders identifies the following security requirements:\n•When users sign in to the Azure Virtual Desktop implementación by using the Azure Virtual Desktop client, they must\nauthenticate by using their Microsoft Entra username and password only.\n•When users sign in to the Azure Virtual Desktop implementación by using a web browser, they must authenticate by\nusing the Microsoft Authenticator app.\n•All the Azure Virtual Desktop host de sesións deployed by using the VM1 source image must be onboarded to\nMicrosoft Defender for Endpoint.\n•The client version and operating system used to connect to the host de sesións must be logged.\n•The solution must follow the principle of least privilege.\n\nNetworking Requirements The Azure Virtual Desktop host de sesións must be able to access the resources on the local (on-premises) network.\nUser Profile Requirements Northwind Traders identifies the following user profile requirements:\n•Users must be able to access share1 by using their Microsoft Entra account.\n•Azure Virtual Desktop user profiles must be managed by using FSLogix.\n•All user profiles must be stored in share1.\n¿Cuáles dos actions should you perform to meet the security requirements for Defender for Endpoint? Each correct\nanswer presents a complete solution.\nNOTE: Each correct selection is worth one point.\nA.Add a Defender for Endpoint onboarding script to VM1 and run the script at first startup.\nB.Use a Group Policy Object (GPO) to run an on boarding script from a shared location.\nC.Create an app attach image for the Azure Virtual Desktop implementación.\nD.Run a Defender for Endpoint onboarding script on VM1 before generalizing the VM1 source image.","options":{"A":"Add a Defender for Endpoint onboarding script to VM1 and run the script at first startup.","B":"Use a Group Policy Object (GPO) to run an on boarding script from a shared location.","C":"Create an app attach image for the Azure Virtual Desktop implementación.","D":"Run a Defender for Endpoint onboarding script on VM1 before generalizing the VM1 source image."},"answer":"AB"},{"id":116,"type":"mc","question":"Case study This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to\ncomplete each case. However, there may be additional case studies and sections on this exam. You must manage\nyour time to ensure that you are able to complete all questions included on this exam in the time provided.\nTo answer the questions included in a case study, you will need to reference information that is provided in the\ncase study. Case studies might contain exhibits and other resources that provide more information about the\nscenario that is described in the case study. Each question is independent of the other questions in this case study.\nAt the end of this case study, a review screen will appear. This screen allows you to review your answers and to\nmake changes before you move to the next section of the exam. After you begin a new section, you cannot return\nto this section.\nTo start the case study To display the first question in this case study, click the Next button. Use the must support 15 user sessions.\n•Each new user session must be assigned to a single host de sesión until the maximum session limit is reached for\nthat host.\nApplication Requirements Northwind Traders identifies the following application requirements:\n•Microsoft OneDrive must launch when users connect to a RemoteApp session in Azure Virtual Desktop.\n•App1 requires a desktop resolution of 1280 x 1024.\n•Administrative effort must be minimized.\nDisaster Recovery Requirements Northwind Traders identifies the following disaster recovery requirements for the Azure Virtual Desktop\nimplementación:\n•Minimize outages if an Azure region fails.\n•Minimize the recovery time objective (RTO).\n•Minimize administrative effort in the event of a failover.\nSecurity Requirements Northwind Traders identifies the following security requirements:\n•When users sign in to the Azure Virtual Desktop implementación by using the Azure Virtual Desktop client, they must\nauthenticate by using their Microsoft Entra username and password only.\n•When users sign in to the Azure Virtual Desktop implementación by using a web browser, they must authenticate by\nusing the Microsoft Authenticator app.\n•All the Azure Virtual Desktop host de sesións deployed by using the VM1 source image must be onboarded to\nMicrosoft Defender for Endpoint.\n•The client version and operating system used to connect to the host de sesións must be logged.\n•The solution must follow the principle of least privilege.\n\nNetworking Requirements The Azure Virtual Desktop host de sesións must be able to access the resources on the local (on-premises) network.\nUser Profile Requirements Northwind Traders identifies the following user profile requirements:\n•Users must be able to access share1 by using their Microsoft Entra account.\n•Azure Virtual Desktop user profiles must be managed by using FSLogix.\n•All user profiles must be stored in share1.\n¿Cuáles dos actions should you perform to meet the security requirements for Defender for Endpoint? Each correct\nanswer presents a complete solution.\nNOTE: Each correct selection is worth one point.\nA.Add a Defender for Endpoint onboarding script to VM1 and run the script at first startup.\nB.Use a Group Policy Object (GPO) to run an on boarding script from a shared location.\nC.Create an app attach image for the Azure Virtual Desktop implementación.\nD.Run a Defender for Endpoint onboarding script on VM1 before generalizing the VM1 source image.","options":{"A":"Add a Defender for Endpoint onboarding script to VM1 and run the script at first startup.","B":"Use a Group Policy Object (GPO) to run an on boarding script from a shared location.","C":"Create an app attach image for the Azure Virtual Desktop implementación.","D":"Run a Defender for Endpoint onboarding script on VM1 before generalizing the VM1 source image."},"answer":"AB"},{"id":119,"type":"hotspot","question":"Dispone de 20 hosts de sesión de Azure Virtual Desktop que ejecutan Windows 11. Necesita habilitar las siguientes características en los hosts de sesión:\n• Acceso controlado a carpetas\n• Protección basada en reputación\n\n¿Qué mosaico de Seguridad de Windows debe usar para habilitar cada característica?","subquestions":[{"label":"Acceso controlado a carpetas:","options":["Protección de cuentas","Control de aplicaciones y explorador","Seguridad del dispositivo","Firewall y protección de red","Protección contra virus y amenazas"],"answer":"Protección contra virus y amenazas"},{"label":"Protección basada en reputación:","options":["Protección de cuentas","Control de aplicaciones y explorador","Seguridad del dispositivo","Firewall y protección de red","Protección contra virus y amenazas"],"answer":"Control de aplicaciones y explorador"}]},{"id":120,"type":"dragdrop","question":"Dispone de una suscripción de Azure con recursos: storage1 (cuenta de almacenamiento con recurso compartido share1 que almacena contenedores de perfiles FSLogix) y Vault1 y Vault2 (almacenes de Recovery Services). share1 se realiza una copia de seguridad una vez al día en Vault1. Necesita realizar una copia de seguridad de share1 en Vault2. ¿Cuáles tres acciones debe realizar en secuencia?","actions":["Detener la protección de share1 en Vault1 y eliminar los datos de copia de seguridad","Detener la protección de share1 en Vault1 y conservar los datos de copia de seguridad","Anular el registro de storage1 de Vault1","Registrar storage1 en Vault2","Configurar la copia de seguridad de share1 en Vault2"],"answer":["Detener la protección de share1 en Vault1 y eliminar los datos de copia de seguridad","Anular el registro de storage1 de Vault1","Registrar storage1 en Vault2"]},{"id":121,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación.\nYou publicar a RemoteApp named AppVersion1.\nYou need AppVersion1 to appear in the cliente de Escritorio remoto as Sales Contact Application.\n¿Cuál PowerShell cmdlet should you use?","options":{"A":"New-AzADApplication","B":"Update-AzWvdApplicationGroup","C":"Register-AzWvdApplicationGroup","D":"Update-AzWvdApplication"},"answer":"D"},{"id":122,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación that contains the following:\n✑ A grupo de hosts named Pool1\n✑ Two host de sesións named Host1 and Host2\n✑ An grupo de aplicaciones named RemoteGrupoAplicaciones1 that contains a RemoteApp named App1\nNecesita prevent users from copying and pasting between App1 and their local device.\n¿Qué debería hacer?","options":{"A":"Create an AppLocker policy.","B":"Modify the locks of RemoteGrupoAplicaciones1.","C":"Assign the Desktop Virtualization Reader role for Pool1 to the users.","D":"Modify the RDP Properties of Pool1."},"answer":"D"},{"id":124,"type":"mc","question":"Dispone de an Azure Virtual Desktop grupo de hosts that contains two host de sesións. The Microsoft Teams client is\ninstalled on each host de sesión.\nDetecta that only the Microsoft Teams chat and collaboration features work. The calling and meeting features\nare disabled.\nNecesita ensure that users can set the calling and meeting features from within Microsoft Teams.\n¿Qué debería hacer?","options":{"A":"Install the Escritorio remoto WebRTC Redirector Service.","B":"Configure Remote audio mode in the RDP Properties.","C":"Install the Teams Meeting add-in for Outlook.","D":"Configure audio input redirection."},"answer":"A"},{"id":125,"type":"mc","question":"Dispone de an Azure Virtual Desktop grupo de hosts that contains 20 Windows 10 Enterprise multi-host de sesións.\n\nUsers connect to the Azure Virtual Desktop implementación from computers that run Windows 10.\nPlanea implement FSLogix Application Masking.\nNecesita deploy Application Masking rule sets. La solución debe minimizar administrative effort.\nTo where should you copy the rule sets?","options":{"A":"the FSLogix contenedor de perfiles of each user","B":"C:\\Program Files\\FSLogix\\Apps\\Rules on every Windows 10 computer","C":"C:\\Program Files\\FSLogix\\Apps\\Rules on every host de sesión"},"answer":"C"},{"id":126,"type":"mc","question":"Dispone de an Azure Virtual Desktop grupo de hosts named Pool1.\nEstá troubleshooting an issue for a cliente de Escritorio remoto that stopped responding.\nNecesita restore the default cliente de Escritorio remoto settings and unsubscribe from all área de trabajos.\n¿Cuál command should you run?","options":{"A":"msrdcw","B":"resetengine","C":"mstsc","D":"resetpluginhost"},"answer":"A"},{"id":127,"type":"mc","question":"Your network contains an local (on-premises) Active Directory domain and an Azure Virtual Desktop implementación. The\ncomputer accounts for all the host de sesións are in an unidad organizativa (OU) named WVDHostsOU. All user\naccounts are in an OU named CorpUsers.\nA domain administrator creates a Group Policy Object (GPO) named Policy1 that only contains user settings. The\nadministrator links Policy1 to WVDHostsOU.\nDetecta that when users sign in to the host de sesións, none of the settings from Policy1 are applied.\nWhat should you configure to apply GPO settings to the users when they sign in to the host de sesións?","options":{"A":"loopback processing","B":"FSLogix profiles","C":"mandatory Roaming User Profiles","D":"restricted groups"},"answer":"A"},{"id":128,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación.\nNecesita provide external users with access to the implementación. The external users have computers that run\nWindows 10 Pro and Windows 10 Enterprise. The users do not have the ability to install applications.\n¿Qué debería recomendar that the users use to connect to the implementación?","options":{"A":"Microsoft Edge","B":"RemoteApp and Desktop Connection","C":"Escritorio remoto Manager","D":"Escritorio remoto Connection"},"answer":"A"},{"id":130,"type":"mc","question":"Implementa multiple Azure Virtual Desktop host de sesións that have only private IP addresses.\nNecesita ensure that administrators can initiate an RDP session to the host de sesións by using the Azure portal.\nWhat should you implement?","options":{"A":"Escritorio remoto Connection Broker (RD Connection Broker)","B":"Azure Application Puerta de enlace","C":"Azure Bastion","D":"Escritorio remoto Host de sesión (RD Host de sesión)"},"answer":"C"},{"id":131,"type":"mc","question":"Dispone de an Azure Virtual Desktop grupo de hosts named Pool1. Pool1 contains host de sesións that have a third-party\napplication named App1. App1 is publicared by using a RemoteApp group.\nA new MSI-based version of App1 is installed each month to each host. The name of the executable file is different\nfor each version of App1.\nNecesita automate the process of making a new version of App1 available via RemoteApp. The process must\nensure that the user experience remains the same when launching the application from the Windows Desktop\nclient.\n¿Cuál two cmdlets should you run? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.","options":{"A":"Remove-AzWvdApplication","B":"New-AzWvdApplication","C":"New-AzWvdApplicationGroup","D":"New-AzWvdMsixPackage","E":"New-AzRoleAssignment","F":"Remove-AzWvdMsixPackage"},"answer":"A"},{"id":132,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación.\nNecesita recommend a solution to run containerized applications without installing the applications on the\nhost de sesións.\nWhat should you include in the recommendation?","options":{"A":"EXE applications","B":"MSI packages","C":"APPX app packages","D":"MSIX app packages"},"answer":"D"},{"id":133,"type":"hotspot","question":"Dispone de un grupo de hosts de Azure Virtual Desktop llamado Pool1 y una cuenta de almacenamiento llamada storage1 en la misma región. La utilización de red de los hosts de sesión durante las horas pico es del 95%. Planea usar contenedores de perfiles FSLogix almacenados en storage1 para los usuarios de Pool1. Necesita configurar una estrategia de almacenamiento para los contenedores de perfiles.\n\nPara cada afirmación, seleccione la opción correcta.","subquestions":[{"label":"Para minimizar el impacto en el rendimiento de la red, debería usar:","options":["Cloud Cache","perfil VHD directo"],"answer":"Cloud Cache"},{"label":"Para minimizar el tiempo de inicio de sesión del usuario, debería:","options":["precargar el perfil antes del inicio de sesión","usar el modo de solo lectura para el perfil","no realizar ningún cambio adicional"],"answer":"precargar el perfil antes del inicio de sesión"}]},{"id":134,"type":"mc","question":"You have an Azure Virtual Desktop grupo de hosts named Pool1 that contains three host de sesións. The host de sesións are\nconfigured to use FSLogix profiles.\nOn a management computer, you create an Application Masking rule and assignment files.\nYou need to apply Application Masking to the host de sesións in Pool1.\n¿Qué debería hacer?","options":{"A":"Generate a registration token.","B":"Install the FSLogix agent on the host de sesións in Pool1.","C":"Compile the rule and assignment files.","D":"Copy the files to the host de sesións in Pool1."},"answer":"D"},{"id":135,"type":"mc","question":"You have an Azure Virtual Desktop implementación.\nThe host de sesións are joined to an local (on-premises) Active Directory domain named contoso.com.\nYou need to limit user sessions to three hours.\nWhat should you configure?","options":{"A":"a Group Policy Object (GPO) in contoso.com.","B":"the properties of the área de trabajo","C":"the RDP Properties of a grupo de hosts","D":"just-in-time (JIT) VM access"},"answer":"A"},{"id":137,"type":"hotspot","question":"Su red contiene un dominio de Active Directory local llamado contoso.com sincronizado con un tenant de Azure AD. Dispone de una suscripción de Azure con un grupo de hosts de Azure Virtual Desktop y una cuenta de almacenamiento llamada storage1. Necesita usar contenedores de perfiles FSLogix en storage1 para almacenar perfiles de usuario. Necesita configurar storage1 para la autenticación.\n\n¿Qué método de autenticación debe usar y qué debe hacer primero?","subquestions":[{"label":"Método de autenticación para storage1:","options":["Identidad administrada asignada por el sistema","Clave de cuenta de almacenamiento","Identidad de Active Directory local (AD DS)","Microsoft Entra Kerberos"],"answer":"Identidad de Active Directory local (AD DS)"},{"label":"Lo primero que debe hacer:","options":["Unir storage1 a contoso.com","Ejecutar el cmdlet Join-AzStorageAccountForAuth","Asignar el rol de Colaborador de datos de archivos de Storage a los usuarios AVD","Crear un punto de conexión privado para storage1"],"answer":"Ejecutar el cmdlet Join-AzStorageAccountForAuth"}]},{"id":139,"type":"mc","question":"You have the following:\n✑ A Microsoft 365 E5 tenant\n✑ An local (on-premises) Active Directory domain\n✑ A hybrid Azure Active Directory (Azure AD) tenant\n✑ An Azure Active Directory Domain Services (Azure AD DS) managed domain\n✑ An Azure Virtual Desktop implementación\nThe Azure Virtual Desktop implementación contains personal desktops that are hybrid joined to the local (on-premises)\ndomain and enrolled in Microsoft Intune.\nYou need to configure the security settings for the Microsoft Edge browsers on the personal desktops.\nSolution: You configure a configuration profile in Intune.\n¿Esto cumple el objetivo?","options":{"A":"Sí","B":"No"},"answer":"A"},{"id":141,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación that contains multiple grupo de hostss.\nNecesita create a PowerShell script to sign users out of a specific host de sesión before you perform a\nmaintenance task.\n¿Cuál PowerShell module should you load in the script?","options":{"A":"Az.Automation","B":"Az.Compute","C":"Az.Maintenance","D":"Az.DesktopVirtualization"},"answer":"D"},{"id":142,"type":"mc","question":"Dispone de an local (on-premises) network and an Azure suscripción. The suscripción contains the following:\n✑ A red virtual\n✑ An Azure Firewall instance\n✑ An Azure Virtual Desktop grupo de hosts\nThe red virtual connects to the local (on-premises) network by using a site-to-site VPN.\nNecesita ensure that only users from the local (on-premises) network can connect to the Azure Virtual Desktop\nmanaged resources in the grupo de hosts. La solución debe minimizar administrative effort.\nWhat should you configure?","options":{"A":"a acceso condicional policy","B":"an Azure Firewall rule","C":"a grupo de seguridad de red (NSG) rule","D":"a user-defined route"},"answer":"A"},{"id":143,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación that uses Microsoft 365 cloud services including Microsoft Teams.\nUsers use the cliente de Escritorio remoto to connect to the implementación from computers that run Windows 10.\nNecesita support audio and video in Azure Virtual Desktop and provide the users with access to Microsoft\nTeams calling and meeting features.\n¿Cuál three actions should you perform? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.","options":{"A":"Install the Microsoft Teams WebSocket Service on the Windows 10 computers","B":"Configure the IsWVDEnvironment registry key on the Windows 10 computers","C":"Configure the IsWVDEnvironment registry key on the máquina virtuals","D":"Install the Microsoft Teams desktop app on the Windows 10 computers","E":"Install the Microsoft Teams WebSocket Service on the máquina virtuals","F":"Install the Microsoft Teams desktop app on the máquina virtuals"},"answer":"C"},{"id":144,"type":"mc","question":"Dispone de an Azure Virtual Desktop grupo de hosts named Pool1 that contains three host de sesións. The host de sesións are\nconfigured to use FSLogix contenedor de perfiless.\nNecesita configure Cloud Cache on the host de sesións.\n¿Qué debería hacer?","options":{"A":"Add a VHDLocations entries to the Windows registry","B":"Remove VHDLocations entries from the Windows registry","C":"Uninstall the FSLogix agent","D":"Configure FSLogix Office Container"},"answer":"B"},{"id":145,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación.\nYou implement FSLogix contenedor de perfiless.\nNecesita ensure that the FSLogix contenedor de perfiless are not used for specific users.\n¿Qué debería hacer?","options":{"A":"Modify the local groups on each host de sesión","B":"Apply an Application Masking rule to each host de sesión","C":"Apply an AppLocker policy to each host de sesión","D":"Modify the RDP Properties of the grupo de hosts"},"answer":"A"},{"id":148,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación and the users shown in the following table.\n\nAll the users plan to use a web browser to access Azure Virtual Desktop resources.\n¿Cuál users can connect to Azure Virtual Desktop by using their preferred browser?","options":{"A":"User2 only","B":"User1 only","C":"User1, User2, and User3","D":"User2 and User3 only","E":"User1 and User2 only"},"answer":"B"},{"id":149,"type":"mc","question":"Your local (on-premises) network contains 20 Windows 10 devices.\nDispone de an Azure Virtual Desktop implementación.\nNecesita deploy the Microsoft cliente de Escritorio remoto (MSRDC) to the devices. The MSRDC must be available to\neveryone who sign in to the devices.\n¿Qué debería hacer?","options":{"A":"Install the MSRDC by using msiexec.exe and the ALLUSERS=1 command line option.","B":"Install the MSRDC by using msiexec.exe and the ALLUSERS=2 command line option.","C":"Install the MSRDC by using msiexec.exe and the MSIINSTALLPERUSER=1 command line option."},"answer":"A"},{"id":150,"type":"mc","question":"Your network contains an local (on-premises) Active Directory domain named contoso.com.\nDispone de an Azure suscripción that contains the resources shown in the following table.\n\nNecesita create a share that will host FSLogix profiles for AVDPool1. The solution must meet the following\nrequirements:\n* Maximize read and write performance for the profiles.\n* Control access to the SMB share by using the users and groups stored in contoso.com.\n¿Cuál account should you use to host the share?","options":{"A":"Account1","B":"Account2","C":"Account3"},"answer":"A"},{"id":152,"type":"hotspot","question":"Crea un grupo de hosts de Azure Virtual Desktop con las siguientes propiedades:\n• Tipo de grupo de hosts: Agrupado\n• Número máximo de sesiones: 5\n• Algoritmo de equilibrio de carga: Amplitud primero\n• Inicio de VM al conectar: Habilitado\n• Hosts de sesión: Host1 (disponible, 3 sesiones activas) y Host2 (disponible, 0 sesiones activas)\n\nSeleccione la respuesta que completa cada afirmación.","subquestions":[{"label":"Cuando un nuevo usuario se conecta, se conectará a:","options":["Host1","Host2","un host aleatorio"],"answer":"Host2"},{"label":"El número máximo de usuarios que pueden conectarse simultáneamente es:","options":["5","10","ilimitado"],"answer":"10"}]},{"id":153,"t rfil excluidas.\n• Identificar dónde almacenar el archivo de configuración.\n\n¿Qué formato de archivo debe usar y dónde debe almacenarlo?","subquestions":[{"label":"Formato de archivo de configuración:","options":["XML","JSON","TXT","INI"],"answer":"XML"},{"label":"Dónde almacenar el archivo de configuración:","options":["En el contenedor de perfiles FSLogix (VHD/VHDX)","En el registro del host de sesión","En una carpeta local del host de sesión","En el recurso compartido de archivos donde se almacenan los perfiles"],"answer":"En el registro del host de sesión"}]},{"id":159,"type":"hotspot","question":"Dispone de una implementación de Azure Virtual Desktop con 10 hosts de sesión y una RemoteApp llamada App1. Los usuarios se conectan usando los siguientes clientes:\n• User1: cliente de Escritorio remoto para Windows\n• User2: cliente web de Escritorio remoto\n• User3: cliente de Escritorio remoto para macOS\n\nHabilita la protección de captura de pantalla en todos los hosts de sesión.\n¿Cuáles usuarios pueden conectarse a un host de sesión usando el escritorio completo, y cuáles pueden usar App1?","subquestions":[{"label":"Conexión con escritorio completo con protección de captura de pantalla activa:","options":["User1 solamente","User1 y User3 solamente","User1, User2 y User3"],"answer":"User1 solamente"},{"label":"Conexión a App1 con protección de captura de pantalla activa:","options":["User1 solamente","User1 y User3 solamente","User1, User2 y User3"],"answer":"User1 solamente"}]},{"id":161,"type":"hotspot","question":"Dispone de una suscripción de Azure con una implementación de Azure Virtual Desktop con 25 hosts de sesión. Crea dos cuentas de almacenamiento: storage1 (Premium, Este de EE. UU.) y storage2 (Estándar, Oeste de EE. UU.). Planea implementar contenedores de perfiles de usuario FSLogix con Cloud Cache. Necesita configurar Cloud Cache.\n\nPara cada afirmación, seleccione la respuesta correcta.","subquestions":[{"label":"El número mínimo de cuentas de :"From the properties of Pool2, assign a plan de escalado."},"answer":"B"},{"id":164,"type":"dragdrop","question":"Su red contiene un dominio de Active Directory Domain Services (AD DS) llamado Domain1. Dispone de una suscripción de Azure Sub1 con una cuenta de almacenamiento storage1 con un recurso compartido share1, y un grupo de hosts AVD Pool1 cuyos hosts de sesión están unidos a Domain1. Necesita configurar share1 para que los hosts de sesión de Pool1 puedan almacenar contenedores de perfiles FSLogix. ¿Cuáles cuatro acciones debe realizar en secuencia?","actions":["Unir storage1 a Domain1","Asignar el rol de Colaborador de datos de archivos de Storage SMB elevado a los usuarios AVD en share1","Asignar el rol de Lector de datos de archivos de Storage SMB a los usuarios AVD en share1","Crear un objeto de cuenta de equipo en Domain1 para storage1","Asignar permisos NTFS en share1","Habilitar la autenticación de AD DS en storage1"],"answer":["Habilitar la autenticación de AD DS en storage1","Crear un objeto de cuenta de equipo en Domain1 para storage1","Asignar el rol de Colaborador de datos de archivos de Storage SMB elevado a los usuarios AVD en share1","Asignar permisos NTFS en share1"]},{"id":165,"type":"hotspot","question":"Dispone de una suscripción de Azure. Está planeando una implementación de Azure Virtual Desktop que usará imágenes personalizadas de Windows 11. Necesita configurar las imágenes personalizadas para cumplir los siguientes requisitos:\n• Admitir el enmascaramiento de aplicaciones FSLogix.\n• Minimizar los componentes instalados en cada imagen.\n\n¿Qué componentes de FSLogix debe instalar en las imágenes?","subquestions":[{"label":"Para admitir el enmascaramiento de aplicaciones FSLogix:","options":["Solo el agente FSLogix","El agente FSLogix y el servicio de enmascaramiento de aplicaciones","Solo las reglas de enmascaramiento de aplicaciones FSLogix","El agente FSLogix y FSLogix Apps RuleEditor"],"answer":"El agente FSLogix y el servicio de e IT) VM access.","options":{"A":"From the Microsoft Entra admin center, create a Acceso condicional policy.","B":"From the Microsoft Entra admin center, configure the User settings.","C":"Define Pool1 as a validation environment.","D":"For each host de sesión, configure just-in-time (JIT) VM access."},"answer":"A"},{"id":169,"type":"mc","question":"Dispone de an Azure Virtual Desktop grupo de hosts named Pool1. All the host de sesións in Pool1 are assigned private IP\naddresses only.\nNecesita ensure that administrators can connect remotely to the host de sesións. The solution must ensure that\nthe administrators can connect to the host de sesións by using Azure Command-Line Interface (CLI) and the Remote\nDesktop client for Windows.\nWhat should you include in the solution?\nA.Azure Application Puerta de enlace WAF_v2\nB.Azure Front Door Standard\nC.Azure Bastion Standard\nD.Azure Application Puerta de enlace Standard_v2","options":{"A":"Azure Application Puerta de enlace WAF_v2","B":"Azure Front Door Standard","C":"Azure Bastion Standard","D":"Azure Application Puerta de enlace Standard_v2"},"answer":"C"},{"id":171,"type":"mc","question":"Dispone de an Azure suscripción named Sub1 and a Microsoft 365 E5 suscripción.\nThe tenant contains user accounts for all internal users and users from a partner company named Fabrikam, Inc.\nEach internal user is assigned a Microsoft 365 E5 license. The users at Fabrikam are not assigned any licenses.\nSub1 has an Azure Virtual Desktop implementación that contains a grupo de hosts named Pool1. Pool1 contains a RemoteApp\nnamed App1.\nNecesita configure access to App1. The solution must meet the following requirements:\n•The Fabrikam users must be licensed by using Per-user access pricing.\n\n•App1 must be accessible to all the internal and Fabrikam users.\n•Costs must be minimized.\n¿Qué debería hacer first?\nA.Add the Fabrikam users to the grupo de aplicaciones that contains App1.\nB.Add a new grupo de hosts to Sub1.\nC.Assign a Microsoft 365 F3 license to each Fabrikam user.\nD.Add a new grupo de hosts to a new suscripción.","options":{"A":"Add the Fabrikam users to the grupo de aplicaciones that contains App1.","B":"Add a new grupo de hosts to Sub1.","C":"Assign a Microsoft 365 F3 license to each Fabrikam user.","D":"Add a new grupo de hosts to a new suscripción."},"answer":"A"},{"id":172,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación that contains the grupo de hostss shown in the following table.\n\nPlanea use app attach.\nIn which grupo de hostss can the host de sesións use app attach?\nA.Pool1 and Pool2 only\nB.Pool1 and Pool3 only\nC.Pool2 and Pool4 only\nD.Pool1, Pool2, and Pool3 only\nE.Pool1, Pool2, Pool3, and Pool4","options":{"A":"Pool1 and Pool2 only","B":"Pool1 and Pool3 only","C":"Pool2 and Pool4 only","D":"Pool1, Pool2, and Pool3 only","E":"Pool1, Pool2, Pool3, and Pool4"},"answer":"A"},{"id":173,"type":"mc","question":"You have an Azure Virtual Desktop implementación that contains a grupo de hosts named Pool1.\nPool1 contains two host de sesións that are Microsoft Entra joined.\nYou need to configure single sign-on (SSO) to connect to the host de sesións. The solution must enable Microsoft\nEntra authentication for Escritorio remoto Protocol (RDP) in the Microsoft Entra tenant.\nWhich application requires that you modify the remoteDesktopSecurityConfiguration object?\nA.Windows Cloud Login\nB.Microsoft Azure Windows Máquina virtual Sign-in\nC.Windows 365\nD.Azure Virtual Desktop\n\nQuestion: 174\n\nYou have a Microsoft Entra hybrid tenant that contains the users shown in the following table.\n\nYou deploy Microsoft Entra joined Azure Virtual Desktop host de sesións.\nWhich users support the use of FSLogix application rule sets?\nA.User1 only\nB.User2 only\nC.User1 and User2 only.\nD.User1 and User3 only\nE.User1, User2, and User3","options":{"A":"User1 only","B":"User2 only","C":"User1 and User2 only.","D":"User1 and User3 only","E":"User1, User2, and User3"},"answer":"A"},{"id":174,"type":"mc","question":"You have a Microsoft Entra hybrid tenant that contains the users shown in the following table.\n\nYou deploy Microsoft Entra joined Azure Virtual Desktop host de sesións.\nWhich users support the use of FSLogix application rule sets?\nA.User1 only\nB.User2 only\nC.User1 and User2 only.\nD.User1 and User3 only\nE.User1, User2, and User3","options":{"A":"User1 only","B":"User2 only","C":"User1 and User2 only.","D":"User1 and User3 only","E":"User1, User2, and User3"},"answer":"B"},{"id":175,"type":"dragdrop","question":"Dispone de una implementación de Azure Virtual Desktop con un grupo de hosts llamado Pool1 y un paquete de instalación MSI llamado App1. Necesita crear una imagen MSIX de App1 y hacer que la imagen esté disponible para Pool1 mediante la asociación de aplicaciones MSIX. ¿Cuáles cuatro acciones debe realizar en secuencia?","actions":["Crear una imagen MSIX a partir del paquete MSI usando la herramienta MSIX Packaging Tool","Cargar la imagen MSIX en un recurso compartido de archivos accesible para Pool1","Agregar un paquete MSIX a Pool1","Crear un grupo de aplicaciones de tipo RemoteApp para Pool1","Publicar la imagen MSIX como aplicación en el grupo de aplicaciones","Certificar el paquete MSIX"],"answer":["Crear una imagen MSIX a partir del paquete MSI usando la herramienta MSIX Packaging Tool","Cargar la imagen MSIX en un recurso compartido de archivos accesible para Pool1","Agregar un paquete MSIX a Pool1","Publicar la imagen MSIX como aplicación en el grupo de aplicaciones"]},{"id":176,"type":"mc","question":"You have an Azure suscripción that contains an Azure Virtual Desktop grupo de hosts. The grupo de hosts uses FSLogix\ncontenedor de perfiless.\nYou need to create a configuration file to prevent specific folders from syncing to the FSLogix contenedor de perfiless\nwhen a user signs out.\nHow should you name the file?\nA.profile.xml\nB.redirections.xml\nC.fslogix.config\nD.folders.json","options":{"A":"profile.xml","B":"redirections.xml","C":"fslogix.config","D":"folders.json"},"answer":"B"},{"id":177,"type":"mc","question":"Your network contains an Active Directory Domain Services (AD DS) domain named corp.contoso.com.\nYou have a Microsoft Entra tenant that syncs with corp.contoso.com.\nYou plan to deploy Azure Virtual Desktop.\nYou need to recommend a user profile management solution. The solution must meet the following requirements:\n•Support server operating system SKUs.\n•Enable the roaming of user settings and data.\n•Support cloud-based storage for user profiles.\n•Support Microsoft OneDrive for Business in pooled grupo de hostss.\nWhat should you include in the recommendation?\nA.OneDrive cloud files\nB.Enterprise State Roaming\nC.FSLogix contenedor de perfiless\nD.user profile disks","options":{"A":"OneDrive cloud files","B":"Enterprise State Roaming","C":"FSLogix contenedor de perfiless","D":"user profile disks"},"answer":"C"},{"id":178,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación.\nNecesita implement FSLogix to host user profiles in an Azure Storage account by using Azure recurso compartido de archivoss. The\nsolution must meet the following requirements:\n•Access to a host de sesión must be allowed only if the user profile is available from the cuenta de almacenamiento.\n•Local profiles must NOT be created on the host de sesións.\n¿Cuál FSLogix registry setting should you use?\nA.NoProfileContainingFolder\nB.PreventLoginWithFailure\n\nC.ProfileType\nD.DeleteLocalProfileWhenVHDShouldApply","options":{"A":"NoProfileContainingFolder","B":"PreventLoginWithFailure","C":"ProfileType","D":"DeleteLocalProfileWhenVHDShouldApply"},"answer":"B"},{"id":179,"type":"mc","question":"Dispone de an Azure suscripción and an Azure Virtual Desktop implementación. The suscripción contains the storage\nlocations shown in the following table.\n\nPlanea use app attach to deploy an image named App1.vhdx.\nNecesita copy App1.vhdx emoteApp.\nNecesita ensure that when a user on Device1 connects to App1, Microsoft OneDrive launches.\n¿Cuál two actions should you perform? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.","options":{"A":"Add an assignment to AppGrp1.","B":"For Device1, configure the HKLM\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\\OneDrive registry key.","C":"For the host de sesións, configure the HKLM\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\\OneDrive registry key.","D":"For Pool1, configure the Advanced settings in RDP Properties.","E":"For Device1, configure the Enable enhanced shell experience for RemoteApp Group Policy setting.","F":"For the host de sesións, configure the Enable enhanced shell experience for RemoteApp Group Policy setting."},"answer":"A"},{"id":185,"type":"mc","question":"Case study This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to\ncomplete each case. However, there may be additional case studies and sections on this exam. You must manage\nyour time to ensure that you are able to complete all questions included on this exam in the time provided.\nTo answer the questions included in a case study, you will need to reference information that is provided in the\ncase study. Case studies might contain exhibits and other resources that provide more information about the\nscenario that is described in the case study. Each question is independent of the other questions in this case study.\nAt the end of this case study, a review screen will appear. This screen allows you to review your answers and to\nmake changes before you move to the next section of the exam. After you begin a new section, you cannot return\nto this section.\nTo start the case study To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore\nthe content of the case study before you answer the questions. Clicking these buttons displays information such\nas business requirements, existing environment, and problem statements. If the case study has an All Information\ntab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you\nare ready to answer a question, click the Question button to return to the question.\n\nOverview Northwind Traders is a manufacturing company based in New York City.\n\nExisting Environment Identity Environment The local (on-premises) network contains an Active Directory Domain Services (AD DS) domain named\nnorthwindtraders.com.\n\nNorthwind Traders has a Microsoft Entra tenant and a Microsoft Entra Domain Services managed domain. The\nnorthwindtraders.com domain syncs with the Microsoft Entra tenant.\nMáquina virtuals The company has an local (on-premises) Hyper-V máquina virtual named VM1 that has the following configurations:\n•Generation: 1\n•Disk size: 2 TB\n•Disk format: VHDX\n•Disk type: Dynamically expanding\nCloud Services Northwind Traders has a Microsoft 365 E5 suscripción. The suscripción contains 500 users that are assigned\nMicrosoft 365 E5 licenses.\nThe company has an Azure suscripción that contains the resources shown in the following table.\n\nBoth suscripcións are linked to the Microsoft Entra tenant.\n\nRequirements Planned Changes Northwind Traders identifies the following planned changes:\n•Deploy an Azure Virtual Desktop grupo de hosts that will contain 10 host de sesións joined to the Microsoft Entra Domain\nServices managed domain.\n•Configure VM1 as the source image for the Azure Virtual Desktop implementación and upload the image to Azure.\n•The Azure Virtual Desktop implementación will provide access to a custom app named App1.\nPerformance Requirements Northwind Traders identifies the following performance requirements:\n•Each Azure Virtual Desktop host de sesión must support 15 user sessions.\n•Each new user session must be assigned to a single host de sesión until the maximum session limit is reached for\nthat host.\nApplication Requirements Northwind Traders identifies the following application requirements:\n•Microsoft OneDrive must launch when users connect to a RemoteApp session in Azure Virtual Desktop.\n•App1 requires a desktop resolution of 1280 x 1024.\n•Administrative effort must be minimized.\nDisaster Recovery Requirements -\n\nNorthwind Traders identifies the following disaster recovery requirements for the Azure Virtual Desktop\nimplementación:\n•Minimize outages if an Azure region fails.\n•Minimize the recovery time objective (RTO).\n•Minimize administrative effort in the event of a failover.\nSecurity Requirements Northwind Traders identifies the following security requirements:\n•When users sign in to the Azure Virtual Desktop implementación by using the Azure Virtual Desktop client, they must\nauthenticate by using their Microsoft Entra username and password only.\n•When users sign in to the Azure Virtual Desktop implementación by using a web browser, they must authenticate by\nusing the Microsoft Authenticator app.\n•All the Azure Virtual Desktop host de sesións deployed by using the VM1 source image must be onboarded to\nMicrosoft Defender for Endpoint.\n•The client version and operating system used to connect to the host de sesións must be logged.\n•The solution must follow the principle of least privilege.\nNetworking Requirements The Azure Virtual Desktop host de sesións must be able to access the resources on the local (on-premises) network.\nUser Profile Requirements Northwind Traders identifies the following user profile requirements:\n•Users must be able to access share1 by using their Microsoft Entra account.\n•Azure Virtual Desktop user profiles must be managed by using FSLogix.\n•All user profiles must be stored in share1.\n¿Qué debería hacer to ensure that the host de sesións meet the application requirements for App1?\nA.Modify the Connection information settings for the grupo de hosts.\nB.Assign a plan de escalado to the grupo de hosts.\nC.Modify the Session behaviour settings for the grupo de hosts.\nD.Modify the Display settings for the grupo de hosts.","options":{"A":"Modify the Connection information settings for the grupo de hosts.","B":"Assign a plan de escalado to the grupo de hosts.","C":"Modify the Session behaviour settings for the grupo de hosts.","D":"Modify the Display settings for the grupo de hosts."},"answer":"B"},{"id":187,"type":"mc","question":"Case study This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to\ncomplete each case. However, there may be additional case studies and sections on this exam. You must manage\nyour time to ensure that you are able to complete all questions included on this exam in the time provided.\nTo answer the questions included in a case study, you will need to reference information that is provided in the\ncase study. Case studies might contain exhibits and other resources that provide more information about the\nscenario that is described in the case study. Each question is independent of the other questions in this case study.\nAt the end of this case study, a review screen will appear. This screen allows you to review your answers and to\nmake changes before you move to the next section of the exam. After you begin a new section, you cannot return\nto this section.\nTo start the case study To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore\nthe content of the case study before you answer the questions. Clicking these buttons displays information such\nas business requirements, existing environment, and problem statements. If the case study has an All Information\ntab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you\nare ready to answer a question, click the Question button to return to the question.\n\nOverview Northwin thwind Traders identifies the following disaster recovery requirements for the Azure Virtual Desktop\nimplementación:\n•Minimize outages if an Azure region fails.\n•Minimize the recovery time objective (RTO).\n•Minimize administrative effort in the event of a failover.\nSecurity Requirements Northwind Traders identifies the following security requirements:\n•When users sign in to the Azure Virtual Desktop implementación by using the Azure Virtual Desktop client, they must\nauthenticate by using their Microsoft Entra username and password only.\n•When users sign in to the Azure Virtual Desktop implementación by using a web browser, they must authenticate by\nusing the Microsoft Authenticator app.\n•All the Azure Virtual Desktop host de sesións deployed by using the VM1 source image must be onboarded to\nMicrosoft Defender for Endpoint.\n•The client version and operating system used to connect to the host de sesións must be logged.\n•The solution must follow the principle of least privilege.\nNetworking Requirements The Azure Virtual Desktop host de sesións must be able to access the resources on the local (on-premises) network.\nUser Profile Requirements Northwind Traders identifies the following user profile requirements:\n•Users must be able to access share1 by using their Microsoft Entra account.\n•Azure Virtual Desktop user profiles must be managed by using FSLogix.\n•All user profiles must be stored in share1.\n¿Qué debería hacer to meet the user profile requirements?\nA.Join storage1 to the AD DS domain.\nB.Create a new Azure Files share.\nC.Create a new Azure Blob Storage account.\nD.Join storage1 to the Microsoft Entra Domain Services managed domain.","options":{"A":"Join storage1 to the AD DS domain.","B":"Create a new Azure Files share.","C":"Create a new Azure Blob Storage account.","D":"Join storage1 to the Microsoft Entra Domain Services managed domain."},"answer":"D"},{"id":188,"type":"hotspot","question":"Dispone de una implementación de Azure Virtual th-first equilibrio de carga algorithm","D":"an Azure equilibrador de carga and the depth-first equilibrio de carga algorithm"},"answer":"B"},{"id":191,"type":"hotspot","question":"Dispone de una implementación de Azure Virtual Desktop con un grupo de hosts llamado Pool1 configurado con las siguientes propiedades:\n• Tipo: Agrupado\n• Algoritmo de equilibrio de carga: Amplitud primero\n• Límite máximo de sesiones: 10\n• Hosts de sesión: Host1 (8 sesiones activas) y Host2 (2 sesiones activas)\n\nSeleccione la respuesta que completa cada afirmación.","subquestions":[{"label":"Cuando un nuevo usuario se conecta, se conectará a:","options":["Host1","Host2","un host aleatorio"],"answer":"Host2"},{"label":"El número de usuarios activos que pueden conectarse en este momento es:","options":["0","10","18","20"],"answer":"10"}]},{"id":193,"type":"mc","question":"Dispone de an Azure Virtual Desktop grupo de hosts named Pool1 that runs Windows 10 Enterprise multi-host de sesións.\nNecesita use Performance Monitor to troubleshoot a low frame quality issue that is affecting a current use\nsession to Pool1.\nWhat should you run to retrieve the user session ID?\nA.Get-ComputerInfo\nB.qwinsta\nC.whoami\nD.Get-LocalUser","options":{"A":"Get-ComputerInfo","B":"qwinsta","C":"whoami","D":"Get-LocalUser"},"answer":"B"},{"id":194,"type":"mc","question":"You have an Azure suscripción that contains the resources shown in the following table.\n\nWhich resources can you back up by using Azure Backup?","options":{"A":"WVDVM-0 and share1 only","B":"WVDVM-0 only","C":"WVDVM-0, Image1, and Image2 only","D":"WVDVM-0, share1, and Image1 only","E":"WVDVM-0, share1, Image1, and Image2"},"answer":"A"},{"id":196,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación.\nImplementa and configure Azure Virtual Desktop in a secondary location.\nPlanea perform a test failover to the secondary location, but discover existing user sessions to the primary\nlocation.\nNecesita sign out users
