/* ═══════════════════════════════════════════════════════════════
   AZ-140 QUIZ — AZURE BLUEPRINT DESIGN SYSTEM
   ═══════════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Core palette */
  --bg:        #070c18;
  --bg2:       #0d1526;
  --bg3:       #111d35;
  --surface:   #0f1e36;
  --surface2:  #162742;
  --surface3:  #1e3352;
  --border:    rgba(0,120,212,.25);
  --border2:   rgba(0,170,255,.18);

  /* Brand */
  --accent:    #0078d4;
  --accent2:   #00aeff;
  --accent3:   #40c6ff;
  --glow:      rgba(0,120,212,.35);

  /* Semantic */
  --success:   #10d98c;
  --success-bg:rgba(16,217,140,.1);
  --danger:    #ff4e6a;
  --danger-bg: rgba(255,78,106,.1);
  --warning:   #ffb830;
  --warning-bg:rgba(255,184,48,.1);
  --info:      #7b96ff;

  /* Text */
  --text:      #e8f0fe;
  --text2:     #a8bbd4;
  --text3:     #5a7a9a;
  --text4:     #3a5570;

  /* Fonts */
  --sans:      'DM Sans', system-ui, sans-serif;
  --display:   'Bricolage Grotesque', system-ui, sans-serif;
  --mono:      'JetBrains Mono', monospace;

  /* Radii */
  --r-sm: 6px;
  --r:    10px;
  --r-lg: 16px;
  --r-xl: 22px;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* ── Background grid texture ───────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,120,212,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,120,212,.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  top: -40%; left: -20%;
  width: 80vw; height: 80vw;
  background: radial-gradient(circle, rgba(0,120,212,.07) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
#app { position: relative; z-index: 1; min-height: 100vh; }

/* ══════════════════════════════════════════════════════
   HEADER
   ══════════════════════════════════════════════════════ */
.header {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px;
  background: rgba(7,12,24,.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 24px rgba(0,0,0,.4);
}

.logo { display: flex; align-items: center; gap: 11px; text-decoration: none; }

.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, #0078d4, #00aeff);
  border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display);
  font-size: 13px; font-weight: 800;
  color: #fff; letter-spacing: -.5px;
  box-shadow: 0 0 16px rgba(0,120,212,.5);
  flex-shrink: 0;
}

.logo-text { display: flex; flex-direction: column; gap: 1px; }
.logo-title { font-family: var(--display); font-size: 15px; font-weight: 700; color: var(--text); }
.logo-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: .04em; }

.header-stats {
  display: flex; align-items: center; gap: 10px;
  margin-left: auto; flex-wrap: wrap;
}

.stat-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 11px; font-family: var(--mono);
  color: var(--text2); white-space: nowrap;
}
.stat-pill .val { color: var(--accent3); font-weight: 600; }

.progress-wrap {
  width: 130px; height: 5px;
  background: var(--surface3);
  border-radius: 100px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  border-radius: 100px;
  transition: width .4s ease;
  box-shadow: 0 0 8px var(--accent);
}

/* ══════════════════════════════════════════════════════
   MAIN LAYOUT
   ══════════════════════════════════════════════════════ */
.main {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: calc(100vh - 67px);
}

/* ── SIDEBAR ── */
.sidebar {
  background: rgba(13,21,38,.8);
  border-right: 1px solid var(--border);
  padding: 20px 14px;
  overflow-y: auto;
  position: sticky; top: 67px;
  height: calc(100vh - 67px);
}
.sidebar-title {
  font-size: 9px; font-family: var(--mono);
  color: var(--text3); letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 14px; padding: 0 4px;
}
.q-grid {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 5px; margin-bottom: 20px;
}
.q-dot {
  aspect-ratio: 1; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-family: var(--mono); font-weight: 600;
  cursor: pointer; transition: all .15s;
  background: var(--surface2); color: var(--text3);
  border: 1px solid transparent;
}
.q-dot:hover { background: var(--surface3); color: var(--text2); transform: scale(1.1); }
.q-dot.current { background: var(--accent); color: #fff; border-color: var(--accent2); box-shadow: 0 0 10px var(--glow); }
.q-dot.correct { background: rgba(16,217,140,.2); color: var(--success); border-color: rgba(16,217,140,.3); }
.q-dot.wrong   { background: rgba(255,78,106,.2); color: var(--danger);  border-color: rgba(255,78,106,.3); }
.q-dot.flagged { background: rgba(255,184,48,.15); color: var(--warning); border-color: rgba(255,184,48,.3); }
.q-dot.casestudy { outline: 1px dashed rgba(16,217,140,.4); outline-offset: 1px; }

.sidebar-legend { display: flex; flex-direction: column; gap: 7px; padding: 0 4px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text3); }
.legend-dot {
  width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
}

/* ── CONTENT ── */
.content {
  padding: 24px 28px; max-width: 860px;
  display: flex; flex-direction: column; gap: 16px;
}

/* ── Q HEADER ── */
.q-header {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap;
}
.q-number {
  font-size: 11px; font-family: var(--mono); color: var(--text3);
  letter-spacing: .04em;
}
.q-badges { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-left: auto; }

.badge {
  padding: 3px 9px; border-radius: 100px;
  font-size: 10px; font-family: var(--mono); font-weight: 500;
  letter-spacing: .04em; border: 1px solid transparent;
}
.badge-mc       { background: rgba(0,120,212,.15); color: var(--accent3);  border-color: rgba(0,120,212,.3); }
.badge-hotspot  { background: rgba(123,150,255,.15); color: var(--info);   border-color: rgba(123,150,255,.3); }
.badge-dragdrop { background: rgba(255,184,48,.12); color: var(--warning); border-color: rgba(255,184,48,.3); }
.badge-cs       { background: rgba(16,217,140,.12); color: var(--success); border-color: rgba(16,217,140,.3); }

.flag-btn {
  padding: 4px 11px; border-radius: 100px;
  border: 1px solid var(--border2);
  background: transparent; color: var(--text3);
  font-size: 10px; font-family: var(--mono); cursor: pointer;
  transition: all .15s;
}
.flag-btn:hover { border-color: var(--warning); color: var(--warning); }
.flag-btn.flagged { background: rgba(255,184,48,.12); border-color: rgba(255,184,48,.4); color: var(--warning); }

/* ── SCENARIO BOX ── */
.scenario-box {
  border-radius: var(--r-lg);
  border: 1px solid rgba(16,217,140,.25);
  background: rgba(16,217,140,.04);
  overflow: hidden;
}
.scenario-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px; cursor: pointer;
  transition: background .15s;
}
.scenario-header:hover { background: rgba(16,217,140,.08); }
.scenario-title { font-size: 12px; font-weight: 600; color: var(--success); font-family: var(--mono); }
.scenario-toggle { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.scenario-body { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
.scenario-body.open { max-height: 600px; overflow-y: auto; }
.scenario-text {
  padding: 16px 18px;
  font-size: 13px; line-height: 1.75; color: var(--text2);
  border-top: 1px solid rgba(16,217,140,.15);
  white-space: pre-wrap;
}
.scenario-text strong { color: var(--text); font-weight: 600; }

/* ── Q CARD ── */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 28px;
  box-shadow: 0 8px 40px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04);
  animation: cardIn .25s ease;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.q-text {
  font-size: 16px; line-height: 1.75;
  color: var(--text); font-weight: 400;
  margin-bottom: 22px;
  white-space: pre-wrap;
  font-family: var(--sans);
}

/* ── OPTIONS (MC) ── */
.options { display: flex; flex-direction: column; gap: 9px; }
.option {
  display: flex; align-items: flex-start; gap: 13px;
  padding: 14px 16px;
  border-radius: var(--r-lg);
  border: 1px solid var(--border2);
  background: var(--surface2);
  cursor: pointer; transition: all .15s;
  font-size: 14px; color: var(--text2); line-height: 1.6;
}
.option:hover:not(.disabled):not(.correct):not(.wrong) {
  border-color: rgba(0,170,255,.5);
  background: rgba(0,120,212,.12);
  color: var(--text);
  transform: translateX(3px);
}
.option.selected {
  border-color: var(--accent);
  background: rgba(0,120,212,.15);
  color: var(--text);
}
.option.correct {
  border-color: var(--success);
  background: var(--success-bg);
  color: var(--success);
}
.option.wrong {
  border-color: var(--danger);
  background: var(--danger-bg);
  color: var(--danger);
}
.option.disabled { cursor: default; }
.option-key {
  min-width: 28px; height: 28px;
  border-radius: var(--r-sm);
  background: var(--surface3);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  color: var(--accent3); flex-shrink: 0;
  transition: all .15s;
}
.option.selected .option-key  { background: var(--accent); border-color: var(--accent); color: #fff; }
.option.correct .option-key   { background: var(--success); border-color: var(--success); color: var(--bg); }
.option.wrong .option-key     { background: var(--danger);  border-color: var(--danger);  color: #fff; }

/* ── HOTSPOT (subquestions) ── */
.subquestions { display: flex; flex-direction: column; gap: 18px; }
.subq {}
.subq-label {
  font-size: 13px; font-weight: 600; color: var(--accent3);
  margin-bottom: 9px; font-family: var(--mono);
  padding-left: 10px;
  border-left: 3px solid var(--accent);
}
.subq-options { display: flex; flex-direction: column; gap: 7px; }
.subq-option {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-radius: var(--r);
  border: 1px solid var(--border2);
  background: var(--surface2);
  cursor: pointer; transition: all .15s;
  font-size: 13px; color: var(--text2);
}
.subq-option:hover:not(.disabled):not(.correct):not(.wrong) {
  border-color: rgba(0,170,255,.4); background: rgba(0,120,212,.1); color: var(--text);
}
.subq-option.selected { border-color: var(--accent); background: rgba(0,120,212,.15); color: var(--text); }
.subq-option.correct  { border-color: var(--success); background: var(--success-bg); color: var(--success); }
.subq-option.wrong    { border-color: var(--danger);  background: var(--danger-bg);  color: var(--danger); }
.subq-option.disabled { cursor: default; }
.subq-radio {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0; transition: all .15s;
  background: transparent;
}
.subq-option.selected .subq-radio { border-color: var(--accent);  background: var(--accent); }
.subq-option.correct  .subq-radio { border-color: var(--success); background: var(--success); }
.subq-option.wrong    .subq-radio { border-color: var(--danger);  background: var(--danger); }

/* ── DRAG & DROP ── */
.dragdrop-container {
  display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
}
.dd-col {}
.dd-col-title {
  font-size: 10px; font-family: var(--mono); color: var(--text3);
  letter-spacing: .08em; text-transform: uppercase;
  margin-bottom: 10px; padding: 0 4px;
}
.dd-actions { display: flex; flex-direction: column; gap: 7px; }
.dd-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px;
  border-radius: var(--r);
  border: 1px solid var(--border2);
  background: var(--surface2);
  cursor: pointer; transition: all .15s;
  font-size: 13px; color: var(--text2); gap: 8px;
}
.dd-item:hover:not(.placed):not(.disabled) {
  border-color: var(--accent); background: rgba(0,120,212,.15); color: var(--text);
  transform: translateX(4px);
}
.dd-item.placed { opacity: .4; cursor: default; }
.dd-item.disabled { cursor: default; }
.dd-answer-slot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px; margin-bottom: 7px;
  border-radius: var(--r);
  border: 2px dashed var(--border);
  background: var(--bg2);
  font-size: 13px; color: var(--text3);
  min-height: 46px; transition: all .15s;
}
.dd-answer-slot.filled { border-style: solid; border-color: var(--accent2); background: rgba(0,120,212,.08); color: var(--text); }
.dd-answer-slot.correct { border-color: var(--success); background: var(--success-bg); color: var(--success); }
.dd-answer-slot.wrong   { border-color: var(--danger);  background: var(--danger-bg);  color: var(--danger); }
.dd-slot-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--surface3); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-family: var(--mono); font-weight: 700;
  color: var(--text3); flex-shrink: 0;
}
.dd-remove {
  background: none; border: none;
  color: var(--danger); cursor: pointer; font-size: 13px;
  padding: 3px 6px; border-radius: var(--r-sm);
  transition: all .15s; flex-shrink: 0;
}
.dd-remove:hover { background: var(--danger-bg); }

/* ── FEEDBACK ── */
.feedback {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px; border-radius: var(--r-lg);
  margin-top: 16px; font-size: 14px; line-height: 1.6;
  animation: feedbackIn .25s ease;
  border: 1px solid transparent;
}
@keyframes feedbackIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.feedback.correct { background: var(--success-bg); border-color: rgba(16,217,140,.3); color: var(--success); }
.feedback.wrong   { background: var(--danger-bg);  border-color: rgba(255,78,106,.3);  color: var(--danger); }
.feedback-icon { font-size: 18px; flex-shrink: 0; line-height: 1.4; }
.feedback strong { font-weight: 700; display: block; margin-bottom: 2px; }

/* ── CONTROLS ── */
.controls {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; flex-wrap: wrap;
  padding-top: 4px;
}
.controls-left, .controls-right { display: flex; gap: 9px; flex-wrap: wrap; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 10px 20px; border-radius: var(--r-lg);
  font-size: 13px; font-weight: 600; font-family: var(--sans);
  cursor: pointer; border: 1px solid transparent;
  transition: all .18s; white-space: nowrap;
  text-decoration: none; letter-spacing: .01em;
}
.btn:disabled { opacity: .38; cursor: not-allowed; }
.btn-primary {
  background: var(--accent);
  border-color: rgba(0,170,255,.4);
  color: #fff;
  box-shadow: 0 4px 16px rgba(0,120,212,.35);
}
.btn-primary:not(:disabled):hover {
  background: var(--accent2);
  box-shadow: 0 6px 24px rgba(0,120,212,.5);
  transform: translateY(-1px);
}
.btn-secondary {
  background: var(--surface2);
  border-color: var(--border);
  color: var(--text2);
}
.btn-secondary:not(:disabled):hover {
  background: var(--surface3); border-color: var(--accent);
  color: var(--text); transform: translateY(-1px);
}
.btn-success {
  background: rgba(16,217,140,.15);
  border-color: rgba(16,217,140,.4);
  color: var(--success);
  box-shadow: 0 4px 16px rgba(16,217,140,.2);
}
.btn-success:hover {
  background: rgba(16,217,140,.25);
  box-shadow: 0 6px 24px rgba(16,217,140,.3);
  transform: translateY(-1px);
}
.btn-ghost {
  background: transparent; border-color: var(--border);
  color: var(--text3);
}
.btn-ghost:not(:disabled):hover { background: var(--surface2); color: var(--text2); }

/* ══════════════════════════════════════════════════════
   WELCOME SCREEN
   ══════════════════════════════════════════════════════ */
.welcome {
  max-width: 680px; margin: 0 auto;
  padding: 60px 28px 80px;
  display: flex; flex-direction: column; align-items: center;
  text-align: center; gap: 0;
}
.welcome-badge {
  display: inline-flex; align-items: center;
  padding: 5px 14px; border-radius: 100px;
  background: rgba(0,120,212,.15);
  border: 1px solid rgba(0,120,212,.35);
  color: var(--accent3);
  font-size: 11px; font-family: var(--mono); font-weight: 500;
  letter-spacing: .08em; text-transform: uppercase;
  margin-bottom: 28px;
}
.welcome h1 {
  font-family: var(--display);
  font-size: 44px; font-weight: 800;
  line-height: 1.1; letter-spacing: -.02em;
  background: linear-gradient(135deg, #fff 30%, var(--accent3) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 18px;
}
.welcome-sub {
  font-size: 15px; line-height: 1.7; color: var(--text2);
  max-width: 520px; margin-bottom: 36px;
}
.welcome-stats {
  display: flex; gap: 12px; margin-bottom: 36px;
  flex-wrap: wrap; justify-content: center;
}
.welcome-stat {
  padding: 16px 22px; border-radius: var(--r-lg);
  background: var(--surface); border: 1px solid var(--border);
  text-align: center; min-width: 90px;
  transition: all .2s;
}
.welcome-stat:hover { border-color: var(--accent); transform: translateY(-2px); }
.welcome-stat-val {
  font-family: var(--display); font-size: 26px; font-weight: 800;
  color: var(--accent3); line-height: 1;
}
.welcome-stat-lbl {
  font-size: 9px; font-family: var(--mono); color: var(--text3);
  letter-spacing: .08em; text-transform: uppercase; margin-top: 5px;
}
.mode-cards {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; width: 100%; max-width: 500px;
  margin-bottom: 22px;
}
.mode-card {
  padding: 20px 18px; border-radius: var(--r-xl);
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; transition: all .18s; text-align: left;
}
.mode-card:hover { border-color: var(--accent2); transform: translateY(-2px); }
.mode-card.selected {
  border-color: var(--accent);
  background: rgba(0,120,212,.1);
  box-shadow: 0 0 24px rgba(0,120,212,.2);
}
.mode-icon { font-size: 24px; margin-bottom: 10px; }
.mode-card-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
.mode-card-desc  { font-size: 12px; color: var(--text3); line-height: 1.5; }

/* Count buttons */
.count-btn {
  padding: 7px 16px; border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2);
  font-size: 12px; font-family: var(--mono);
  cursor: pointer; transition: all .15s;
}
.count-btn:hover { border-color: var(--accent2); color: var(--text); }
.count-btn.count-active {
  background: rgba(0,120,212,.2); border-color: var(--accent);
  color: var(--accent3); font-weight: 600;
}
.count-selector-hidden { display: none !important; }

/* ══════════════════════════════════════════════════════
   SCORE SCREEN
   ══════════════════════════════════════════════════════ */
.score-screen {
  max-width: 540px; margin: 0 auto;
  padding: 60px 28px;
  display: flex; flex-direction: column; align-items: center;
  text-align: center; gap: 20px;
}
.score-ring {
  width: 150px; height: 150px;
  border-radius: 50%;
  background: conic-gradient(
    var(--accent) calc(var(--pct) * 1%), var(--surface3) 0
  );
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 40px rgba(0,120,212,.3);
  position: relative;
}
.score-ring::before {
  content: '';
  position: absolute; inset: 12px;
  border-radius: 50%; background: var(--bg2);
}
.score-inner {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
}
.score-pct {
  font-family: var(--display); font-size: 34px; font-weight: 800;
  color: var(--accent3); line-height: 1;
}
.score-label { font-size: 9px; font-family: var(--mono); color: var(--text3); letter-spacing: .1em; margin-top: 3px; }
.score-title {
  font-family: var(--display); font-size: 28px; font-weight: 800; color: var(--text);
}
.score-sub { font-size: 14px; line-height: 1.7; color: var(--text2); max-width: 400px; }
.score-grid {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 12px; width: 100%;
}
.score-stat {
  padding: 18px 12px; border-radius: var(--r-lg);
  background: var(--surface); border: 1px solid var(--border);
}
.score-stat-val { font-family: var(--display); font-size: 28px; font-weight: 800; }
.score-stat-lbl { font-size: 9px; font-family: var(--mono); color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-top: 4px; }

/* ══════════════════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════════════════ */
select, button, input { touch-action: manipulation; }

@media(max-width: 900px) {
  .main { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
@media(max-width: 640px) {
  .content { padding: 16px 14px; gap: 12px; }
  .header { padding: 10px 14px; gap: 8px; }
  .logo-title { font-size: 13px; }
  .logo-sub { display: none; }
  .header-stats .stat-pill:nth-child(n+3) { display: none; }
  .progress-wrap { width: 90px; }
  .q-text { font-size: 14px; }
  .q-card { padding: 18px 16px; }
  .option { padding: 12px 13px; font-size: 13px; }
  .btn { padding: 10px 15px; font-size: 12px; min-height: 42px; }
  .welcome h1 { font-size: 28px; }
  .welcome-stat-val { font-size: 20px; }
  .mode-cards { grid-template-columns: 1fr; }
  .dragdrop-container { grid-template-columns: 1fr; }
  .score-grid { grid-template-columns: 1fr 1fr; }
  .score-ring { width: 120px; height: 120px; }
  .score-pct { font-size: 26px; }
}
@media(max-width: 400px) {
  .welcome-stats { gap: 8px; }
  .welcome-stat { padding: 12px 14px; min-width: 70px; }
  .controls { flex-direction: column; align-items: stretch; }
  .controls-left, .controls-right { justify-content: center; }
}
@media(hover: none) and (pointer: coarse) {
  .option:hover { background: var(--surface2); border-color: var(--border2); transform: none; }
  .option:active { background: rgba(0,120,212,.12); border-color: var(--accent); transform: scale(.98); }
  .btn:active { transform: scale(.96); opacity: .85; }
}

/* ══════════════════════════════════════════════════════
   SAFE AREA / NOTCH / DYNAMIC ISLAND
   ══════════════════════════════════════════════════════ */
:root {
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left, 0px);
  --safe-right:  env(safe-area-inset-right, 0px);
  --nav-h: 72px; /* bottom nav height */
}

html {
  /* Prevent overscroll bounce showing white */
  background: #070c18;
  overscroll-behavior: none;
}

body {
  /* Leave room for bottom nav on mobile */
  padding-bottom: var(--nav-h);
}

/* In standalone/PWA mode: extend status bar */
@media all and (display-mode: standalone) {
  .header {
    padding-top: calc(14px + var(--safe-top));
  }
  body {
    padding-bottom: calc(var(--nav-h) + var(--safe-bottom));
  }
}

/* ══════════════════════════════════════════════════════
   BOTTOM NAVIGATION BAR (mobile only)
   ══════════════════════════════════════════════════════ */
#bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: rgba(7,12,24,.95);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-top: 1px solid rgba(0,120,212,.2);
  padding: 8px 16px calc(8px + var(--safe-bottom));
  display: none;
  align-items: center;
  gap: 10px;
}
#bottom-nav .bnav-btn {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
  padding: 11px 10px;
  border-radius: 14px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text3);
  font-size: 12px; font-weight: 600; font-family: var(--sans);
  cursor: pointer; transition: all .15s;
  min-height: 50px;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
#bottom-nav .bnav-btn:active { transform: scale(.95); opacity: .8; }
#bottom-nav .bnav-btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: rgba(0,170,255,.3);
  box-shadow: 0 4px 16px rgba(0,120,212,.4);
  flex: 2;
}
#bottom-nav .bnav-btn.success {
  background: rgba(16,217,140,.15);
  color: var(--success);
  border-color: rgba(16,217,140,.3);
  flex: 2;
}
#bottom-nav .bnav-icon { font-size: 16px; line-height: 1; }

/* ══════════════════════════════════════════════════════
   MOBILE QUIZ LAYOUT ADJUSTMENTS
   ══════════════════════════════════════════════════════ */
@media(max-width: 640px) {
  /* Hide desktop controls, show bottom nav */
  .controls { display: none !important; }
  #bottom-nav { display: flex; }

  /* Header compact */
  .header {
    padding: 10px 14px;
    gap: 8px;
  }
  .logo-icon { width: 32px; height: 32px; font-size: 11px; border-radius: 8px; }
  .logo-title { font-size: 13px; }
  .logo-sub { display: none; }

  /* Stats simplified */
  .header-stats { gap: 6px; }
  .stat-pill { padding: 4px 9px; font-size: 10px; }
  .stat-pill:nth-child(n+3) { display: none; }
  .progress-wrap { width: 80px; }

  /* Main layout */
  .main { grid-template-columns: 1fr; min-height: calc(100vh - 57px); }
  .sidebar { display: none !important; }
  .content { padding: 14px 12px 8px; gap: 12px; }

  /* Question card */
  .q-card {
    padding: 18px 16px;
    border-radius: 18px;
  }
  .q-text { font-size: 15px; line-height: 1.7; margin-bottom: 18px; }

  /* Options: bigger touch targets */
  .option {
    padding: 14px 14px;
    font-size: 14px;
    min-height: 54px;
    border-radius: 14px;
    transition: background .1s, border-color .1s;
    /* Remove hover translate on touch */
    transform: none !important;
  }
  .option:active:not(.disabled) {
    background: rgba(0,120,212,.18) !important;
    border-color: var(--accent) !important;
    transform: scale(.98) !important;
  }
  .option-key {
    min-width: 30px; height: 30px;
    border-radius: 8px; font-size: 12px;
  }

  /* Hotspot */
  .subq-option { padding: 13px 13px; font-size: 14px; min-height: 50px; border-radius: 12px; }
  .subq-label { font-size: 12px; }

  /* Drag & drop */
  .dragdrop-container { grid-template-columns: 1fr; gap: 14px; }
  .dd-item { min-height: 50px; font-size: 14px; }
  .dd-answer-slot { min-height: 50px; font-size: 14px; }

  /* Scenario */
  .scenario-box { border-radius: 14px; }
  .scenario-header { padding: 11px 14px; }
  .scenario-title { font-size: 11px; }
  .scenario-text { font-size: 13px; padding: 13px 14px; }

  /* Feedback */
  .feedback { font-size: 13px; padding: 13px 14px; border-radius: 14px; }

  /* Q header */
  .q-header { gap: 8px; }
  .q-number { font-size: 10px; }
  .badge { font-size: 9px; padding: 3px 8px; }
  .flag-btn { font-size: 10px; padding: 4px 10px; }

  /* Welcome screen */
  .welcome { padding: 32px 16px 24px; gap: 0; }
  .welcome h1 { font-size: 30px; margin-bottom: 12px; }
  .welcome-sub { font-size: 14px; margin-bottom: 24px; }
  .welcome-badge { font-size: 10px; margin-bottom: 20px; }
  .welcome-stats { gap: 8px; margin-bottom: 24px; }
  .welcome-stat { padding: 12px 14px; min-width: 80px; }
  .welcome-stat-val { font-size: 22px; }
  .welcome-stat-lbl { font-size: 8px; }
  .mode-cards { grid-template-columns: 1fr 1fr; gap: 8px; max-width: 100%; margin-bottom: 16px; }
  .mode-card { padding: 14px 12px; border-radius: 16px; }
  .mode-icon { font-size: 20px; margin-bottom: 7px; }
  .mode-card-title { font-size: 13px; }
  .mode-card-desc { font-size: 11px; }

  /* Buttons in welcome (start button) */
  .welcome .btn-primary {
    min-height: 54px;
    font-size: 15px;
    border-radius: 16px;
    padding: 14px 24px;
  }

  /* Score screen */
  .score-screen { padding: 32px 16px 24px; gap: 16px; }
  .score-ring { width: 130px; height: 130px; }
  .score-pct { font-size: 30px; }
  .score-title { font-size: 22px; }
  .score-sub { font-size: 13px; }
  .score-grid { grid-template-columns: repeat(3,1fr); gap: 8px; }
  .score-stat { padding: 14px 8px; border-radius: 14px; }
  .score-stat-val { font-size: 22px; }
}

/* ══════════════════════════════════════════════════════
   SWIPE HINT (shows briefly on first visit)
   ══════════════════════════════════════════════════════ */
#swipe-hint {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: rgba(0,0,0,.8);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(0,120,212,.3);
  border-radius: 18px;
  padding: 20px 28px;
  text-align: center;
  z-index: 500;
  pointer-events: none;
  opacity: 0;
  transition: opacity .3s;
  display: none;
}
#swipe-hint.visible { opacity: 1; }
.swipe-hint-icon { font-size: 32px; margin-bottom: 8px; }
.swipe-hint-text { font-size: 13px; color: var(--text2); font-family: var(--sans); }
.swipe-hint-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ══════════════════════════════════════════════════════
   iOS INSTALL BANNER
   ══════════════════════════════════════════════════════ */
#ios-install-banner {
  position: fixed;
  bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px);
  left: 12px; right: 12px;
  z-index: 300;
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: rgba(15,30,54,.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(0,120,212,.4);
  border-radius: 18px;
  box-shadow: 0 8px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(0,170,255,.1);
  transform: translateY(20px);
  opacity: 0;
  transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s;
}
#ios-install-banner[style*="translateY(0)"] { transform: translateY(0) !important; opacity: 1 !important; }
.iib-icon {
  width: 48px; height: 48px; border-radius: 12px;
  background: linear-gradient(135deg, #0078d4, #00aeff);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: #fff;
  flex-shrink: 0; font-family: var(--display);
  box-shadow: 0 4px 12px rgba(0,120,212,.4);
}
.iib-text { flex: 1; min-width: 0; }
.iib-title { font-size: 13px; font-weight: 700; color: var(--text); }
.iib-desc  { font-size: 11px; color: var(--text2); margin-top: 3px; line-height: 1.5; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.iib-desc svg { vertical-align: middle; color: var(--accent3); flex-shrink: 0; }
.iib-desc b { color: var(--accent3); }
.iib-close {
  background: none; border: none;
  color: var(--text3); font-size: 18px;
  cursor: pointer; padding: 4px 6px;
  border-radius: 8px; flex-shrink: 0;
  transition: all .15s;
}
.iib-close:hover { background: rgba(255,255,255,.08); color: var(--text); }

/* Progress counter mobile */
@media(max-width: 640px) {
  /* Floating progress pill */
  .q-header {
    position: sticky; top: 57px; z-index: 50;
    background: rgba(7,12,24,.9);
    backdrop-filter: blur(12px);
    margin: -14px -12px 0;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
}

/* ══════════════════════════════════════════════════════
   PREVENT OVERSCROLL / PULL-TO-REFRESH
   ══════════════════════════════════════════════════════ */
@media(max-width: 640px) {
  html, body { overscroll-behavior-y: contain; }
}

/* ══════════════════════════════════════════════════════
   TOUCH ACTIVE STATES (no hover on mobile)
   ══════════════════════════════════════════════════════ */
@media(hover: none) and (pointer: coarse) {
  .option:hover { background: var(--surface2) !important; border-color: var(--border2) !important; transform: none !important; }
  .subq-option:hover { background: var(--surface2) !important; border-color: var(--border2) !important; }
  .dd-item:hover { background: var(--surface2) !important; border-color: var(--border2) !important; transform: none !important; }
  .btn-primary:hover { background: var(--accent) !important; box-shadow: 0 4px 16px rgba(0,120,212,.35) !important; transform: none !important; }
  .btn-secondary:hover { background: var(--surface2) !important; transform: none !important; }
  .welcome-stat:hover { transform: none !important; }
  .mode-card:hover { transform: none !important; }
}


/* ══════════════════════════════════════════════════════
   SIMULATION MODE CSS
   ══════════════════════════════════════════════════════ */

/* Mode cards — 3 columns */
.mode-cards-3 { grid-template-columns: 1fr 1fr 1fr; max-width: 620px; }
.mode-card-sim { border-color: rgba(255,184,48,.2); }
.mode-card-sim.selected { background: rgba(255,184,48,.08); border-color: var(--warning); box-shadow: 0 0 24px rgba(255,184,48,.15); }
@media(max-width:640px) {
  .mode-cards-3 { grid-template-columns: 1fr 1fr; }
  .mode-card-sim { grid-column: 1 / -1; }
}

/* ── Sim top bar ── */
.sim-wrap { min-height:100vh; display:flex; flex-direction:column; background:var(--bg); }
.sim-top-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding: 12px 24px;
  background: rgba(7,12,24,.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky; top:0; z-index:100;
}
.sim-top-logo { display:flex; align-items:center; gap:10px; }
.sim-top-right { display:flex; align-items:center; gap:10px; }
.sim-top-total { font-size:10px; font-family:var(--mono); color:var(--text3); }

/* ── Sim timer ── */
.sim-timer {
  font-family:var(--mono); font-size:16px; font-weight:700;
  color:var(--accent3); letter-spacing:.04em;
  padding:5px 12px; border-radius:8px;
  background:rgba(0,120,212,.1); border:1px solid rgba(0,120,212,.2);
  transition:all .3s;
}
.sim-timer.warn { color:var(--warning); background:rgba(255,184,48,.1); border-color:rgba(255,184,48,.3); }
.sim-timer.danger { color:var(--danger); background:rgba(255,78,106,.1); border-color:rgba(255,78,106,.3); animation:timerPulse 1s ease-in-out infinite; }
@keyframes timerPulse { 0%,100%{opacity:1} 50%{opacity:.55} }

/* Section badge in quiz header */
.sim-sec-badge {
  padding:3px 10px; border-radius:100px;
  font-size:10px; font-family:var(--mono); font-weight:600;
  background:rgba(0,120,212,.15); border:1px solid rgba(0,120,212,.3);
  color:var(--accent3); white-space:nowrap;
}

/* ── Section intro body ── */
.sim-intro-body {
  max-width:560px; margin:0 auto;
  padding:48px 24px 80px;
  display:flex; flex-direction:column; align-items:center; gap:0;
  text-align:center;
}
.ssi-eyebrow {
  font-size:11px; font-family:var(--mono); color:var(--text3);
  letter-spacing:.1em; text-transform:uppercase; margin-bottom:20px;
}
.ssi-icon { font-size:52px; margin-bottom:14px; }
.ssi-title {
  font-family:var(--display); font-size:30px; font-weight:800;
  color:var(--text); margin-bottom:12px; line-height:1.15;
}
.ssi-info {
  font-size:14px; color:var(--text2); line-height:1.7;
  max-width:420px; margin-bottom:22px;
}
.ssi-alert {
  background:rgba(255,184,48,.07); border:1px solid rgba(255,184,48,.3);
  border-radius:12px; padding:14px 18px; margin-bottom:18px;
  font-size:13px; color:var(--warning); line-height:1.6; max-width:420px;
  text-align:left; width:100%;
}
.ssi-ok {
  background:rgba(16,217,140,.07); border:1px solid rgba(16,217,140,.3);
  border-radius:12px; padding:14px 18px; margin-bottom:18px;
  font-size:13px; color:var(--success); max-width:420px; width:100%;
  text-align:left;
}
.ssi-rules {
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  padding:16px 20px; margin-bottom:28px; max-width:440px; width:100%;
  text-align:left; display:flex; flex-direction:column; gap:9px;
}
.ssi-rule { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text2); }
.ssi-rule-dot {
  width:22px; height:22px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; flex-shrink:0;
}
.ssi-rule-dot.ok { background:rgba(16,217,140,.15); color:var(--success); }
.ssi-rule-dot.info { background:rgba(0,120,212,.15); color:var(--accent3); font-size:12px; }
.ssi-cta {
  width:100%; max-width:340px; justify-content:center;
  padding:14px 24px; font-size:15px; border-radius:16px;
}
.ssi-nav-btns {
  display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:24px;
}

/* ── Simulation Result Page ── */
.sim-result-page { min-height:100vh; background:var(--bg); }
.sim-result-topbar {
  padding:14px 24px;
  background:rgba(7,12,24,.9); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.sim-result-body {
  max-width:600px; margin:0 auto;
  padding:36px 24px 100px;
  display:flex; flex-direction:column; align-items:center; gap:20px;
}

/* Ring */
.sim-ring-wrap {
  position:relative; width:180px; height:180px;
  display:flex; align-items:center; justify-content:center;
}
.sim-ring-svg { position:absolute; inset:0; width:100%; height:100%; }
.sim-ring-center {
  position:relative; z-index:1; text-align:center;
  background:var(--bg2); border-radius:50%;
  width:136px; height:136px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.sim-ring-score {
  font-family:var(--display); font-size:46px; font-weight:800;
  color:var(--text); line-height:1;
}
.sim-ring-of { font-size:12px; font-family:var(--mono); color:var(--text3); margin-top:2px; }

/* Verdict */
.sim-verdict {
  font-family:var(--display); font-size:20px; font-weight:800;
  letter-spacing:.08em; padding:8px 26px; border-radius:100px;
  border:2px solid;
}
.sim-verdict.pass { color:var(--success); border-color:rgba(16,217,140,.45); background:rgba(16,217,140,.1); }
.sim-verdict.fail { color:var(--danger);  border-color:rgba(255,78,106,.45); background:rgba(255,78,106,.1); }
.sim-verdict-msg { font-size:14px; color:var(--text2); text-align:center; max-width:400px; line-height:1.65; }
.sim-verdict-msg strong { color:var(--text); }

/* Stats row */
.sim-res-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:100%; }
.sim-res-stat {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:16px 10px; text-align:center;
}
.srstat-val { font-family:var(--display); font-size:22px; font-weight:800; color:var(--accent3); }
.srstat-lbl { font-size:9px; font-family:var(--mono); color:var(--text3); text-transform:uppercase; letter-spacing:.07em; margin-top:4px; }

/* Scale bar */
.sim-scale-wrap { width:100%; }
.sim-scale-track {
  position:relative; height:10px;
  background:var(--surface3); border-radius:100px;
  margin:16px 0 4px; overflow:visible;
}
.sim-scale-fail-zone {
  position:absolute; left:0; top:0; bottom:0;
  background:rgba(255,78,106,.18); border-radius:100px 0 0 100px;
}
.sim-scale-pass-line {
  position:absolute; top:-6px; bottom:-6px; width:2px;
  background:var(--warning); border-radius:2px;
}
.sim-scale-pass-label {
  position:absolute; top:-22px; left:50%; transform:translateX(-50%);
  font-size:9px; font-family:var(--mono); color:var(--warning); white-space:nowrap;
}
.sim-scale-needle {
  position:absolute; top:50%; transform:translate(-50%,-50%);
  width:18px; height:18px; border-radius:50%;
  border:3px solid var(--bg2);
  box-shadow:0 2px 10px rgba(0,0,0,.5);
  transition:left 1s cubic-bezier(.34,1.56,.64,1);
  z-index:2;
}
.sim-scale-needle.pass { background:var(--success); box-shadow:0 0 10px rgba(16,217,140,.4); }
.sim-scale-needle.fail { background:var(--danger);  box-shadow:0 0 10px rgba(255,78,106,.4); }
.sim-scale-needle-val {
  position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
  font-size:10px; font-family:var(--mono); font-weight:700; white-space:nowrap;
  color:var(--text);
}
.sim-scale-ends {
  display:flex; justify-content:space-between;
  font-size:10px; font-family:var(--mono); color:var(--text3);
}

/* Section breakdown */
.sim-breakdown-card {
  width:100%;
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  padding:20px 20px;
}
.sim-bd-hdr { font-size:11px; font-family:var(--mono); color:var(--text3); letter-spacing:.08em; text-transform:uppercase; margin-bottom:16px; }
.sim-bd-row { display:grid; grid-template-columns:140px 1fr 80px; align-items:center; gap:12px; margin-bottom:12px; }
.sim-bd-row:last-child { margin-bottom:0; }
.sim-bd-label { font-size:13px; color:var(--text2); }
.sim-bd-bar-wrap { height:7px; background:var(--surface3); border-radius:100px; overflow:hidden; }
.sim-bd-bar { height:100%; border-radius:100px; transition:width 1s ease; }
.sim-bd-val { font-size:11px; font-family:var(--mono); font-weight:600; text-align:right; }

.sim-res-actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }

/* Mobile sim adjustments */
@media(max-width:640px) {
  .sim-top-bar { padding:10px 14px; }
  .sim-timer { font-size:14px; padding:4px 10px; }
  .ssi-title { font-size:22px; }
  .ssi-icon { font-size:42px; }
  .sim-intro-body { padding:28px 14px 80px; }
  .sim-ring-score { font-size:38px; }
  .sim-ring-wrap, .sim-ring-center { width:150px; height:150px; }
  .sim-ring-center { width:110px; height:110px; }
  .sim-result-body { padding:24px 14px 80px; gap:14px; }
  .sim-bd-row { grid-template-columns:90px 1fr 55px; gap:8px; }
  .sim-bd-label { font-size:12px; }
  .sim-res-stats { gap:8px; }
  .srstat-val { font-size:18px; }
  .sim-sec-badge { font-size:9px; }
  .ssi-rules { padding:12px 14px; }
  .ssi-cta { max-width:100%; }
}

</style>

<script>
const ALL_QUESTIONS = [{"id": 3, "type": "mc", "question": "Dispone de los dispositivos que se muestran en la siguiente tabla.\n\nPlanea implementar Azure Virtual Desktop para acceso de cliente a aplicaciones virtualizadas remotas.\n¿Qué dispositivos son compatibles con el cliente de Escritorio remoto?", "options": {"A": "Solo Dispositivo1 y Dispositivo2", "B": "Solo Dispositivo1 y Dispositivo3", "C": "Dispositivo1, Dispositivo2 y Dispositivo3", "D": "Solo Dispositivo1"}, "answer": "B"}, {"id": 4, "type": "hotspot", "question": "Planea implementar Azure Virtual Desktop. Los usuarios tienen los siguientes dispositivos:\n• Tablet: Windows 10 Pro\n• Phone: Android\n• Laptop: macOS\n\n¿Desde qué tipos de dispositivos pueden los usuarios conectarse a los recursos de Azure Virtual Desktop?", "subquestions": [{"label": "cliente de Escritorio remoto app", "options": ["Solo tableta", "Solo tableta y teléfono", "Solo tableta y portátil", "Tableta, teléfono y portátil"], "answer": "Tableta, teléfono y portátil"}, {"label": "cliente web de Escritorio remoto", "options": ["Solo tableta", "Solo tableta y teléfono", "Solo tableta y portátil", "Tableta, teléfono y portátil"], "answer": "Solo tableta y portátil"}]}, {"id": 5, "type": "hotspot", "question": "Dispone de una implementación de Azure Virtual Desktop. Planea crear los siguientes grupos de hosts de sesión:\n• Pool1: Asignado directamente a usuarios del departamento de gráficos, con renderización gráfica pesada y aplicaciones de cómputo intensivo, debe admitir almacenamiento premium\n• Pool2: agrupado para ~10 usuarios, ejecuta aplicaciones de Microsoft Office 365, requiere funciones de llamadas y reuniones en Teams, debe admitir almacenamiento premium\n\nNecesita recomendar el tamaño de máquina virtual para cada grupo de hosts. La solución debe minimizar los costos.", "subquestions": [{"label": "Pool1", "options": ["Serie Av2", "Serie Dsv4", "Serie NVv3"], "answer": "Serie NVv3"}, {"label": "Pool2", "options": ["Serie Av2", "Serie Dsv4", "Serie NVv3"], "answer": "Serie Dsv4"}]}, {"id": 6, "type": "mc", "question": "Planea implementar Azure Virtual Desktop para cumplir los requisitos departamentales que se muestran en la siguiente tabla.\n\nPlanea usar grupos de hosts de Azure Virtual Desktop con equilibrio de carga y escalado automático.\nNecesita recomendar un diseño de grupo de hosts que cumpla los requisitos. La solución debe minimizar los costos.\n¿Cuál es el número mínimo de grupos de hosts que debería recomendar?", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "C"}, {"id": 7, "type": "mc", "question": "Su empresa tiene una oficina principal y dos sucursales. Cada oficina se conecta directamente a Internet. El router en\ncada sucursal está configurado como punto de enlace para las siguientes VPN:\n\n✑ Una conexión VPN con la oficina principal\n✑ Una VPN de sitio un sitio con Azure\nLos routers en cada sucursal tienen las reglas de Quality de Servicio (QoS) que se muestran en la siguiente tabla.\n\nLos usuarios de la sucursal informan de respuestas lentas y errores de conexión al intentar conectarse a los recursos de Azure Virtual Desktop.\nNecesita modificar las reglas de QoS en los routers de las sucursales para mejorar el rendimiento de Azure Virtual Desktop.\n¿Para qué regla debería aumentar la asignación de ancho de banda?", "options": {"A": "Regla2", "B": "Regla3", "C": "Regla4", "D": "Regla1"}, "answer": "B"}, {"id": 8, "type": "mc", "question": "Planea implementar Azure Virtual Desktop. La implementación usará máquinas virtuales existentes.\nCrea un grupo de hosts de Azure Virtual Desktop llamado HostPool1.\nNecesita asegurarse de poder agregar las máquinas virtuales al grupo de hosts.\n¿Qué debería hacer primero?", "options": {"A": "Registrar el proveedor Microsoft.DesktopVirtualization.", "B": "Generar una clave de registro.", "C": "Ejecutar el cmdlet Invoke-AzVMRunCommand.", "D": "Crear una asignación de roles."}, "answer": "B"}, {"id": 9, "type": "mc", "question": "Está diseñando una implementación de Azure Virtual Desktop.\nIdentifica la latencia de red entre las ubicaciones donde se encuentran los usuarios reside y la implementación planificada.\n¿Qué debería usar para identificar la mejor región de Azure para implementar El grupo de hosts?", "options": {"A": "Crear una nueva galería de imágenes compartidas llamada SIG2 en Sur de India región. Cargar una copia de Image1 en SIG2.", "B": "Crear una nueva cuenta de almacenamiento de Azure llamada storage2 en la región Sur de India. Copiar Image1 una una carpeta compartida en storage2.", "C": "Desde SIG1, actualizar la replicación de la versión de imagen más reciente de Image1.", "D": "Configurar almacenamiento con redundancia geográfica (GRS) en storage1. Copiar el archivo VHD de Image1 al contenedor de perfiles FSLogix."}, "answer": "B"}, {"id": 10, "type": "mc", "question": "Dispone de un grupo de hosts de sesión de Azure Virtual Desktop llamado Pool1 en la región Este de EE. UU..\nDispone de una cuenta de almacenamiento llamada storage1 que contiene contenedores de perfiles FSLogix. En la región Este de EE. UU., tiene una galería de imágenes compartidas llamada SIG1 que contiene una imagen de máquina virtual llamada Image1. Image1 se usa para crear nuevos hosts de sesión en Pool1.\nPlanea implementar un nuevo grupo de hosts de Azure Virtual Desktop llamado Pool2 en la región Sur de India.\nNecesita implementar una solución de host de sesión para Pool2 que cumpla los siguientes requisitos:\n✑ Image1 debe replicarse en la región Sur de India.\n✑ Los hosts de sesión de Pool2 deben basarse en Image1.\n✑ Los cambios en Image1 deben estar disponibles en Sur de India y Este de EE. UU.\n¿Qué debería incluir en la solución?", "options": {"A": "Crear una nueva galería de imágenes compartidas llamada SIG2 en Sur de India región. Cargar una copia de Image1 en SIG2.", "B": "Crear una nueva cuenta de almacenamiento de Azure llamada storage2 en la región Sur de India. Copiar Image1 una una carpeta compartida en storage2.", "C": "Desde SIG1, actualizar la replicación de la versión de imagen más reciente de Image1.", "D": "Configurar almacenamiento con redundancia geográfica (GRS) en storage1. Copiar el archivo VHD de Image1 al contenedor de perfiles FSLogix."}, "answer": "C"}, {"id": 11, "type": "hotspot", "question": "Su red contiene un dominio de Active Directory local (on-premises). Todos los usuarios tienen equipos con Windows 10 Pro. Planea implementar Azure Virtual Desktop para cumplir los siguientes departamento requisitos:\n• Research: Ejecutar una aplicación que solo puede ejecutarse en Windows Server. La aplicación se publicará como RemoteApp.\n• Finance: ejecutan Windows 10 Enterprise multi-sesión.\n\nNecesita recomendar licencias para los departamentos. La solución debe minimizar los costos.", "subquestions": [{"label": "Research", "options": ["licencia Microsoft 365 Enterprise E3", "licencia Windows 10 Enterprise E3", "licencia de acceso de cliente (CAL) de Windows Server", "licencia de acceso de cliente de Servicios de Escritorio remoto de Windows Server (RDS CAL)"], "answer": "licencia de acceso de cliente de Servicios de Escritorio remoto de Windows Server (RDS CAL)"}, {"label": "Finance", "options": ["licencia Microsoft 365 Enterprise E3", "licencia Windows 10 Enterprise E3", "licencia de acceso de cliente (CAL) de Windows Server", "licencia de acceso de cliente de Servicios de Escritorio remoto de Windows Server (RDS CAL)"], "answer": "licencia Windows 10 Enterprise E3"}]}, {"id": 12, "type": "mc", "question": "Su empresa tiene 60,000 usuarios.\nPlanea implementar Azure Virtual Desktop.\nNecesita recomendar una solución de almacenamiento para los contenedores de perfiles FSLogix. La solución debe proporcionar los IOPS más altos posibles y la menor latencia.\n¿Qué debería recomendar?", "options": {"A": "Azure Data Lake Storage", "B": "Azure NetApp Files", "C": "Azure Blob Storage Premium", "D": "Azure Files Standard"}, "answer": "B"}, {"id": 13, "type": "mc", "question": "Su empresa tiene una sola oficina y 40 empleados.\nEstá planeando una implementación de Azure Virtual Desktop. Las cargas de trabajo de usuario estimadas se muestran en la siguiente tabla.\n\nLa mitad de los usuarios de cada tipo de carga de trabajo trabaja desde casa. Todos los usuarios que trabajan desde casa NO establecen una conexión VPN con la oficina.\n¿Aproximadamente cuánto ancho de banda se necesita entre la oficina y Azure para soportar las cargas de trabajo planificadas?", "options": {"A": "9.5 Mbps", "B": "55 Mbps", "C": "110 Mbps", "D": "220 Mbps"}, "answer": "B"}, {"id": 16, "type": "mc", "question": "Dispone de las implementaciones de Azure Virtual Desktop que se muestran en la siguiente tabla.\n\nPlanea implementar un nuevo grupo de hosts como se muestra en la siguiente tabla.\n\nNecesita asegurarse de poder implementar El grupo de hosts.\n\n¿Qué debería hacer?", "options": {"A": "Agregar un bloqueo al grupo de hosts existente.", "B": "Detener y desasignar una de las máquinas virtuales implementadas actualmente.", "C": "Ena través der una solicitud de soporte por límites de servicio y suscripción.", "D": "Cambiar el tamaño de máquina virtual propuesto para los hosts de sesión a D4s_v3."}, "answer": "C"}, {"id": 17, "type": "mc", "question": "Dispone de una suscripción de Azure que contiene 500 usuarios. Los usuarios tienen asignadas licencias de Microsoft Office 365 E1.\nImplementa una solución de Azure Virtual Desktop que contiene hosts de sesión Windows 10 multi-sesión y transmite una aplicación remota personalizada llamada App1.\nNecesita asegurarse de que los usuarios tengan licencia para transmitir App1. La solución debe minimizar los costos.\n¿Qué licencia debería usar?", "options": {"A": "Microsoft 365 E5", "B": "Office 365 E3", "C": "una licencia de acceso de cliente (CAL) de Servicios de Escritorio remoto (RDS)", "D": "Windows 10 Enterprise E3"}, "answer": "D"}, {"id": 18, "type": "dragdrop", "question": "Dispone de una suscripción de Azure que contiene una máquina virtual llamada VM1 que ejecuta una versión personalizada de Windows 10 Enterprise. Generaliza el SO en VM1 y apágala. Necesita implementar máquinas virtuales adicionales basadas en una imagen de VM1 desde el portal de Azure. ¿Cuáles tres acciones debería realizar en secuencia?", "actions": ["Crear una versión de imagen", "Crear una galería de imágenes compartidas de Azure", "Generar una instantánea de VM1", "Crear un definición de imagen", "Realizar copia de seguridad de VM1"], "answer": ["Crear una galería de imágenes compartidas de Azure", "Crear un definición de imagen", "Crear una versión de imagen"]}, {"id": 19, "type": "mc", "question": "Dispone de una implementación de Azure Virtual Desktop que contiene galería de imágenes compartidas de Azure. La galería contiene una definición de imagen con las siguientes versiones:\n• 1.0.0\n• 1.1.0\n• 1.2.0\nNecesita asegurarse de que cuando se crea una máquina virtual desde la galería, se usar la versión de imagen 1.1.0 de forma predeterminada.\n¿Qué debería hacer?", "options": {"A": "Seleccione Excluir de la última versión para la versión de imagen 1.0.0.", "B": "Seleccione Excluir de la última versión para la versión de imagen 1.2.0.", "C": "Aplicar un bloqueo una versión de imagen 1.1.0.", "D": "Aplicar una etiqueta llamada \"predeterminado\" a la versión de imagen 1.1.0."}, "answer": "B"}, {"id": 21, "type": "hotspot", "question": "Planea crear dos recursos compartidos de archivos llamados Share1 y Share2 que se usarán con Azure Virtual Desktop.\n• Share1 contendrá al menos 100 GB de datos y debe almacenarse en SSD.\n• Share2 debe poder cambiar entre niveles de almacenamiento optimizado para transacciones y esporádico, y debe almacenarse en HDD.\n\nNecesita recomendar qué tipo de cuentas de almacenamiento usar para los recursos compartidos. La solución debe minimizar los costos.", "subquestions": [{"label": "Share1", "options": ["Blobs en bloques Premium", "Recursos compartidos de archivos Premium", "Blobs en páginas Premium", "Uso general estándar v1", "Uso general estándar v2"], "answer": "Recursos compartidos de archivos Premium"}, {"label": "Share2", "options": ["Blobs en bloques Premium", "Recursos compartidos de archivos Premium", "Blobs en páginas Premium", "Uso general estándar v1", "Uso general estándar v2"], "answer": "Uso general estándar v2"}]}, {"id": 23, "type": "hotspot", "question": "Dispone de una implementación de Azure Virtual Desktop. Planea crear los siguientes grupos de hosts de sesión:\n• Pool1: Optimizado para cómputo, con alta relación CPU/memoria\n• Pool2: Optimizado para memoria, con alta relación memoria/CPU\n• Pool3: optimizado para GPU, renderización gráfica y edición de vídeo\n\nNecesita recomendar la máquina virtual tamaño para cada grupo de hosts de sesión.", "subquestions": [{"label": "Pool1", "options": ["Serie A", "Serie B", "Serie E", "Serie F", "Serie N"], "answer": "Serie F"}, {"label": "Pool2", "options": ["Serie A", "Serie B", "Serie E", "Serie F", "Serie N"], "answer": "Serie E"}, {"label": "Pool3", "options": ["Serie A", "Serie B", "Serie E", "Serie F", "Serie N"], "answer": "Serie N"}]}, {"id": 26, "type": "mc", "question": "Dispone de una implementación de Azure Virtual Desktop con un grupo de hosts que contiene cinco hosts de sesión que ejecutan Windows 10 Enterprise multi-sesión.\nNecesita evitar que los usuarios accedan a Internet desde las sesiones de Azure Virtual Desktop. Los hosts de sesión deben poder acceder a todos los servicios de Microsoft necesarios.\nSolución: Configura las propiedades RDP del grupo de hostss.\n¿Esto cumple el objetivo?", "options": {"A": "Sí", "B": "No"}, "answer": "B"}, {"id": 27, "type": "mc", "question": "Implementa un grupo de hosts de Azure Virtual Desktop llamado Pool1.\nDispone de una cuenta de almacenamiento de Azure llamada store1 que almacena contenedores de perfiles FSLogix en un recurso compartido llamado perfil las y los archivos de asignación.", "D": "Copiar los archivos a los hosts de sesión de Pool1."}, "answer": "D"}, {"id": 135, "type": "mc", "question": "Dispone de una implementación de Azure Virtual Desktop.\nlos hosts de sesión están unido a un dominio de Active Directory local (on-premises) llamado contoso.com.\nNecesita limitar usuario sesiones a tres horas.\n¿Qué debería configurar?", "options": {"A": "un grupo Directiva Object (GPO) en contoso.com.", "B": "el properties de el área de trabajo", "C": "el RDP Properties de un grupo de hosts de sesión", "D": "Acceso JIT (Just-In-Time) a VM"}, "answer": "A"}, {"id": 137, "type": "hotspot", "question": "Su red contiene un dominio de Active Directory local llamado contoso.com sincronizado con un tenant de Azure AD. Dispone de una suscripción de Azure con un grupo de hosts de sesión de Azure Virtual Desktop y una cuenta de almacenamiento llamada storage1. Necesita usar contenedores de perfiles FSLogix en storage1 para almacenar perfiles de usuario. Necesita configurar storage1 para la autenticación.\n\n¿Qué método de autenticación debe usar y qué debe hacer primero?", "subquestions": [{"label": "Método de autenticación para storage1:", "options": ["Identidad administrada asignada por el sistema", "Clave de cuenta de almacenamiento", "Identidad de Active Directory local (AD DS)", "Microsoft Entra Kerberos"], "answer": "Identidad de Active Directory local (AD DS)"}, {"label": "Lo primero que debe hacer:", "options": ["Unir storage1 a contoso.com", "Ejecutar el cmdlet Join-AzStorageAccountForAuth", "Asignar el rol de Colaborador de datos de archivos de Storage a los usuarios AVD", "Crear un punto de conexión privado para storage1"], "answer": "Ejecutar el cmdlet Join-AzStorageAccountForAuth"}]}, {"id": 139, "type": "mc", "question": "Dispone de lo siguiente:\n✑ Un tenant de Microsoft 365 E5\n✑ Un dominio de Active Directory local (on-premises)\n✑ Un tenant híbrido de Azure Active Directory (Azure AD)\n✑ Un dominio adminis orthwindtraders.com dominio sincronizacións con el Microsoft Entra tenant.\nMáquinas virtuales: La empresa tiene una máquina virtual Hyper-V local llamada VM1 con las siguientes configuraciones:\n•Generation: 1\n•Tamaño del disco: 2 TB\n•Disk format: VHDX\n•Tipo de disco: Expansión dinámica\nServicios en la nube Northwind Traders tiene una suscripción de Microsoft 365 E5. la suscripción contiene 500 usuarios que están asignados\nMicrosoft 365 E5 licenses.\nel empresa tiene un Azure suscripción que contiene los recursos que se muestran en la siguiente tabla.\n\nAmbos suscripciones están vinculada al Microsoft Entra tenant.\n\nRequisitos Planned Changes Northwind Traders identificar los siguientes planned changes:\n•Implementar un grupo de hosts de Azure Virtual Desktop de hosts de sesión que contendrá 10 hosts de sesión unido el Microsoft Entra Dominio\nServices dominio administrado.\n•Configurar VM1 como imagen de origen para la implementación de Azure Virtual Desktop y cargar la imagen en Azure.\n•el Azure Virtual Desktop implementación se proporciona acceder una una imagen personalizada de app llamado App1.\nRendimiento Requisitos -\n\nNorthwind Traders identificar los siguientes rendimiento requisitos:\n•Cada Azure Virtual Desktop host de sesión debe ser compatible con 15 usuario sesiones.\n•Cada nueva sesión de usuario debe asignarse a un único host de sesión hasta que se alcance el límite máximo de sesiones de ese host.\nApplication Requisitos Northwind Traders identificar los siguientes application requisitos:\n•Microsoft OneDrive debe launch cuando usuarios conectar a RemoteApp sesión en Azure Virtual Desktop.\n•App1 requiere a desktop resolution de 1280 x 1024.\n•El esfuerzo administrativo debe minimizarse.\nDisaster Recovery Requisitos Northwind Traders identificar los siguientes disaster recuperación requisitos para Azure Virtual Desktop\nimplementación:\n•Minimizar las interrupciones si una región de Azure falla.\n•Minimizar el objetivo de tiempo de recuperación (RTO).\n•minimizar el esfuerzo administrativo en caso de conmutación por error.\nSecurity Requisitos Northwind Traders identificar los siguientes requisitos de seguridad:\n•Cuando usuarios iniciar sesión en al Azure Virtual Desktop implementación usando el Azure Virtual Desktop cliente, ellos debe\n usando su Microsoft Entra usuarioname y password solo.\n•Cuando usuarios iniciar sesión en al Azure Virtual Desktop implementación usando a web browser, ellos debe autenticarse por\nmediante la aplicación Microsoft Auluegoticator.\n•Todos los Azure Virtual Desktop hosts de sesión implementado usando el VM1 source imagen debe ser incorporados a\nMicrosoft Defender para Endpoint.\n•el cliente versión y operating system usado para conectarse los hosts de sesión debe ser logged.\n•la solución debe seguir el principio de privilegio mínimo.\nRequisitos de red: Los hosts de sesión de Azure Virtual Desktop deben poder acceder a los recursos en el local (on-premises) red.\nUsuario Perfil Requisitos Northwind Traders identificar los siguientes usuario perfil requisitos:\n•Usuarios debe poder acceder un recurso compartido1 usando su Microsoft Entra cuenta.\n•Azure Virtual Desktop perfiles de usuario deben administrarse con FSLogix.\n•Todos usuario perfiles debe ser almacenados en recurso compartido1.\n¿Cuál monitoring solución debería Configura para cumplir requisitos de seguridad?", "options": {"A": "Azure Virtual Desktop Insights", "B": "Application Insights", "C": "VM insights", "D": "Azure Monitor activity registro insights"}, "answer": "D"}, {"id": 243, "type": "hotspot", "question": "Dispone de una implementación de Azure Virtual Desktop con los siguientes recursos: proarchivos1 (recurso compartido de Azure Files para perfiles FSLogix), Pool1 (grupo de hosts de sesión con 5 hosts de sesión con discos del SO). Necesita usar Azure Copia de seguridad para realizar copias de seguridad de proarchivos1 y de los hosts de sesión de Pool1 con la mayor frecuencia posible. ¿Con irtuales como hosts de sesión a un grupo de hosts de Azure Virtual\nDesktop grupo de hosts de sesión.\nMinimize cuánto tiempo ella takes a aprovisionar el Azure Virtual Desktop hosts de sesión basado en el personalizado virtual\nmachine imágenes.\nSiempre que sea posible, preinstalar agentes y aplicaciones en el personalizado máquina virtual imágenes.\nUsuario Perfil Requisitos Litware identificar los siguientes usuario perfil requisitos:\nEn storage1, store usuario perfiles para Boston oficina usuarios.\nAsegurarse de que que el usuario perfiles para Boston oficina usuarios replicar sincrónicamente entre dos región de Azures.\nAsegurarse de que que Admin1 usa a local perfil solo cuando signing en al Azure Virtual Desktop hosts de sesión. pregunta\nNecesita recomendar un solución que cumple el rendimiento requisitos.\n¿Cuáles dos acciones debería incluir en la recomendación? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.", "options": {"A": "Configurar la identidad de todos los hosts de sesión.", "B": "En cada región de Azure que contendrá el Azure Virtual Desktop hosts de sesión, crear un dominio administrado de Azure Active Directory Dominio Services (Azure AD DS) dominio administrado.", "C": "Implementar controlador de dominios para local (on-premises) Active Directory dominio en Azure máquinas virtuales al nuevo sites.", "D": "Implementar leer-solo controlador de dominios (RODCs) en Azure máquinas virtuales al nuevo sites.", "E": "En cada región de Azure que contendrá el Azure Virtual Desktop hosts de sesión, crear un sitio de Active Directory."}, "answer": "CE"}, {"id": 322, "type": "mc", "scenario": "**Empresa: Litware, Inc.** — Empresa farmacéutica con oficina principal en Boston (EE. UU.) y oficina remota en Chennai (India).\n\n**Entorno de identidad:**\n- Dominio de Active Directory local: litware.com, sincronizado con un tenant de Azure Active Directory (Azure AD) llamado litware.com.\n- Admin1: usuario files FSLogix en Azure Storage.\n- Permitir a Operator2 modificar las propiedades RDP de la implementación AVD de Montreal.\n- Desde un servidor llamado Server1, convertir los clics de perfil de usuario a contenedores de perfiles FSLogix.\n- Garantizar que las máquinas virtuales de Pool1 solo estén en ejecución durante el horario laboral.\n- Principio de mínimo privilegio.", "scenario_title": "Caso práctico: Contoso, Ltd. (Firma de abogados)", "question": "Planea implementar los contenedores de perfiles FSLogix para la oficina de Seattle.\n¿Qué cuenta de almacenamiento debería usar?", "options": {"A": "storage2", "B": "storage4", "C": "storage3", "D": "storage1"}, "answer": "D"}, {"id": 327, "type": "mc", "scenario": "**Empresa: Contoso, Ltd.** — Firma de abogados con oficina principal en Montreal y sucursales en París y Seattle (recientemente abierta).\nContoso tiene una suscripción de Azure y usa Microsoft 365.\n\n**Active Directory:**\n- Dominio local: contoso.com con tenant de Azure AD. Un controlador de dominio corre como máquina virtual de Azure en VNET1. DNS resuelto por los controladores de dominio.\n- Unidades organizativas (UO): MontrealUsuarios (sincronización con Azure AD Conectar), ParisUsuarios (sincronización con Azure AD Conectar), SeattleUsuarios (NO sincroniza con Azure AD).\n- Usuarios AD: Operator1 (Usuarios, Dominio Admins), Operator2 (MontrealUsuarios, Usuarios), Operator3 (SeattleUsuarios, Server Operators).\n- Usuarios solo en la nube: Admin1 (Colaborador de máquina virtual), Admin2 (Desktop Virtualization Contributor), Admin3 (Desktop Virtualization Host de sesión Operator), Admin4 (Desktop Virtualization Grupo de hosts de sesión Contributor).\n\n**Red:**\n- Todas las redes virtuales de Azure están emparejadas. La red local se conecta a las redes virtuales.\n- VNET4 fue creada recientemente y está emparejada con las demás redes, pero NO contiene máquinas virtuales de AVD.\n- Todos los servidores ejecutan Windows Server 2019. Los portátiles y // MODO SIMULACIÓN — RÉPLICA DEL EXAMEN AZ-140
// ══════════════════════════════════════════════════════════════════
const SIM_TOTAL   = 57;
const SIM_CASE_N  = 6;
const SIM_MINUTES = 150;
const SIM_PASS    = 700;
const SIM_MIN     = 100;
const SIM_MAX     = 1000;

// ── Categorizar preguntas ──────────────────────────────────────────
const Q_CASE = ALL_QUESTIONS.filter(q => q.scenario || q.scenario_title);
const Q_SERIES = ALL_QUESTIONS.filter(q => {
  if (q.scenario || q.scenario_title) return false;
  const t = (q.question || '').toLowerCase();
  return t.includes('esta pregunta forma parte de una serie') ||
    t.includes('esta secci') && t.includes('n contiene preguntas con el mismo escenario') ||
    t.includes('nota: esta secci') ||
    (t.includes('soluci') && t.includes('esto cumple el objetivo') &&
     (t.includes('nota:') || t.includes('serie') || t.includes('secci')));
});
const Q_REG = ALL_QUESTIONS.filter(q =>
  !Q_CASE.some(x => x.id === q.id) && !Q_SERIES.some(x => x.id === q.id)
);

let sim = null;
let _simTid = null;

// ── Construir secciones ────────────────────────────────────────────
function buildSimSections() {
  // Agrupar caso práctico por scenario_title
  const groups = {};
  Q_CASE.forEach(q => { const k = q.scenario_title || '__'; (groups[k] = groups[k] || []).push(q); });
  const sortedG = Object.values(groups).sort((a, b) => b.length - a.length);

  // Intentar tomar 6 del mismo caso
  let caseQs = [];
  for (const g of shuffle([...sortedG])) {
    if (g.length >= SIM_CASE_N) { caseQs = shuffle([...g]).slice(0, SIM_CASE_N); break; }
  }
  if (!caseQs.length && sortedG.length) {
    caseQs = shuffle([...sortedG[0]]).slice(0, Math.min(sortedG[0].length, SIM_CASE_N));
  }
  const cCount = caseQs.length;

  // Serie de preguntas
  const seriesPool = shuffle([...Q_SERIES]);
  const sMax = Math.min(seriesPool.length, 8, Math.max(0, SIM_TOTAL - cCount - 30));
  const seriesQs = seriesPool.slice(0, sMax);
  const sCount = seriesQs.length;

  // Preguntas regulares
  const regQs = shuffle([...Q_REG]).slice(0, SIM_TOTAL - cCount - sCount);

  const sections = [
    {
      id: 'regular', icon: '📝', label: 'Preguntas',
      color: '--accent3', canBack: true,
      info: 'Responde cada pregunta seleccionando la mejor opción disponible.',
      questions: regQs
    },
    {
      id: 'series', icon: '🔗', label: 'Serie de Preguntas',
      color: '--warning', canBack: false,
      info: 'Cada pregunta presenta una solución única al mismo escenario. Determina si cada solución cumple el objetivo establecido.',
      questions: seriesQs
    },
    {
      id: 'casestudy', icon: '📋', label: 'Caso Práctico',
      color: '--success', canBack: false,
      info: 'Lee el escenario completo y responde las preguntas basándote en la información proporcionada. Puedes consultar el escenario en cualquier momento.',
      questions: caseQs
    },
  ].filter(s => s.questions.length > 0);
  return sections;
}

// ── Iniciar simulación ─────────────────────────────────────────────
function startSimulation() {
  const sections = buildSimSections();
  sim = {
    sections,
    idx: 0,
    answers: {},
    revealed: new Set(),
    flags: new Set(),
    startTime: Date.now()
  };
  _loadSimSection(0);
  state.mode = 'simulation';
  state.screen = 'sim-section-intro';
  _startSimTimer();
  render();
}

function _loadSimSection(i) {
  const sec = sim.sections[i];
  sim.idx = i;
  state.questions = sec.questions;
  state.current = 0;
  state.answers = sim.answers;
  state.revealed = sim.revealed;
  state.flags = sim.flags;
}

// ── Timer ──────────────────────────────────────────────────────────
function _startSimTimer() {
  clearInterval(_simTid);
  _simTid = setInterval(() => {
    const left = SIM_MINUTES * 60000 - (Date.now() - sim.startTime);
    _tickTimer(left);
    if (left <= 0) { clearInterval(_simTid); finishSimulation(); }
  }, 1000);
}
function _tickTimer(left) {
  const el = document.getElementById('sim-timer');
  if (!el) return;
  if (left <= 0) { el.textContent = '0:00'; el.className = 'sim-timer danger'; return; }
  const m = Math.floor(left / 60000), s = Math.floor((left % 60000) / 1000);
  el.textContent = `${m}:${String(s).padStart(2,'0')}`;
  el.className = 'sim-timer' + (m < 5 ? ' danger' : m < 15 ? ' warn' : '');
}
function _timerStr() {
  if (!sim) return '--:--';
  const left = Math.max(0, SIM_MINUTES * 60000 - (Date.now() - sim.startTime));
  const m = Math.floor(left / 60000), s = Math.floor((left % 60000) / 1000);
  return `${m}:${String(s).padStart(2,'0')}`;
}

// ── Navegación ─────────────────────────────────────────────────────
window.beginSimSection = function () { state.screen = 'quiz'; render(); };
window.endSimSection   = function () { state.screen = 'sim-section-end'; render(); };
window.backToSimSection= function () { state.screen = 'quiz'; render(); };
window.finishSimSection= function () {
  const next = sim.idx + 1;
  if (next >= sim.sections.length) { finishSimulation(); return; }
  _loadSimSection(next);
  state.screen = 'sim-section-intro';
  render();
};
window.finishSimulation = function () {
  clearInterval(_simTid);
  state.screen = 'sim-score';
  render();
};
window.retrySimulation = function () { startSimulation(); };

// ── Calcular resultado ─────────────────────────────────────────────
function getSimResult() {
  let tot = 0, cor = 0;
  const by = sim.sections.map(s => {
    let sc = 0;
    s.questions.forEach(q => { if (checkAnswer(q, sim.answers[q.id])) sc++; });
    tot += s.questions.length; cor += sc;
    return { ...s, correct: sc };
  });
  const score = Math.round(SIM_MIN + (cor / tot) * (SIM_MAX - SIM_MIN));
  const elapsed = Date.now() - sim.startTime;
  return { score, cor, tot, passed: score >= SIM_PASS, by, elapsed };
}

    </div>

}

  return `<div class="sim-wrap">
    ${_simTopBar(`Sección ${n} de ${tot}`)}

      <div class="ssi-rules">
        <div class="ssi-rule"><span class="ssi-rule-dot ok">✓</span>Navega libremente entre preguntas de esta sección</div>

      </div>
      <button class="btn btn-primary ssi-cta" onclick="beginSimSection()">Iniciar Sección ${n} →</button>
    </div>
  </div>`;
}

// ── Render: resumen fin de sección ─────────────────────────────────
function renderSimSectionEnd() {
  const sec = sim.sections[sim.idx];
  const isLast = sim.idx === sim.sections.length - 1;
  const ans = sec.questions.filter(q => sim.answers[q.id] !== undefined).length;
  const flagged = sec.questions.filter(q => sim.flags.has(q.id)).length;
  const unans = sec.questions.length - ans;

  return `<div class="sim-wrap">
    ${_simTopBar(`Resumen — ${sec.label}`)}
    <div class="sim-intro-body">
      <div class="ssi-eyebrow">Revisar Sección ${sim.idx + 1}</div>
      <div class="ssi-icon">📊</div>
      <h2 class="ssi-title">${escHtml(sec.label)}</h2>
      <div class="ssi-info">${ans} / ${sec.questions.length} respondidas${flagged ? ` · ${flagged} marcada${flagged!==1?'s':''}` : ''}</div>
      ${unans > 0
        ? `<div class="ssi-alert">⚠️ <strong>${unans} pregunta${unans>1?'s':''} sin responder.</strong><br>Quedarán como incorrectas. ¿Deseas continuar?</div>`
        : `<div class="ssi-ok">✓ ¡Todas las preguntas de esta sección respondidas!</div>`
      }
      <div class="ssi-nav-btns">
        <button class="btn btn-secondary" onclick="backToSimSection()">← Revisar preguntas</button>
        ${isLast
          ? `<button class="btn btn-success" onclick="finishSimulation()">Finalizar Examen 🏁</button>`
          : `<button class="btn btn-primary" onclick="finishSimSection()">Continuar → Sección ${sim.idx + 2}</button>`
        }
      </div>
    </div>
  </div>`;
}

function bindSimSectionIntro(){}
function bindSimSectionEnd(){}
function bindSimScore(){}

let state = {
  screen:'welcome', mode:'exam',
  examCount: 0, // 0 = todas
  questions:[], current:0,
  answers:{}, flags:new Set(), revealed:new Set(), startTime:null
};

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(){
  if(state.mode==='simulation'){startSimulation();return;}
  let pool=shuffle(ALL_QUESTIONS);
  if(state.mode==='exam' && state.examCount>0){
    pool=pool.slice(0,state.examCount);
  }
  state.questions=pool;
  state.current=0; state.answers={}; state.flags=new Set(); state.revealed=new Set();
  state.startTime=Date.now(); state.screen='quiz'; render();
}

function getCorrectAnswer(q){
  if(q.type==='mc')return q.answer;
  if(q.type==='hotspot')return q.subquestions.map(s=>s.answer);
  if(q.type==='dragdrop')return q.answer;
}

function checkAnswer(q,ua){
  if(!ua)return false;
  if(q.type==='mc'){
    const ca=q.answer||''; const uca=String(ua||'');
    // Multi-answer (e.g. "AE", "CE", "BD")
    if(ca.length>1 && /^[A-F]+$/.test(ca)){
      const caSet=new Set(ca.split(''));
      const uaSet=new Set(uca.split('').filter(c=>/[A-F]/.test(c)));
      return caSet.size===uaSet.size && [...caSet].every(c=>uaSet.has(c));
    }
    return uca===ca;
  }
  if(q.type==='hotspot'){
    if(!Array.isArray(ua))return false;
    return q.subquestions.every((s,i)=>ua[i]===s.answer);
  }
  if(q.type==='dragdrop'){
    if(!Array.isArray(ua))return false;
    return JSON.stringify(ua)===JSON.stringify(q.answer);
  }
  return false;
}

function render(){
  const app=document.getElementById('app');
  if(state.screen==='welcome'){app.innerHTML=renderWelcome();bindWelcome();buildBottomNav();return;}
  if(state.screen==='score'){app.innerHTML=renderScore();bindScore();buildBottomNav();return;}
  if(state.screen==='sim-section-intro'){app.innerHTML=renderSimSectionIntro();bindSimSectionIntro();_tickTimer(sim?SIM_MINUTES*60000-(Date.now()-sim.startTime):0);return;}
  if(state.screen==='sim-section-end'){app.innerHTML=renderSimSectionEnd();bindSimSectionEnd();_tickTimer(sim?SIM_MINUTES*60000-(Date.now()-sim.startTime):0);return;}
  if(state.screen==='sim-score'){app.innerHTML=renderSimScore();bindSimScore();buildBottomNav();return;}
  app.innerHTML=renderQuiz();bindQuiz();
}
