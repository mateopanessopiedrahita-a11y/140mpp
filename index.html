  <div class="scenario-header" onclick="toggleScenario(${q.id})">
    <div class="scenario-title">📋 ${escHtml(title)}</div>
    <div class="scenario-toggle" id="scen-toggle-${q.id}">▼ Ver escenario</div>
  </div>
  <div class="scenario-body" id="scen-body-${q.id}">
    <div class="scenario-text">${fmtBody}</div>
  </div>
</div>`;
}

function renderQuestion(q,answered){
  if(q.type==='mc')return renderMC(q,answered);
  if(q.type==='hotspot')return renderHotspot(q,answered);
  if(q.type==='dragdrop')return renderDragDrop(q,answered);
  return'';
}

function renderMC(q,answered){
  const user=state.answers[q.id];
  const ca=q.answer||'';
  const isMulti=ca.length>1&&/^[A-F]+$/.test(ca);
  const keys=Object.keys(q.options);
  return`<div class="q-text">${escHtml(q.question)}</div>
  ${isMulti?`<p style="font-size:11px;color:var(--text3);margin-bottom:12px;font-family:var(--mono)">✦ Seleccione ${ca.length} respuestas correctas</p>`:''}
  <div class="options">${keys.map(k=>{
    let cls='';
    const selected=Array.isArray(user)?user.includes(k):user===k;
    if(answered){
      if(ca.includes(k))cls='correct';
      else if(selected)cls='wrong';
      cls+=' disabled';
    }else if(selected)cls='selected';
    return`<div class="option ${cls}" onclick="${answered?'':isMulti?`selectMCMulti('${k}')`:  `selectMC('${k}')`}">
      <div class="option-key">${k}</div><div>${escHtml(q.options[k])}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderHotspot(q,answered){
  const user=state.answers[q.id]||[];
  return`<div class="q-text">${escHtml(q.question)}</div>
  <div class="subquestions">${q.subquestions.map((s,i)=>{
    const uAns=user[i];
    return`<div class="subq">
      <div class="subq-label">${escHtml(s.label)}</div>
      <div class="subq-options">${s.options.map(o=>{
        let cls='';
        if(answered){
          if(o===s.answer)cls='correct';
          else if(o===uAns&&o!==s.answer)cls='wrong';
          cls+=' disabled';
        }else if(o===uAns)cls='selected';
        return`<div class="subq-option ${cls}" onclick="${answered?'':  `selectSubq(${i},'${escAttr(o)}')`}">
          <div class="subq-radio"></div>${escHtml(o)}
        </div>`;
      }).join('')}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderDragDrop(q,answered){
  const user=state.answers[q.id]||[];
  const placed=new Set(user);
  const numSlots=q.answer.length;
  return`<div class="q-text">${escHtml(q.question)}</div>
  <div class="dragdrop-container">
    <div class="dd-col">
      <div class="dd-col-title">Acciones disponibles</div>
      <div class="dd-actions">${q.actions.map(a=>{
        const isPlaced=placed.has(a);
        return`<div class="dd-item ${isPlaced?'placed':''} ${answered?'disabled':''}" onclick="${answered||isPlaced?'':  `ddSelect('${escAttr(a)}')`}">
          ${escHtml(a)}
          ${isPlaced?'<span style="color:var(--accent3);font-size:10px">✓</span>':'<span style="font-size:10px;color:var(--text3)">→</span>'}
        </div>`;
      }).join('')}</div>
    </div>
    <div class="dd-col">
      <div class="dd-col-title">Respuesta (en orden)</div>
      ${Array.from({length:numSlots},(_,i)=>{
        const val=user[i];
        let cls='';
        if(answered&&val)cls=val===q.answer[i]?'correct':'wrong';
        else if(val)cls='filled';
        return`<div class="dd-answer-slot ${cls}">
          <div style="display:flex;align-items:center;gap:7px">
            <div class="dd-slot-num">${i+1}</div>
            <span>${val?escHtml(val):'<span style="color:var(--text3);font-style:italic">Selecciona una acción...</span>'}</span>
          </div>
          ${val&&!answered?`<button class="dd-remove" onclick="ddRemove(${i})">✕</button>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderFeedback(q){
  const user=state.answers[q.id];
  const correct=checkAnswer(q,user);
  if(q.type==='mc'){
    const ca=q.answer||'';
    const isMulti=ca.length>1&&/^[A-F]+$/.test(ca);
    let correctText='';
    if(!correct){
      if(isMulti){
        correctText='Respuestas correctas: '+ca.split('').map(k=>`<strong>${k}. ${escHtml(q.options[k]||'')}</strong>`).join(', ');
      }else{
        correctText=`Respuesta correcta: <strong>${ca}. ${escHtml(q.options[ca]||'')}</strong>`;
      }
    }
    return`<div class="feedback ${correct?'correct':'wrong'}">
      <span class="feedback-icon">${correct?'✓':'✗'}</span>
      <div><strong>${correct?'¡Correcto!':'Incorrecto'}</strong>${correctText}</div>
    </div>`;
  }
  if(q.type==='hotspot'){
    const wrong=q.subquestions.filter((s,i)=>(user||[])[i]!==s.answer);
    return`<div class="feedback ${correct?'correct':'wrong'}">
      <span class="feedback-icon">${correct?'✓':'✗'}</span>
      <div><strong>${correct?'¡Todas correctas!':'Algunas respuestas incorrectas'}</strong>
      ${wrong.map(s=>`<div style="margin-top:3px">→ <em>${escHtml(s.label)}</em>: <strong>${escHtml(s.answer)}</strong></div>`).join('')}
      </div>
    </div>`;
  }
  if(q.type==='dragdrop'){
    return`<div class="feedback ${correct?'correct':'wrong'}">
      <span class="feedback-icon">${correct?'✓':'✗'}</span>
      <div><strong>${correct?'¡Orden correcto!':'Orden incorrecto'}</strong>
      ${!correct?`<div style="margin-top:5px">Orden correcto: ${q.answer.map((a,i)=>`<strong>${i+1}. ${escHtml(a)}</strong>`).join(' → ')}</div>`:''}
      </div>
    </div>`;
  }
  return'';
}

function renderScore(){
  const total=state.questions.length;
  const answered=Object.keys(state.answers).length;
  const correct=state.questions.filter(q=>checkAnswer(q,state.answers[q.id])).length;
  const pct=Math.round(correct/total*100);
  const elapsed=Math.round((Date.now()-state.startTime)/1000);
  const mins=Math.floor(elapsed/60),secs=elapsed%60;
  const pass=pct>=70;
  return`<div class="score-screen">
  <div class="score-ring" style="--pct:${pct}">
    <div class="score-inner">
      <div class="score-pct">${pct}%</div>
      <div class="score-label">PUNTUACIÓN</div>
    </div>
  </div>
  <div class="score-title">${pass?'🎉 ¡Aprobado!':'📚 Sigue practicando'}</div>
  <div class="score-sub">${pass?`¡Excelente! Superaste el umbral mínimo del 70% para el examen AZ-140.`:`Necesitas al menos 70% para aprobar el AZ-140. ¡No te rindas!`}<br>
  <span style="font-size:12px;color:var(--text3);font-family:var(--mono)">Tiempo: ${mins}m ${secs}s</span></div>
  <div class="score-grid">
    <div class="score-stat"><div class="score-stat-val" style="color:var(--success)">${correct}</div><div class="score-stat-lbl">CORRECTAS</div></div>
    <div class="score-stat"><div class="score-stat-val" style="color:var(--danger)">${answered-correct}</div><div class="score-stat-lbl">INCORRECTAS</div></div>
    <div class="score-stat"><div class="score-stat-val" style="color:var(--text3)">${total-answered}</div><div class="score-stat-lbl">SIN RESPONDER</div></div>
  </div>
  <div style="display:flex;gap:11px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-primary" onclick="restartQuiz()">🔄 Nuevo intento</button>
    <button class="btn btn-secondary" onclick="reviewWrong()">Revisar incorrectas (${answered-correct})</button>
    <button class="btn btn-ghost" onclick="backToWelcome()">Inicio</button>
  </div>
</div>`;
}

function bindScore(){
  window.restartQuiz=startQuiz;
  window.backToWelcome=()=>{state.screen='welcome';render();};
  window.reviewWrong=()=>{
    const wrong=state.questions.filter(q=>!checkAnswer(q,state.answers[q.id]));
    if(!wrong.length)return;
    state.questions=wrong; state.current=0; state.answers={}; state.revealed=new Set();
    state.mode='study'; state.screen='quiz'; render();
  };
}

function bindQuiz(){
  window.toggleScenario=function(id){
    const body=document.getElementById('scen-body-'+id);
    const toggle=document.getElementById('scen-toggle-'+id);
    if(body.classList.contains('open')){body.classList.remove('open');toggle.textContent='▼ Ver escenario';}
    else{body.classList.add('open');toggle.textContent='▲ Ocultar';}
  };
  window.goTo=function(i){if(i<0||i>=state.questions.length)return;state.current=i;render();};
  window.skipQuestion=function(){if(state.current<state.questions.length-1){state.current++;render();}};
  window.toggleFlag=function(id){if(state.flags.has(id))state.flags.delete(id);else state.flags.add(id);render();};
  window.finishQuiz=function(){state.screen='score';render();};

  // MC single
  window.selectMC=function(key){
    const q=state.questions[state.current];
    state.answers[q.id]=key;
    if(state.mode==='study'){state.revealed.add(q.id);render();return;}
    document.querySelectorAll('.option').forEach(el=>el.classList.remove('selected'));
    const keys=Object.keys(q.options);
    const opts=document.querySelectorAll('.option');
    const idx=keys.indexOf(key);
    if(opts[idx])opts[idx].classList.add('selected');
    const btn=document.getElementById('submit-btn');
    if(btn)btn.disabled=false;
    syncBnavConfirm();
  };
  // MC multi
  window.selectMCMulti=function(key){
    const q=state.questions[state.current];
    const ca=q.answer||'';
    const numCorrect=ca.length;
    let sel=Array.isArray(state.answers[q.id])?[...state.answers[q.id]]:[];
    const idx=sel.indexOf(key);
    if(idx>=0)sel.splice(idx,1);
    else if(sel.length<numCorrect)sel.push(key);
    state.answers[q.id]=sel;
    if(state.mode==='study'&&sel.length===numCorrect){state.revealed.add(q.id);render();return;}
    render();
    const btn=document.getElementById('submit-btn');
    if(btn)btn.disabled=sel.length!==numCorrect;
    syncBnavConfirm();
  };

  window.submitAnswer=function(){
    const q=state.questions[state.current];
    if(state.answers[q.id]===undefined||state.answers[q.id]===null)return;
    state.revealed.add(q.id);render();
  };
  window.selectSubq=function(i,val){
    const q=state.questions[state.current];
    const ans=state.answers[q.id]?[...state.answers[q.id]]:Array(q.subquestions.length).fill(undefined);
    ans[i]=val;state.answers[q.id]=ans;
    const allFilled=q.subquestions.every((_,j)=>ans[j]!==undefined);
    if(state.mode==='study'&&allFilled){state.revealed.add(q.id);render();return;}
    render();
    const btn=document.getElementById('submit-btn');
    if(btn)btn.disabled=!allFilled;
    syncBnavConfirm();
  };
  window.ddSelect=function(val){
    const q=state.questions[state.current];
    const ans=state.answers[q.id]?[...state.answers[q.id]]:[];
    if(ans.length>=q.answer.length)return;
    ans.push(val);state.answers[q.id]=ans;
    const full=ans.length===q.answer.length;
    if(state.mode==='study'&&full){state.revealed.add(q.id);render();return;}
    render();
    const btn=document.getElementById('submit-btn');
    if(btn)btn.disabled=!full;
    syncBnavConfirm();
  };
  window.ddRemove=function(i){
    const q=state.questions[state.current];
    const ans=[...(state.answers[q.id]||[])];
    ans.splice(i,1);state.answers[q.id]=ans;render();
    const btn=document.getElementById('submit-btn');
    if(btn)btn.disabled=ans.length<q.answer.length;
  };
  // Re-enable submit if answer exists
  const q=state.questions[state.current];
  if(!state.revealed.has(q.id)&&state.answers[q.id]!==undefined){
    setTimeout(()=>{const btn=document.getElementById('submit-btn');if(btn)btn.disabled=false;},50);
  }
  // Build bottom nav
  buildBottomNav();
}

function buildBottomNav(){
  let nav=document.getElementById('bottom-nav');
  if(!nav){ nav=document.createElement('div'); nav.id='bottom-nav'; document.body.appendChild(nav); }
  if(!state||state.screen!=='quiz'){ nav.style.display='none'; return; }
  if(state.mode==='simulation'&&sim&&state.screen!=='quiz'){ nav.style.display='none'; return; }
  nav.style.display='flex';
  const q=state.questions[state.current];
  const answered=state.revealed.has(q.id);
  const isLast=state.current===state.questions.length-1;
  const hasPrev=state.current>0;
  let btns='';
  if(hasPrev)
    btns+=`<button class="bnav-btn" onclick="goTo(${state.current-1})"><span class="bnav-icon">←</span></button>`;
  if(!answered)
    btns+=`<button class="bnav-btn primary" id="bnav-confirm" onclick="submitAnswer()" disabled><span class="bnav-icon">✓</span> Confirmar</button>`;
  else if(!isLast)
    btns+=`<button class="bnav-btn primary" onclick="goTo(${state.current+1})">Siguiente <span class="bnav-icon">→</span></button>`;
  else
    btns+=(state.mode==="simulation"&&sim)?`<button class="bnav-btn primary" onclick="endSimSection()">Finalizar Sección →</button>`:`<button class="bnav-btn success" onclick="finishQuiz()">Resultados 🏁</button>`;
  if(state.mode==='exam')
    btns+=`<button class="bnav-btn" onclick="finishQuiz()" title="Terminar"><span class="bnav-icon">⏹</span></button>`;
  nav.innerHTML=btns;
  // Sync confirm button state
  syncBnavConfirm();
}

function syncBnavConfirm(){
  const btn=document.getElementById('bnav-confirm');
  if(!btn) return;
  const q=state.questions[state.current];
  const ans=state.answers[q.id];
  let ready=false;
  if(q.type==='mc'){
    const ca=q.answer||'';
    const isMulti=ca.length>1&&/^[A-F]+$/.test(ca);
    if(isMulti) ready=Array.isArray(ans)&&ans.length===ca.length;
    else ready=ans!==undefined&&ans!==null;
  } else if(q.type==='hotspot'){
    ready=Array.isArray(ans)&&q.subquestions.every((_,i)=>ans[i]!==undefined);
  } else if(q.type==='dragdrop'){
    ready=Array.isArray(ans)&&ans.length===q.answer.length;
  }
  btn.disabled=!ready;
}

function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){if(!s)return'';return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

render();
</script>

<script>
// ═══════════════════════════════════════════════════
// PWA — SERVICE WORKER (offline + cache)
// ═══════════════════════════════════════════════════
(function(){
  if(!('serviceWorker' in navigator)) return;
  const swCode = `
    const V='az140-v3';
    const FONTS=[
      'https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap'
    ];
    self.addEventListener('install', e=>{
      self.skipWaiting();
      e.waitUntil(
        caches.open(V).then(c=>c.addAll([self.location.href,...FONTS]).catch(()=>c.add(self.location.href)))
      );
    });
    self.addEventListener('activate', e=>{
      e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==V).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch', e=>{
      e.respondWith(
        caches.match(e.request).then(r=>{
          if(r) return r;
          return fetch(e.request).then(resp=>{
            if(resp && resp.status===200 && resp.type==='basic'){
              const clone=resp.clone();
              caches.open(V).then(c=>c.put(e.request,clone));
            }
            return resp;
          }).catch(()=>caches.match(self.location.href));
        })
      );
    });
  `;
  window.addEventListener('load',()=>{
    try{
      const blob=new Blob([swCode],{type:'application/javascript'});
      const url=URL.createObjectURL(blob);
      navigator.serviceWorker.register(url)
        .then(r=>{ if(r.waiting) r.waiting.postMessage({type:'SKIP_WAITING'}); })
        .catch(()=>{});
    }catch(e){}
  });
})();

// ═══════════════════════════════════════════════════
// iOS — Swipe entre preguntas
// ═══════════════════════════════════════════════════
(function(){
  let startX=0, startY=0, moving=false;
  document.addEventListener('touchstart',e=>{
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    moving=false;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(Math.abs(e.touches[0].clientY-startY)>20) moving=true;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(moving) return;
    const dx=e.changedTouches[0].clientX-startX;
    const dy=Math.abs(e.changedTouches[0].clientY-startY);
    if(Math.abs(dx)<60||dy>40) return;
    if(typeof state==='undefined'||state.screen!=='quiz') return;
    if(dx<-60 && state.current<state.questions.length-1){
      state.current++; render();
      document.querySelector('.q-card')?.scrollIntoView({behavior:'smooth',block:'start'});
    } else if(dx>60 && state.current>0){
      state.current--; render();
      document.querySelector('.q-card')?.scrollIntoView({behavior:'smooth',block:'start'});
    }
  },{passive:true});
})();

// ═══════════════════════════════════════════════════
// iOS — Banner de instalación
// ═══════════════════════════════════════════════════
(function(){
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches;
  if(!isIOS||isStandalone) return;
  if(sessionStorage.getItem('az140-banner-dismissed')) return;

  window.addEventListener('load',()=>{
    setTimeout(()=>{
      const el=document.createElement('div');
      el.id='ios-install-banner';
      el.innerHTML=`
        <div class="iib-icon">AZ</div>
        <div class="iib-text">
          <div class="iib-title">Agregar al Inicio</div>
          <div class="iib-desc">Toca <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v13M7 7l5-5 5 5"/><rect x="3" y="14" width="18" height="7" rx="2"/></svg> y luego <b>"Añadir a inicio"</b></div>
        </div>
        <button class="iib-close" onclick="document.getElementById('ios-install-banner').remove();sessionStorage.setItem('az140-banner-dismissed','1')">✕</button>
      `;
      document.body.appendChild(el);
      // Arrow pointing down to the share button
      const arrow=document.createElement('div');
      arrow.id='ios-install-arrow';
      arrow.innerHTML='↓';
      document.body.appendChild(arrow);
      setTimeout(()=>{
        if(el.parentNode) el.style.transform='translateY(0)';
        if(arrow.parentNode) arrow.style.opacity='1';
      },100);
    },3000);
  });
})();
</script>
