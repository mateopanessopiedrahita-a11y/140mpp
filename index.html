1 to perform routine maintenance.\nNecesita prevent new user sessions to Host1 without disconnecting active user sessions.\nSolution: From the properties of the máquina virtual of Host1, you enable just-in-time (JIT) VM access.\n¿Esto cumple el objetivo?","options":{"A":"Sí","B":"No"},"answer":"B"},{"id":201,"type":"mc","question":"Dispone de an Azure Virtual Desktop grupo de hosts that runs Windows 10 Enterprise multi-session.\nUser sessions are load-balanced between the host de sesións. Idle session timeout is 30 minutes.\nPlanea shut down a host de sesión named Host1 to perform routine maintenance.\nNecesita prevent new user sessions to Host1 without disconnecting active user sessions.\nSolution: From the grupo de hosts, you remove Host1 from the host de sesión list.\n¿Esto cumple el objetivo?","options":{"A":"Sí","B":"No"},"answer":"B"},{"id":202,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación.\nPlanea implement the Start/Stop VMs during off-hours feature.\nNecesita ensure that you can stop the host de sesións automatically based on the CPU utilization.\n¿Qué debería hacer on the host de sesións?","options":{"A":"Install the Azure Virtual Desktop Agent","B":"Enable change tracking","C":"Configure the Power Management settings","D":"Configure the Diagnostic settings"},"answer":"D"},{"id":203,"type":"mc","question":"Dispone de an Azure Virtual Desktop grupo de hosts in the East US region.\nNecesita implement a disaster recovery solution that meets the following requirements:\n✑ If users cannot connect to the Azure Virtual Desktop resources in the East US region, the users must be able to\nconnect to the equivalent resources in the\nWest US region.\n✑ Users must connect to the Azure Virtual Desktop resources in either the East US or the West US region by\n\nselecting a single icon in the cliente de Escritorio remotoׁ\n✑ In the event of a disaster, failover between the Azure regions must be initiated manually by an administrator.\n✑ Failover times must be minimized.\n¿Qué debería hacer?","options":{"A":"Configure a galería de imágenes compartidas that has replicas in the East US and West US regions","B":"Create new host de sesións in the West US region and add the host de sesións to an existing grupo de hosts","C":"Create an additional grupo de hosts in the West US region","D":"Enable Azure Site Recovery replicación of the máquina virtuals to the West US region","E":"Enable Azure Backup to a Recovery Services vault in the West US region"},"answer":"C"},{"id":204,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación.\nNecesita monitor the implementación by using the Azure Virtual Desktop Insights solution in Azure Monitor.\nWhat should you use as the Diagnostic settings destination for the grupo de hosts?","options":{"A":"Event hub","B":"Log Analytics área de trabajo","C":"Storage account"},"answer":"B"},{"id":205,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación.\nIn Azure Advisor, you discover the following recommendation related to Azure Virtual Desktop:\n✑ Impact: Medium\n✑ Description: No validation environment enabled\n✑ Potential Benefit: Ensure business continuity through AVD service implementacións\n✑ Impacted Resource: 1 Grupo de hosts\nWhat can you validate by implementing the recommendations?","options":{"A":"Security settings of Azure Virtual Desktop","B":"Capacity requirements of host de sesións","C":"Azure Site Recovery failover of the host de sesións","D":"Preview features for Azure Virtual Desktop"},"answer":"D"},{"id":206,"type":"mc","question":"Dispone de an Azure Virtual Desktop grupo de hosts.\nYou add a French language pack to each host de sesión in the grupo de hosts.\nSeveral days later, users report that English displays when they connect to Azure Virtual Desktop.\nAfter an investigation, you discover that the French language pack was removed, and the host de sesións reverted to\nEnglish.\nNecesita ensure that the French language pack is always available on the host de sesións.\n¿Qué debería hacer?","options":{"A":"Configure the international settings on each host","B":"Assign a default time zone on each host","C":"Apply a Group Policy setting to disable the Time & language settings","D":"Apply a Group Policy setting that blocks the cleanup of unused language packs"},"answer":"D"},{"id":207,"type":"hotspot","question":"Dispone de una implementación de Azure Virtual Desktop. Está configurando los ajustes del firewall de salida para el grupo de hosts. ¿Qué URL de salida y qué puerto de salida debe configurar para garantizar que los hosts mantengan la activación de Windows?","subquestions":[{"label":"URL de salida para la activación de Windows:","options":["azkms.core.windows.net","kms.core.windows.net","activation.sls.microsoft.com","go.microsoft.com"],"answer":"azkms.core.windows.net"},{"label":"Puerto de salida para la activación de Windows:","options":["80","443","1688","3389"],"answer":"1688"}]},{"id":208,"type":"mc","question":"Your network contains an local (on-premises) Active Directory domain named contoso.com that syncs to an Azure Active\nDirectory (Azure AD) tenant.\nYou have an Azure Virtual Desktop grupo de hosts named Pool1 that has the following settings:\n✑ Host pool name: Pool1\n✑ Host pool type: Personal\n✑ Equilibrio de carga algorithm: Amplitud primero\nNumber of VMs: 3 The host de sesións have the following configurations:\n✑ Image used to create the máquina virtuals: Windows 10 Enterprise\n✑ Virtual machines domain-joined to: Local (on-premises) contoso.com domain\nYou need to ensure that you can use Microsoft EndPoint Manager to manage security update on the host de sesións.\n¿Qué debería hacer?","options":{"A":"Create Windows 10 Enterprise multi-session images","B":"Configure the host de sesións as hybrid Azure AD-joined","C":"Change Host pool type to Pooled","D":"Change Equilibrio de carga algorithm to Profundidad primero"},"answer":"B"},{"id":209,"type":"mc","question":"Dispone de an Azure suscripción that contains the resources shown in the following table.\n\nCrea a recovery services vault named Vault1.\n¿Cuál resources can you back up using Azure Backup to Vault1?","options":{"A":"AVDVM-0 only","B":"AVDVM-0 and share1 only","C":"AVDVM-0, Image1, and Image2 only","D":"AVDVM-0, share1, and Image1 only","E":"AVDVM-0, share1, Image1, and Image2"},"answer":"E"},{"id":210,"type":"mc","question":"Dispone de an Azure Virtual Desktop grupo de hosts that runs Windows 10 Enterprise multi-session.\nUser sessions are load-balanced between the host de sesións. Idle session timeout is 30 minutes.\nPlanea shut down a host de sesión named Host1 to perform routine maintenance.\nNecesita prevent new user sessions to Host1 without disconnecting active user sessions.\nSolution: From the properties of the máquina virtual of Host1, you configure the Auto-shutdown settings.\n¿Esto cumple el objetivo?","options":{"A":"Sí","B":"No"},"answer":"B"},{"id":211,"type":"hotspot","question":"Dispone de una suscripción de Azure. Planea implementar una solución de Azure Virtual Desktop en la región Este de EE. UU. con los recursos: HostPool1 y HostPool2 (grupos de hosts), storage1 (cuenta de almacenamiento para FSLogix). Necesita recomendar una solución de continuidad del negocio que permita a los usuarios conectarse a HostPool1 si falla un centro de datos en el Este de EE. UU.\n\nPara cada requisito, seleccione la opción correcta.","subquestions":[{"label":"Para garantizar la disponibilidad de los hosts de sesión si falla un centro de datos:","options":["Usar zonas de disponibilidad al crear las VMs de los hosts de sesión","Crear un conjunto de disponibilidad para los hosts de sesión","Habilitar el inicio de VM al conectar","Usar Azure Site Recovery"],"answer":"Usar zonas de disponibilidad al crear las VMs de los hosts de sesión"},{"label":"Para garantizar la disponibilidad de los perfiles FSLogix si falla un centro de datos:","options":["Configurar el almacenamiento con redundancia de zona (ZRS) en storage1","Configurar el almacenamiento con redundancia geográfica (GRS) en storage1","Usar Cloud Cache con dos cuentas de almacenamiento en diferentes zonas","Usar Azure Backup para storage1"],"answer":"Usar zonas de disponibilidad al crear las VMs de los hosts de sesión"}]},{"id":212,"type":"mc","question":"You have an Azure suscripción that contains the resources shown in the following table.\n\nYou need to ensure that users can restore files saved to their FSLogix profile.\n¿Qué debería hacer?","options":{"A":"From the CPool1 blade in the Azure portal, create a new volume.","B":"From the Azure portal, create an Azure Backup vault and a backup policy.","C":"From the Volume1 blade in the Azure portal, create a snapshot policy.","D":"From the Azure portal, create a Recovery Services vault and a backup policy."},"answer":"C"},{"id":213,"type":"hotspot","question":"Dispone de una implementación de Azure Virtual Desktop con hosts de sesión en diferentes regiones y usuarios que se conectan desde diferentes ubicaciones. Los hosts de sesión tienen Watermarking habilitado y están unidos a Microsoft Entra. Para cada afirmación, seleccione Sí si es verdadera. De lo contrario, seleccione No.","subquestions":[{"label":"Los usuarios con el cliente de Escritorio remoto para Windows pueden ver la marca de agua en las sesiones.","options":["Sí","No"],"answer":"Sí"},{"label":"Los usuarios con el cliente web de Escritorio remoto pueden ver la marca de agua en las sesiones.","options":["Sí","No"],"answer":"No"},{"label":"Los usuarios con el cliente de Escritorio remoto para macOS pueden ver la marca de agua en las sesiones.","options":["Sí","No"],"answer":"No"}]},{"id":214,"type":"mc","question":"You have an Azure suscripción. The suscripción contains a máquina virtual named Server1 that runs Windows\nServer and is deployed to the West US Azure region.\nYou deploy a new Azure Virtual Desktop grupo de hosts named HostPool1 to the East US Azure dad en cada disco de datos","Registrar las VMs en el almacén de Recovery Services","Crear un grupo de recursos de instantáneas"],"answer":["Crear un almacén de Backup","Crear una directiva de copia de seguridad para discos de Azure","Habilitar la copia de seguridad en cada disco de datos"]},{"id":219,"type":"mc","question":"You have the devices shown in the following table.\n\nYou plan to deploy Azure Virtual Desktop for client access to remote virtualized apps.\nWhich devices support the cliente de Escritorio remoto?","options":{"A":"Device1 only","B":"Device1 and Device2 only","C":"Device1 and Device3 only","D":"Device1, Device2, and Device3"},"answer":"C"},{"id":220,"type":"mc","question":"You have an Azure Virtual Desktop implementación.\nYou plan to create a new grupo de hosts named Pool1 that will contain five Windows 11 host de sesións.\nYou need to enable secure boot and vTPM on the host de sesións.\nHow should you configure the Máquina virtuals settings?","options":{"A":"Enable encryption at rest and a platform-managed key.","B":"Set Security type to Trusted launch máquina virtuals.","C":"Enable a system-assigned identidad administrada.","D":"Set Network security group to Advanced."},"answer":"B"},{"id":221,"type":"hotspot","question":"Dispone de un grupo de hosts de Azure Virtual Desktop llamado HostPool1 que debe admitir 60 sesiones. Los hosts de sesión están configurados con Standard D4s v3 (4 vCPUs, 16 GB RAM) y ejecutan Windows 11 Enterprise multi-sesión con cargas de trabajo de tipo Medium. Seleccione la respuesta que completa cada afirmación.","subquestions":[{"label":"El número mínimo de hosts de sesión necesarios para soportar 60 sesiones es:","options":["3","4","5","6"],"answer":"4"},{"label":"El número máximo de sesiones por host de sesión recomendado es:","options":["10","15","16","20"],"answer":"16"}]},{"id":222,"type":"hotspot","question":"Dispone de una implementación de Azure Virtual Desktop con: HostPool1 (hosts de sesión con discos del SO) y HostPool2 (hosts de sesión con discos de datos que almacenan perfiles FSLogix). Crea un almacén de Recovery Services (Vault1) y un almacén de Backup (Vault2).\n\n¿En qué almacén puede realizar la copia de seguridad de cada recurso?","subquestions":[{"label":"Copias de seguridad de los contenedores de perfiles FSLogix (recursos compartidos de archivos) de HostPool1:","options":["Vault1 (Recovery Services)","Vault2 (Backup)","Ambos"],"answer":"Vault1 (Recovery Services)"},{"label":"Copias de seguridad de los discos de datos de HostPool2:","options":["Vault1 (Recovery Services)","Vault2 (Backup)","Ambos"],"answer":"Vault2 (Backup)"}]},{"id":223,"type":"mc","question":"You have an Azure Virtual Desktop pooled grupo de hosts named HostPool1.\nYou need to dynamically allocate resources to HostPool1 based on the number of sessions for each host.\nWhat should you create?","options":{"A":"a load balancer rule","B":"a plan de escalado","C":"a máquina virtual scale set","D":"an availability set"},"answer":"B"},{"id":224,"type":"mc","question":"Dispone de a cuenta de almacenamiento named storage1 that contains FSLogix contenedor de perfiless. In the East US region, you\nhave an Azure compute gallery named SIG1 that contains a máquina virtual image named Image1. Image1 is used to\ncreate new host de sesións in Pool1.\nPlanea deploy a new Azure Virtual Desktop grupo de hosts named Pool2 to the South India region.\nNecesita implement a host de sesión implementación solution for Pool2 that meets the following requirements:\n• Image1 must replicate to the South India region.\n• The host de sesións in Pool2 must be based on Image1.\n• Changes to Image1 must be available in the South India and East US regions.\nWhat should you include in the solution?","options":{"A":"Configure con redundancia geográfica storage (GRS) replicación for storage1. Copy the VHD file of Image1 to the FSLogix contenedor de perfiles.","B":"From SIG1, update the replicación for the latest versión de imagen of Image1.","C":"Create a new Azure compute gallery named SIG2 in the South India region. Upload a copy of Image1 to SIG2.","D":"Create a new Azure Storage account named storage2 in the South India region. Copy Image1 to a shared folder in storage2."},"answer":"B"},{"id":225,"type":"mc","question":"Dispone de an Azure Virtual Desktop personal grupo de hosts named Pool1 that contains 20 Azure AD-joined host de sesións.\nNecesita ensure that only approved máquina virtual extensions are installed on the Pool 1 host de sesións. The\nsolution must minimizar el esfuerzo administrativo.\nWhat should you use?","options":{"A":"Azure Resource Manager (ARM) templates","B":"Azure Policy","C":"Windows Admin Center","D":"Group Policy"},"answer":"B"},{"id":227,"type":"mc","question":"Dispone de an Azure Virtual Desktop implementación that contains two Azure regions.\nPlanea implement a disaster recovery solution for user profiles. The solution must meet the following\nrequirements:\n•Users must retain their user profiles if a single region fails.\n•Administrative effort must be minimized.\nWhat should you include in the recommendation?\nA.Azure Storage accounts that use zone-redundant storage (ZRS)\nB.Azure Site Recovery\nC.FSLogix Cloud Cache\nD.Azure Backup\nE.FSLogix with VHDLocations","options":{"A":"Azure Storage accounts that use zone-redundant storage (ZRS)","B":"Azure Site Recovery","C":"FSLogix Cloud Cache","D":"Azure Backup","E":"FSLogix with VHDLocations"},"answer":"C"},{"id":228,"type":"dragdrop","question":"Dispone de una implementación de Azure Virtual Desktop y las siguientes cuentas de almacenamiento: storage1 (Premium, FileStorage), storage2 (Estándar, GPv2), storage3 (Premium, BlockBlobStorage), storage4 (Premium, GPv2). Planea crear contenedores de perfiles FSLogix. Necesita identificar qué cuentas de almacenamiento admiten contenedores de perfiles FSLogix y ordenarlas de mayor a menor rendimiento.","actions":["storage1 (Premium FileStorage)","storage2 (Estándar GPv2)","storage3 (Premium BlockBlobStorage)","storage4 (Premium GPv2)"],"answer":["storage1 (Premium FileStorage)","storage4 (Premium GPv2)","storage2 (Estándar GPv2)"]},{"id":229,"type":"hotspot","question":"Dispone de una suscripción de Azure con cuentas de almacenamiento y almacenes de Recovery Services asignados a diferentes grupos de hosts de Azure Virtual Desktop. Para cada afirmación sobre las capacidades de copia de seguridad, seleccione Sí si es verdadera. De lo contrario, seleccione No.","subquestions":[{"label":"Puede usar un almacén de Recovery Services para realizar copias de seguridad de un recurso compartido de Azure Files que se usa como almacenamiento FSLogix.","options":["Sí","No"],"answer":"Sí"},{"label":"Puede usar un almacén de Recovery Services para realizar copias de seguridad de los discos de datos de los hosts de sesión de AVD.","options":["Sí","No"],"answer":"Sí"},{"label":"Puede usar un almacén de Backup (Backup Vault) para realizar copias de seguridad de un recurso compartido de Azure Files.","options":["Sí","No"],"answer":"No"}]},{"id":232,"type":"mc","question":"You have an Azure Virtual Desktop implementación that contains a grupo de hosts named Pool1.\nPool1 contains two host de sesións named Host1 and Host2 and has the following settings:\n•Host pool type: Pooled\n•Equilibrio de carga algorithm: Amplitud primero\nYou plan to implement Quality of Service (QoS) policies to manage RDP connections to Host1 and Host2.\nYou need to ensure that the Azure Virtual Desktop implementación supports the QoS policies.\n¿Qué debería hacer?\nA.Modify the Equilibrio de carga algorithm setting for Pool1.\nB.Enable RDP Shortpath on Host1 and Host2.\nC.Assign a plan de escalado to Pool1.\nD.Apply an Azure tag on Host1 and Host2.","options":{"A":"Modify the Equilibrio de carga algorithm setting for Pool1.","B":"Enable RDP Shortpath on Host1 and Host2.","C":"Assign a plan de escalado to Pool1.","D":"Apply an Azure tag on Host1 and Host2."},"answer":"B"},{"id":233,"type":"mc","question":"Dispone de an Azure Virtual Desktop grupo de hosts named Pool1. Pool1 contains host de sesións that run Windows 11\nEnterprise multi-session.\nNecesita use Performance Monitor to troubleshoot a poor frame quality issue that is affecting a current user\nsession to Pool1.\n¿Cuál performance counter should you use?\nA.RemoteFX Graphics\nB.Terminal Services Session\nC.GPU Engine\nD.Terminal Services","options":{"A":"RemoteFX Graphics","B":"Terminal Services Session","C":"GPU Engine","D":"Terminal Services"},"answer":"A"},{"id":234,"type":"hotspot","question":"Dispone de una implementación de Azure Virtual Desktop con un grupo de hosts llamado Pool1. Planea habilitar las actualizaciones programadas del agente para Pool1. Necesita identificar cómo se aplicarán las actualizaciones programadas del agente.\n\n¿Cuántas ventanas de mantenimiento puede especificar como máximo y cuántos reintentos para las actualizaciones fallidas?","subquestions":[{"label":"Número máximo de ventanas de mantenimiento que puede especificar:","options":["1","2","3","4"],"answer":"2"},{"label":"Número máximo de reintentos para actualizaciones de agente fallidas:","options":["1","2","3","4"],"answer":"3"}]},{"id":235,"type":"hotspot","question":"Dispone de una suscripción de Azure con los siguientes almacenes: Vault1 (Recovery Services, Este de EE. UU.) y Vault2 (Recovery Services, Oeste de EE. UU.). También tiene grupos de hosts de Azure Virtual Desktop: Pool1 (hosts de sesión en Este de EE. UU. con discos del SO) y Pool2 (hosts de sesión en Oeste de EE. UU. con recursos compartidos de Azure Files para FSLogix). Necesita realizar copia de seguridad de todos los hosts de sesión en Pool1 y Pool2. ¿Qué debe hacer para cada grupo?","subquestions":[{"label":"Para realizar copia de seguridad de los hosts de sesión de Pool1 (discos del SO, Este de EE. UU.):","options":["Usar Vault1 con directiva de copia de seguridad de VM de Azure","Usar Vault2 con directiva de copia de ón.\nWhat will have the largest impact on the network throughput of each host de sesión?\nA.the number of network interfaces\nB.Accelerated Networking\nC.the máquina virtual size\nD.RDP Shortpath","options":{"A":"the number of network interfaces","B":"Accelerated Networking","C":"the máquina virtual size","D":"RDP Shortpath"},"answer":"C"},{"id":239,"type":"hotspot","question":"Dispone de una suscripción de Azure con una implementación de Azure Virtual Desktop. Todos los hosts de sesión están unidos a Active Directory. Planea implementar Quality of Service (QoS) para la implementación mediante directivas de grupo. Necesita configurar una directiva de QoS que etiquete el tráfico de Remote Desktop Services (RDS) para la Forwarding acelerada (Expedited Forwarding).\n\nSeleccione los valores correctos para la configuración de QoS.","subquestions":[{"label":"Valor de DSCP (Differentiated Services Code Point) para Expedited Forwarding:","options":["0","8","46","48"],"answer":"46"},{"label":"Protocolo de transporte para el tráfico RDS con RDP Shortpath:","options":["TCP","UDP","TCP y UDP"],"answer":"UDP"}]},{"id":240,"type":"hotspot","question":"Dispone de una implementación de Azure Virtual Desktop con los siguientes recursos: Pool1 (hosts de sesión con discos del SO), Pool2 (hosts de sesión con discos de datos), share1 (recurso compartido de Azure Files para perfiles FSLogix). Crea los almacenes: Vault1 (Recovery Services) y Vault2 (Backup Vault). Necesita realizar copia de seguridad de los recursos. ¿En cuál almacén puede realizar copia de seguridad de cada recurso?","subquestions":[{"label":"Discos del SO de los hosts de sesión de Pool1:","options":["Vault1 (Recovery Services)","Vault2 (Backup Vault)","Ambos"],"answer":"Vault1 (Recovery Services)"},{"label":"Discos de datos de los hosts de sesión de Pool2:","options":["Vault1 (Recovery Services)","Vault2 (Backup Vault)","Ambos"],"answer":"Vault2 (Backup Vault)"},{"label":"Recurso compartido share1 (Azure Files para FSLogix):","options":["Vault1 (Recovery Services)","Vault2 (Backup Vault)","Ambos"],"answer":"Vault1 (Recovery Services)"}]},{"id":241,"type":"mc","question":"Case study This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to\ncomplete each case. However, there may be additional case studies and sections on this exam. You must manage\nyour time to ensure that you are able to complete all questions included on this exam in the time provided.\nTo answer the questions included in a case study, you will need to reference information that is provided in the\ncase study. Case studies might contain exhibits and other resources that provide more information about the\nscenario that is described in the case study. Each question is independent of the other questions in this case study.\nAt the end of this case study, a review screen will appear. This screen allows you to review your answers and to\nmake changes before you move to the next section of the exam. After you begin a new section, you cannot return\nto this section.\nTo start the case study To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore\nthe content of the case study before you answer the questions. Clicking these buttons displays information such\nas business requirements, existing environment, and problem statements. If the case study has an All Information\ntab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you\n\nare ready to answer a question, click the Question button to return to the question.\n\nOverview Northwind Traders is a manufacturing company based in New York City.\n\nExisting Environment Identity Environment The local (on-premises) network contains an Active Directory Domain Services (AD DS) domain named\nnorthwindtraders.com.\nNorthwind Traders has a Microsoft Entra tenant and a Microsoft Entra Domain Services managed domain. The\nnorthwindtraders.com domain syncs with the Microsoft Entra tenant.\nMáquina virtuals The company has an local (on-premises) Hyper-V máquina virtual named VM1 that has the following configurations:\n•Generation: 1\n•Disk size: 2 TB\n•Disk format: VHDX\n•Disk type: Dynamically expanding\nCloud Services Northwind Traders has a Microsoft 365 E5 suscripción. The suscripción contains 500 users that are assigned\nMicrosoft 365 E5 licenses.\nThe company has an Azure suscripción that contains the resources shown in the following table.\n\nBoth suscripcións are linked to the Microsoft Entra tenant.\n\nRequirements Planned Changes Northwind Traders identifies the following planned changes:\n•Deploy an Azure Virtual Desktop grupo de hosts that will contain 10 host de sesións joined to the Microsoft Entra Domain\nServices managed domain.\n•Configure VM1 as the source image for the Azure Virtual Desktop implementación and upload the image to Azure.\n•The Azure Virtual Desktop implementación will provide access to a custom app named App1.\nPerformance Requirements -\n\nNorthwind Traders identifies the following performance requirements:\n•Each Azure Virtual Desktop host de sesión must support 15 user sessions.\n•Each new user session must be assigned to a single host de sesión until the maximum session limit is reached for\nthat host.\nApplication Requirements Northwind Traders identifies the following application requirements:\n•Microsoft OneDrive must launch when users connect to a RemoteApp session in Azure Virtual Desktop.\n•App1 requires a desktop resolution of 1280 x 1024.\n•Administrative effort must be minimized.\nDisaster Recovery Requirements Northwind Traders identifies the following disaster recovery requirements for the Azure Virtual Desktop\nimplementación:\n•Minimize outages if an Azure region fails.\n•Minimize the recovery time objective (RTO).\n•Minimize administrative effort in the event of a failover.\nSecurity Requirements Northwind Traders identifies the following security requirements:\n•When users sign in to the Azure Virtual Desktop implementación by using the Azure Virtual Desktop client, they must\nauthenticate by using their Microsoft Entra username and password only.\n•When users sign in to the Azure Virtual Desktop implementación by using a web browser, they must authenticate by\nusing the Microsoft Authenticator app.\n•All the Azure Virtual Desktop host de sesións deployed by using the VM1 source image must be onboarded to\nMicrosoft Defender for Endpoint.\n•The client version and operating system used to connect to the host de sesións must be logged.\n•The solution must follow the principle of least privilege.\nNetworking Requirements The Azure Virtual Desktop host de sesións must be able to access the resources on the local (on-premises) network.\nUser Profile Requirements Northwind Traders identifies the following user profile requirements:\n•Users must be able to access share1 by using their Microsoft Entra account.\n•Azure Virtual Desktop user profiles must be managed by using FSLogix.\n•All user profiles must be stored in share1.\nWhich monitoring solution should you configure to meet the security requirements?","options":{"A":"Azure Virtual Desktop Insights","B":"Application Insights","C":"VM insights","D":"Azure Monitor activity log insights"},"answer":"D"},{"id":243,"type":"hotspot","question":"Dispone de una implementación de Azure Virtual Desktop con los siguientes recursos: profiles1 (recurso compartido de Azure Files para perfiles FSLogix), Pool1 (grupo de hosts con 5 hosts de sesión con discos del SO). Necesita usar Azure Backup para realizar copias de seguridad de profiles1 y de los hosts de sesión de Pool1 con la mayor frecuencia posible. ¿Con qué frecuencia debe programar las copias de seguridad para cada recurso?","subquestions":[{"label":"Frecuencia de copia de seguridad para profiles1 (Azure Files):","options":["Cada hora","Cada 4 horas","Cada 12 horas","Una vez al día"],"answer":"Cada hora"},{"label":"Frecuencia de copia de seguridad para los hosts de sesión de Pool1 (VMs de Azure):","options":["Cada hora","Cada 4 horas","Cada 12 horas","Una vez al día"],"answer":"Cada hora"}]},{"id":246,"type":"hotspot","question":"Dispone de una implementación de Azure Virtual Desktop con un grupo de hosts llamado HostPool1. Planea implementar hosts de sesión con las siguientes configuraciones:\n• Host1: para 10 usuarios simultáneos con cargas de trabajo Light\n• Host2: para 15 usuarios simultáneos con cargas de trabajo Heavy\n\nCada host de sesión debe admitir hasta 15 usuarios simultáneos. ¿Qué versión del sistema operativo debe implementar desde Azure Marketplace para cada host?","subquestions":[{"label":"Sistema operativo para Host1 (Light, hasta 15 usuarios):","options":["Windows 10 Enterprise multi-sesión","Windows 11 Enterprise multi-sesión","Windows Server 2022 Datacenter","Windows 11 Enterprise"],"answer":"Windows 10 Enterprise multi-sesión"},{"label":"Sistema operativo para Host2 (Heavy, hasta 15 usuarios):","options":["Windows 10 Enterprise multi-sesión","Windows 11 Enterprise multi-sesión","Windows Server 2022 Datacenter","Windows 11 Enterprise"],"answer":"Windows 11 Enterprise multi-sesión"}]},{"id":248,"type":"hotspot","question":"Dispone de una suscripción de Azure con máquinas virtuales y una Azure Compute Gallery con una definición de imagen con OS state=Specialized y Publisher=Contoso, Offer=WindowsServer2019, SKU=Datacenter. Necesita determinar qué máquinas virtuales pueden usarse como fuente para versiones de esta imagen.\n\nPara cada afirmación, seleccione Sí si es verdadera. De lo contrario, seleccione No.","subquestions":[{"label":"Solo se pueden usar VMs con OS state=Specialized como fuente para versiones de esta definición de imagen.","options":["Sí","No"],"answer":"Sí"},{"label":"Se puede usar una VM generalizada de Windows Server 2019 como fuente para una versión de imagen con OS state=Specialized.","options":["Sí","No"],"answer":"No"},{"label":"Se puede capturar una VM especializada en una región diferente a la definición de imagen y usarla como fuente.","options":["Sí","No"],"answer":"Sí"}]},{"id":250,"type":"mc","question":"You have an Azure Virtual Desktop implementación that contains a grupo de hosts named Pool1.\nPool1 contains a host de sesión named Host1 that is Azure AD-joined.\nYou need to verify whether a Windows license is assigned to Host1.\n¿Qué debería hacer?\nA.From the Azure Active Directory admin center, view the product licenses.\nB.From VM1, run the Get-WindowsDeveloperLicense cmdlet.\nC.From the Azure portal, view the properties of Host1.\nD.From Azure Cloud Shell, run the Get-AzVm cmdlet.","options":{"A":"From the Azure Active Directory admin center, view the product licenses.","B":"From VM1, run the Get-WindowsDeveloperLicense cmdlet.","C":"From the Azure portal, view the properties of Host1.","D":"From Azure Cloud Shell, run the Get-AzVm cmdlet."},"answer":"C"},{"id":251,"type":"mc","question":"Dispone de an Azure suscripción that contains an Azure Compute Gallery named Gallery1 and a máquina virtual\nnamed Template1. Template1 has custom apps and settings configured.\nPlanea deploy Azure Virtual Desktop host de sesións by using a custom máquina virtual image. The solution\nmust meet the following requirements:\n\n•The custom image must be stored in Gallery1.\n•The custom image must be based on Template1.\n•All new host de sesións must have unique computer names and identifiers.\nNecesita create the custom image.\n¿Qué debería hacer in the Azure portal?\nA.From Gallery1, create a new VM application definition.\nB.From Gallery1, create a new VM definición de imagen.\nC.From Template1, capture a generalized máquina virtual image.\nD.From Template1, capture a specialized máquina virtual image.","options":{"A":"From Gallery1, create a new VM application definition.","B":"From Gallery1, create a new VM definición de imagen.","C":"From Template1, capture a generalized máquina virtual image.","D":"From Template1, capture a specialized máquina virtual image."},"answer":"C"},{"id":252,"type":"mc","question":"You have a Microsoft Entra tenant named contoso.com and an Azure Virtual Desktop implementación.\nYou have a RemoteApp grupo de aplicaciones named RemoteApp1.\nYou have a partner company named Fabrikam, Inc. that has 200 users. The users require access to RemoteApp1.\nYou need to identify which type of pricing is associated with providing RemoteApp1 access to the Fabrikam users.\nWhat should you identify?\nA.compute only\nB.compute, storage, and networking only\nC.Azure Virtual Desktop per-user access and compute only\nD.Azure Virtual Desktop per-user access only\nE.Azure Virtual Desktop per-user access, compute, storage, and networking","options":{"A":"compute only","B":"compute, storage, and networking only","C":"Azure Virtual Desktop per-user access and compute only","D":"Azure Virtual Desktop per-user access only","E":"Azure Virtual Desktop per-user access, compute, storage, and networking"},"answer":"E"},{"id":253,"type":"hotspot","question":"Dispone de un grupo de hosts de Azure Virtual Desktop llamado Pool1 y una Azure Compute Gallery con una imagen. Pool1 contiene un único host de sesión llamado SH1. Necesita implementar un nuevo host de sesión llamado SH2 para realizar solución de problemas. La solución debe minimizar el tiempo de implementación.\n\nPara cada afirmación, seleccione la opción correcta.","subquestions":[{"label":"Para minimizar el tiempo de implementación de SH2, debe usar:","options":["La misma versión de imagen que SH1","La versión de imagen más reciente de la galería","Una instantánea del disco del SO de SH1","Una imagen administrada de SH1"],"answer":"La misma versión de imagen que SH1"},{"label":"El estado del OS de la imagen para SH2 debe ser:","options":["Generalizado","Especializado","Cualquiera de los dos"],"answer":"Especializado"}]},{"id":254,"type":"mc","question":"Dispone de an Azure Virtual Des rthwindtraders.com.\nNorthwind Traders has a Microsoft Entra tenant and a Microsoft Entra Domain Services managed domain. The\nnorthwindtraders.com domain syncs with the Microsoft Entra tenant.\nMáquina virtuals The company has an local (on-premises) Hyper-V máquina virtual named VM1 that has the following configurations:\n•Generation: 1\n•Disk size: 2 TB\n•Disk format: VHDX\n•Disk type: Dynamically expanding\nCloud Services Northwind Traders has a Microsoft 365 E5 suscripción. The suscripción contains 500 users that are assigned\nMicrosoft 365 E5 licenses.\nThe company has an Azure suscripción that contains the resources shown in the following table.\n\nBoth suscripcións are linked to the Microsoft Entra tenant.\n\nRequirements Planned Changes Northwind Traders identifies the following planned changes:\n•Deploy an Azure Virtual Desktop grupo de hosts that will contain 10 host de sesións joined to the Microsoft Entra Domain\nServices managed domain.\n•Configure VM1 as the source image for the Azure Virtual Desktop implementación and upload the image to Azure.\n•The Azure Virtual Desktop implementación will provide access to a custom app named App1.\nPerformance Requirements Northwind Traders identifies the following performance requirements:\n•Each Azure Virtual Desktop host de sesión must support 15 user sessions.\n•Each new user session must be assigned to a single host de sesión until the maximum session limit is reached for\nthat host.\nApplication Requirements Northwind Traders identifies the following application requirements:\n•Microsoft OneDrive must launch when users connect to a RemoteApp session in Azure Virtual Desktop.\n•App1 requires a desktop resolution of 1280 x 1024.\n•Administrative effort must be minimized.\nDisaster Recovery Requirements Northwind Traders identifies the following disaster recovery requirements for the Azure Virtual Desktop\nimplementación:\n•Minimize outages if an Azure region fails.\n•Minimize the recovery time objective (RTO).\ ktop host de sesións. VNet1 and storage1 are in the East US Azure region. The session\nhosts are connected to VNet1.\nIn storage1, you create an Azure Files share named share1.\nYou need to ensure that the host de sesións connect to share1 by using the Microsoft backbone network.\nSolution: You add a punto de conexión de servicio to VNet1.\n¿Esto cumple el objetivo?","options":{"A":"Sí","B":"No"},"answer":"A"},{"id":320,"type":"mc","scenario":"Dispone de una implementación de Azure Virtual Desktop con los siguientes grupos de hosts:\n• Pool1: Agrupado, 2 hosts de sesión, Windows 11 Enterprise multi-sesión, Este de EE. UU.\n• Pool2: Personal, 10 hosts de sesión, Windows 11 Enterprise, Oeste de EE. UU.\n• Pool3: Agrupado, 5 hosts de sesión, Windows Server 2025 Datacenter, Este de EE. UU.\n\nNecesita configurar el acceso privado para la implementación.","question":"¿Cuál es el número mínimo de puntos de conexión privados que debe crear?","options":{"A":"1","B":"2","C":"3","D":"17"},"answer":"C","scenario_title":"Pregunta independiente — Grupos de hosts y puntos de conexión privados"},{"id":321,"type":"mc","question":"Introductory Info Case study This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to\ncomplete each case. However, there may be additional case studies and sections on this exam. You must manage\nyour time to ensure that you are able to complete all questions included on this exam in the time provided.\nTo answer the questions included in a case study, you will need to reference information that is provided in the\ncase study. Case studies might contain exhibits and other resources that provide more information about the\nscenario that is described in the case study. Each question is independent of the other questions in this case study.\nAt the end of this case study, a review screen will appear. This screen allows you to review your answers and to\nmake changes before you move to the next section of the exam. After you begin a new section, you cannot return\nto this section.\nTo start the case study To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore\nthe content of the case study before you answer the questions. Clicking these buttons displays information such\nas business requirements, existing environment, and problem statements. If the case study has an All Information\ntab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you\nare ready to answer a question, click the Question button to return to the question.\nOverview Litware, Inc. is a pharmaceutical company that has a main office in Boston, United States, and a remote office in\nChennai, India.\nExisting Environment. Identity Environment\nThe network contains an local (on-premises) Active Directory domain named litware.com that syncs to an Azure Active\nDirectory (Azure AD) tenant named litware.com.\nThe Azure AD tenant contains the users shown in the following table.\n\nAll users are registered for Azure Autenticación multifactor (MFA).\nExisting Environment. Cloud Services\nLitware has a Microsoft 365 E5 suscripción associated to the Azure AD tenant. All users are assigned Microsoft\n365 Enterprise E5 licenses.\nLitware has an Azure suscripción associated to the Azure AD tenant. The suscripción contains the resources\nshown in the following table.\n\nLitware uses custom máquina virtual images and custom scripts to automatically provision Azure máquina virtuals\nand join the máquina virtuals to the local (on-premises)\nActive Directory domain.\nExisting Environment. Network and DNS\nThe offices connect to each other by using a WAN link. Each office connects directly to the internet.\nAll DNS queries for internet hosts are resolved by using DNS servers in the Boston office, which point to root\nservers on the internet. The Chennai office has caching-only DNS servers that forward queries to the DNS servers\nin the Boston office.\nRequirements. Planned Changes Litware plans to implement the following changes:\nDeploy Azure Virtual Desktop environments to the East US Azure region for the users in the Boston office and to\nthe South India Azure region for the users in the Chennai office.\nImplement FSLogix contenedor de perfiless.\nOptimize the custom máquina virtual images for the Azure Virtual Desktop host de sesións.\nUse PowerShell to automate the addition of máquina virtuals to the Azure Virtual Desktop grupo de hostss.\n\nRequirements. Performance Requirements\nLitware identifies the following performance requirements:\nMinimize network latency of the Windows Virtual Desktop connections from the Boston and Chennai offices.\nMinimize latency of the Windows Virtual Desktop host authentication in each Azure region.\nMinimize how long it takes to sign in to the Windows Virtual Desktop host de sesións.\nRequirements. Authentication Requirements\nLitware identifies the following authentication requirements:\nEnforce Azure MFA when accessing Azure Virtual Desktop apps.\nForce users to reauthenticate if their Azure Virtual Desktop session lasts more than eight hours.\nRequirements. Security Requirements\nLitware identifies the following security requirements:\nExplicitly allow traffic between the Azure Virtual Desktop host de sesións and Microsoft 365.\nExplicitly allow traffic between the Azure Virtual Desktop host de sesións and the Azure Virtual Desktop\ninfrastructure.\nUse built-in groups for delegation.\nDelegate the management of grupo de aplicacioness to Admin2, including the ability to publish grupo de aplicacioness to users and user\ngroups.\nGrant Admin1 permissions to manage área de trabajos, including listing which apps are assigned to the grupo de aplicacioness.\nMinimize administrative effort to manage network security.\nUse the principle of least privilege.\nRequirements. Deployment Requirements\nLitware identifies the following implementación requirements:\nUse PowerShell to generate the token used to add the máquina virtuals as host de sesións to an Azure Virtual\nDesktop grupo de hosts.\nMinimize how long it takes to provision the Azure Virtual Desktop host de sesións based on the custom virtual\nmachine images.\nWhenever possible, preinstall agents and apps in the custom máquina virtual images.\nUser Profile Requirements Litware identifies the following user profile requirements:\nIn storage1, store user profiles for the Boston office users.\nEnsure that the user profiles for the Boston office users replicate synchronously between two Azure regions.\nEnsure that Admin1 uses a local profile only when signing in to the Azure Virtual Desktop host de sesións. Question\nYou need to recommend an authentication solution that meets the performance requirements.\n¿Cuáles dos actions should you include in the recommendation? Cada respuesta correcta presenta parte de la solución.\nNOTE: Each correct selection is worth one point.","options":{"A":"Configure identity for all the host de sesións.","B":"In each Azure region that will contain the Azure Virtual Desktop host de sesións, create an Azure Active Directory Domain Service (Azure AD DS) managed domain.","C":"Deploy domain controllers for the local (on-premises) Active Directory domain on Azure máquina virtuals to the new sites.","D":"Deploy read-only domain controllers (RODCs) on Azure máquina virtuals to the new sites.","E":"In each Azure region that will contain the Azure Virtual Desktop host de sesións, create an Active Directory site."},"answer":"CE"},{"id":322,"type":"mc","scenario":"**Empresa: Litware, Inc.** — Empresa farmacéutica con oficina principal en Boston (EE. UU.) y oficina remota en Chennai (India).\n\n**Entorno de identidad:**\n- Dominio de Active Directory local: litware.com, sincronizado con un tenant de Azure Active Directory (Azure AD) llamado litware.com.\n- Admin1: usuario sincronizado con directorio, administrador local en todos los equipos unidos al dominio local.\n- Admin2: usuario solo en la nube, sin roles asignados.\n- CloudAdmin1: usuario solo en la nube, con rol de Administrador global.\n- Todos los usuarios tienen registrada la autenticación multifactor (MFA).\n\n**Servicios en la nube:**\n- Suscripción Microsoft 365 E5. Todos los usuarios tienen licencia M365 Enterprise E5.\n- Suscripción Azure con: storage1 (cuenta de almacenamiento de uso general v1, LRS, Este de EE. UU.), VM1 (máquina virtual, Este de EE. UU., unida al dominio local).\n- Litware usa imágenes personalizadas y scripts para aprovisionar automáticamente máquinas virtuales y unirlas al dominio.\n\n**Red:**\n- Oficinas conectadas entre sí por WAN. Cada oficina se conecta directamente a Internet.\n- DNS de Boston resuelve hosts de Internet y apunta a servidores raíz. Chennai tiene servidores DNS de solo caché que reenvían al DNS de Boston.\n\n**Cambios planificados:**\n- Implementar Azure Virtual Desktop en Este de EE. UU. (Boston) y Sur de India (Chennai).\n- Implementar contenedores de perfiles FSLogix.\n- Optimizar imágenes de máquinas virtuales personalizadas.\n- Usar PowerShell para automatizar la adición de máquinas virtuales a los grupos de hosts.\n\n**Requisitos de rendimiento:**\n- Minimizar latencia de red de las conexiones AVD desde Boston y Chennai.\n- Minimizar latencia de autenticación de hosts en cada región de Azure.\n- Minimizar tiempo de inicio de sesión en los hosts de sesión.\n\n**Requisitos de autenticación:**\n- Aplicar MFA de Azure al acceder a las apps de Azure Virtual Desktop.\n- Forzar reautenticación si la sesión dura más de 8 horas.\n\n**Requisitos de seguridad:**\n- Permitir explícitamente el tráfico entre los hosts de sesión AVD y Microsoft 365.\n- Permitir explícitamente el tráfico entre los hosts de sesión AVD y la infraestructura AVD.\n- Usar grupos integrados para delegación.\n- Delegar la gestión de grupos de aplicaciones a Admin2 (incluida publicación a usuarios y grupos).\n- Conceder a Admin1 permisos para administrar áreas de trabajo.\n- Minimizar esfuerzo administrativo de seguridad de red. Principio de mínimo privilegio.\n\n**Requisitos de implementación:**\n- Usar PowerShell para generar el token de registro para agregar máquinas virtuales como hosts de sesión.\n- Minimizar tiempo de aprovisionamiento de hosts basado en imágenes personalizadas.\n- Preinstalar agentes y aplicaciones en las imágenes cuando sea posible.\n\n**Requisitos de perfil de usuario:**\n- Almacenar perfiles de Boston en storage1.\n- Replicar perfiles de Boston sincrónicamente entre dos regiones de Azure.\n- Admin1 debe usar un perfil local al iniciar sesión en los hosts de sesión AVD.","question":"Planea implementar los contenedores de perfiles FSLogix para la oficina de Seattle.\n¿Qué cuenta de almacenamiento debería usar?","options":{"A":"storage2","B":"storage4","C":"storage3","D":"storage1"},"answer":"A","scenario_title":"Caso práctico: Litware, Inc. (Empresa farmacéutica)"},{"id":326,"type":"mc","scenario":"**Empresa: Contoso, Ltd.** — Firma de abogados con oficina principal en Montreal y sucursales en París y Seattle (recientemente abierta).\nContoso tiene una suscripción de Azure y usa Microsoft 365.\n\n**Active Directory:**\n- Dominio local: contoso.com con tenant de Azure AD. Un controlador de dominio corre como máquina virtual de Azure en VNET1. DNS resuelto por los controladores de dominio.\n- Unidades organizativas (UO): MontrealUsers (sync con Azure AD Connect), ParisUsers (sync con Azure AD Connect), SeattleUsers (NO sincroniza con Azure AD).\n- Usuarios AD: Operator1 (Users, Domain Admins), Operator2 (MontrealUsers, Users), Operator3 (SeattleUsers, Server Operators).\n- Usuarios solo en la nube: Admin1 (Colaborador de máquina virtual), Admin2 (Desktop Virtualization Contributor), Admin3 (Desktop Virtualization Session Host Operator), Admin4 (Desktop Virtualization Host Pool Contributor).\n\n**Red:**\n- Todas las redes virtuales de Azure están emparejadas. La red local se conecta a las redes virtuales.\n- VNET4 fue creada recientemente y está emparejada con las demás redes, pero NO contiene máquinas virtuales de AVD.\n- Todos los servidores ejecutan Windows Server 2019. Los portátiles y equipos de escritorio ejecutan Windows 10 Enterprise.\n- Los usuarios trabajan con documentos confidenciales y usan su equipo como cliente para conectarse a Remote Desktop Services (RDS).\n\n**Cuentas de almacenamiento (West US):**\n- storage1: StorageV2, Estándar | storage2: StorageV2, Premium | storage3: BlobStorage, Estándar | storage4: StorageV1, Premium\n\n**Infraestructura RDS existente:**\n- Montreal: Implementación AVD con Windows 10 Enterprise multi-sesión. Pool1, Group1, Workspace1, VMs con prefijo Pool1.\n- Seattle: Implementación RDS local con escritorios personales. VMs con prefijo Pool2.\n- París: Implementación RDS local con escritorios agrupados. VMs con prefijo Pool3. Se usan discos de perfil de usuario.\n\n**Cambios planificados:**\n- Implementar contenedores de perfiles FSLogix para las oficinas de París.\n- Implementar un grupo de hosts de Azure Virtual Desktop llamado Pool4.\n- Migrar la implementación RDS de Seattle a Azure Virtual Desktop en la región West US.\n\n**Configuración de Pool4:**\n- Tipo: Agrupado | Límite máx. de sesiones: 7 | Equilibrio de carga: Profundidad primero\n- Imagen: Windows 10 Enterprise multi-sesión | Tamaño VM: Standard D2s v3\n- Prefijo de nombre: Pool4 | Número de VMs: 5 | Red virtual: VNET4\n\n**Requisitos técnicos:**\n- Antes de migrar Seattle, obtener la configuración recomendada basada en la utilización actual de RDS.\n- Para Montreal: deshabilitar salida de audio en la configuración de redirección de dispositivos.\n- Para Seattle: almacenar los contenedores de perfiles FSLogix en Azure Storage.\n- Permitir a Operator2 modificar las propiedades RDP de la implementación AVD de Montreal.\n- Desde un servidor llamado Server1, convertir los clics de perfil de usuario a contenedores de perfiles FSLogix.\n- Garantizar que las máquinas virtuales de Pool1 solo estén en ejecución durante el horario laboral.\n- Principio de mínimo privilegio.","question":"Planea implementar los contenedores de perfiles FSLogix para la oficina de Seattle.\n¿Qué cuenta de almacenamiento debería usar?","options":{"A":"storage2","B":"storage4","C":"storage3","D":"storage1"},"answer":"D","scenario_title":"Caso práctico: Contoso, Ltd. (Firma de abogados)"},{"id":327,"type":"mc","scenario":"**Empresa: Contoso, Ltd.** — Firma de abogados con oficina principal en Montreal y sucursales en París y Seattle (recientemente abierta).\nContoso tiene una suscripción de Azure y usa Microsoft 365.\n\n**Active Directory:**\n- Dominio local: contoso.com con tenant de Azure AD. Un controlador de dominio corre como máquina virtual de Azure en VNET1. DNS resuelto por los controladores de dominio.\n- Unidades organizativas (UO): MontrealUsers (sync con Azure AD Connect), ParisUsers (sync con Azure AD Connect), SeattleUsers (NO sincroniza con Azure AD).\n- Usuarios AD: Operator1 (Users, Domain Admins), Operator2 (MontrealUsers, Users), Operator3 (SeattleUsers, Server Operators).\n- Usuarios solo en la nube: Admin1 (Colaborador de máquina virtual), Admin2 (Desktop Virtualization Contributor), Admin3 (Desktop Virtualization Session Host Operator), Admin4 (Desktop Virtualization Host Pool Contributor).\n\n**Red:**\n- Todas las redes virtuales de Azure están emparejadas. La red local se conecta a las redes virtuales.\n- VNET4 fue creada recientemente y está emparejada con las demás redes, pero NO contiene máquinas virtuales de AVD.\n- Todos los servidores ejecutan Windows Server 2019. Los portátiles y equipos de escritorio ejecutan Windows 10 Enterprise.\n- Los usuarios trabajan con documentos confidenciales y usan su equipo como cliente para conectarse a Remote Desktop Services (RDS).\n\n**Cuentas de almacenamiento (West US):**\n- storage1: StorageV2, Estándar | storage2: StorageV2, Premi Requisitos de seguridad:**\n- Permitir explícitamente el tráfico entre los hosts de sesión AVD y Microsoft 365.\n- Permitir explícitamente el tráfico entre los hosts de sesión AVD y la infraestructura AVD.\n- Usar grupos integrados para delegación.\n- Delegar la gestión de grupos de aplicaciones a Admin2 (incluida publicación a usuarios y grupos).\n- Conceder a Admin1 permisos para administrar áreas de trabajo.\n- Minimizar esfuerzo administrativo de seguridad de red. Principio de mínimo privilegio.\n\n**Requisitos de implementación:**\n- Usar PowerShell para generar el token de registro para agregar máquinas virtuales como hosts de sesión.\n- Minimizar tiempo de aprovisionamiento de hosts basado en imágenes personalizadas.\n- Preinstalar agentes y aplicaciones en las imágenes cuando sea posible.\n\n**Requisitos de perfil de usuario:**\n- Almacenar perfiles de Boston en storage1.\n- Replicar perfiles de Boston sincrónicamente entre dos regiones de Azure.\n- Admin1 debe usar un perfil local al iniciar sesión en los hosts de sesión AVD.","question":"Necesita implementar seguridad de red que cumpla los requisitos de seguridad y rendimiento.\n¿Cuáles dos acciones debe realizar? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.","options":{"A":"Implementar dos instancias de Azure Firewall y Azure Firewall Manager.","B":"Filtrar el tráfico usando reglas de salida.","C":"Filtrar el tráfico usando reglas de infraestructura.","D":"Filtrar el tráfico usando reglas de entrada.","E":"Implementar un grupo de seguridad de red (NSG) y dos grupos de seguridad de aplicaciones.","F":"Implementar una instancia de Azure Firewall y Azure Firewall Manager."},"answer":"AE","scenario_title":"Caso práctico: Litware, Inc. (Empresa farmacéutica)"},{"id":329,"type":"mc","scenario":"**Empresa: Litware, Inc.** — Empresa farmacéutica con oficina principal en Boston (EE. UU.) y oficina remota en Chennai (India).\n\n**Entorno de identidad:**\n- Dom rtuales de Azure en los nuevos sitios.","D":"Implementar controladores de dominio de solo lectura (RODC) en máquinas virtuales de Azure en los nuevos sitios.","E":"En cada región de Azure que contenga hosts de sesión AVD, crear un sitio de Active Directory."},"answer":"CE","scenario_title":"Caso práctico: Litware, Inc. (Empresa farmacéutica)"},{"id":333,"type":"mc","question":"Introductory Info Case study This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to\ncomplete each case. However, there may be additional case studies and sections on this exam. You must manage\nyour time to ensure that you are able to complete all questions included on this exam in the time provided.\nTo answer the questions included in a case study, you will need to reference information that is provided in the\ncase study. Case studies might contain exhibits and other resources that provide more information about the\nscenario that is described in the case study. Each question is independent of the other questions in this case study.\nAt the end of this case study, a review screen will appear. This screen allows you to review your answers and to\nmake changes before you move to the next section of the exam. After you begin a new section, you cannot return\nto this section.\nTo start the case study To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore\nthe content of the case study before you answer the questions. Clicking these buttons displays information such\nas business requirements, existing environment, and problem statements. If the case study has an All Information\ntab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you\nare ready to answer a question, click the Question button to return to the question.\nOverview Litware, Inc. is a pharmaceutical company that has a main office in Boston, United States, and a remote office in\nChennai, India.\nExisting Environment. Identity Environment\nThe network contains an local (on-premises) Active Directory domain named litware.com that syncs to an Azure Active\nDirectory (Azure AD) tenant named litware.com.\nThe Azure AD tenant contains the users shown in the following table.\n\nAll users are registered for Azure Autenticación multifactor (MFA).\nExisting Environment. Cloud Services\nLitware has a Microsoft 365 E5 suscripción associated to the Azure AD tenant. All users are assigned Microsoft\n\n365 Enterprise E5 licenses.\nLitware has an Azure suscripción associated to the Azure AD tenant. The suscripción contains the resources\nshown in the following table.\n\nLitware uses custom máquina virtual images and custom scripts to automatically provision Azure máquina virtuals\nand join the máquina virtuals to the local (on-premises)\nActive Directory domain.\nExisting Environment. Network and DNS\nThe offices connect to each other by using a WAN link. Each office connects directly to the internet.\nAll DNS queries for internet hosts are resolved by using DNS servers in the Boston office, which point to root\nservers on the internet. The Chennai office has caching-only DNS servers that forward queries to the DNS servers\nin the Boston office.\nRequirements. Planned Changes Litware plans to implement the following changes:\nDeploy Azure Virtual Desktop environments to the East US Azure region for the users in the Boston office and to\nthe South India Azure region for the users in the Chennai office.\nImplement FSLogix contenedor de perfiless.\nOptimize the custom máquina virtual images for the Azure Virtual Desktop host de sesións.\nUse PowerShell to automate the addition of máquina virtuals to the Azure Virtual Desktop grupo de hostss.\nRequirements. Performance Requirements\nLitware identifies the following performance requirements:\nMinimize network latency of the Windows Virtual Desktop connections from the Boston and Chennai offices.\nMinimize latency of the Windows Virtual Desktop host authentication in each Azure region.\nMinimize how long it takes to sign in to the Windows Virtual Desktop host de sesións.\nRequirements. Authentication Requirements\nLitware identifies the following authentication requirements:\nEnforce Azure MFA when accessing Azure Virtual Desktop apps.\nForce users to reauthenticate if their Azure Virtual Desktop session lasts more than eight hours.\nRequirements. Security Requirements\nLitware identifies the following security requirements:\nExplicitly allow traffic between the Azure Virtual Desktop host de sesións and Microsoft 365.\nExplicitly allow traffic between the Azure Virtual Desktop host de sesións and the Azure Virtual Desktop\ninfrastructure.\nUse built-in groups for delegation.\nDelegate the management of grupo de aplicacioness to Admin2, including the ability to publish grupo de aplicacioness to users and user\ngroups.\nGrant Admin1 permissions to manage área de trabajos, including listing which apps are assigned to the grupo de aplicacioness.\nMinimize administrative effort to manage network security.\nUse the principle of least privilege.\nRequirements. Deployment Requirements\nLitware identifies the following implementación requirements:\nUse PowerShell to generate the token used to add the máquina virtuals as host de sesións to an Azure Virtual\nDesktop grupo de hosts.\nMinimize how long it takes to provision the Azure Virtual Desktop host de sesións based on the custom virtual\nmachine images.\nWhenever possible, preinstall agents and apps in the custom máquina virtual images.\nUser Profile Requirements Litware identifies the following user profile requirements:\nIn storage1, store user profiles for the Boston office users.\nEnsure that the user profiles for the Boston office users replicate synchronously between two Azure regions.\nEnsure that Admin1 uses a local profile only when signing in to the Azure Virtual Desktop host de sesións. Question\nYou need to recommend an authentication solution that meets the performance requirements.\n¿Cuáles dos actions should you include in the recommendation? Cada respuesta correcta presenta parte de la solución.\nNOTE: Each correct selection is worth one point.","options":{"A":"Join all the host de sesións to Azure AD.","B":"In each Azure region that will contain the Azure Virtual Desktop host de sesións, create an Azure Active Directory Domain Service (Azure AD DS) managed domain.","C":"Deploy domain controllers for the local (on-premises) Active Directory domain on Azure máquina virtuals to the new sites..","D":"Deploy read-only domain controllers (RODCs) on Azure máquina virtuals to the new sites.","E":"In each Azure region that will contain the Azure Virtual Desktop host de sesións, create an Active Directory site."},"answer":"CE"},{"id":334,"type":"dragdrop","scenario":"**Empresa: Litware, Inc.** — Empresa farmacéutica con oficina principal en Boston (EE. UU.) y oficina remota en Chennai (India).\n\n**Entorno de identidad:**\n- Dominio de Active Directory local: litware.com, sincronizado con un tenant de Azure Active Directory (Azure AD) llamado litware.com.\n- Admin1: usuario sincronizado con directorio, administrador local en todos los equipos unidos al dominio local.\n- Admin2: usuario solo en la nube, sin roles asignados.\n- CloudAdmin1: usuario solo en la nube, con rol de Administrador global.\n- Todos los usuarios tienen registrada la autenticación multifactor (MFA).\n\n**Servicios en la nube:**\n- Suscripción Microsoft 365 E5. Todos los usuarios tienen licencia M365 Enterprise E5.\n- Suscripción Azure con: storage1 (cuenta de almacenamiento de uso general v1, LRS, Este de EE. UU.), VM1 (máquina virtual, Este de EE. UU., unida al dominio local).\n- Litware usa imágenes personalizadas y scripts para aprovisionar automáticamente máquinas virtuales y unirlas al dominio.\n\n**Red:**\n- Oficinas conectadas entre sí por WAN. Cada oficina se conecta directamente a e red de las conexiones AVD desde Boston y Chennai.\n- Minimizar latencia de autenticación de hosts en cada región de Azure.\n- Minimizar tiempo de inicio de sesión en los hosts de sesión.\n\n**Requisitos de autenticación:**\n- Aplicar MFA de Azure al acceder a las apps de Azure Virtual Desktop.\n- Forzar reautenticación si la sesión dura más de 8 horas.\n\n**Requisitos de seguridad:**\n- Permitir explícitamente el tráfico entre los hosts de sesión AVD y Microsoft 365.\n- Permitir explícitamente el tráfico entre los hosts de sesión AVD y la infraestructura AVD.\n- Usar grupos integrados para delegación.\n- Delegar la gestión de grupos de aplicaciones a Admin2 (incluida publicación a usuarios y grupos).\n- Conceder a Admin1 permisos para administrar áreas de trabajo.\n- Minimizar esfuerzo administrativo de seguridad de red. Principio de mínimo privilegio.\n\n**Requisitos de implementación:**\n- Usar PowerShell para generar el token de registro para agregar máquinas virtuales como hosts de sesión.\n- Minimizar tiempo de aprovisionamiento de hosts basado en imágenes personalizadas.\n- Preinstalar agentes y aplicaciones en las imágenes cuando sea posible.\n\n**Requisitos de perfil de usuario:**\n- Almacenar perfiles de Boston en storage1.\n- Replicar perfiles de Boston sincrónicamente entre dos regiones de Azure.\n- Admin1 debe usar un perfil local al iniciar sesión en los hosts de sesión AVD.","question":"¿Cuáles dos roles debería asignar a Admin2 para cumplir los requisitos de seguridad?\nCada respuesta correcta presenta parte de la solución.","options":{"A":"Desktop Virtualization Host Pool Contributor","B":"Desktop Virtualization Application Group Contributor","C":"Desktop Virtualization Workspace Contributor","D":"Desktop Virtualization Application Group Reader","E":"User Access Administrator"},"answer":"BE","scenario_title":"Caso práctico: Litware, Inc. (Empresa farmacéutica)"},{"id":338,"type":"mc","scenario":"**Empresa: Contoso, Ltd.** — Firma de abogados con oficina principal en Montreal y sucursales en París y Seattle (recientemente abierta).\nContoso tiene una suscripción de Azure y usa Microsoft 365.\n\n**Active Directory:**\n- Dominio local: contoso.com con tenant de Azure AD. Un controlador de dominio corre como máquina virtual de Azure en VNET1. DNS resuelto por los controladores de dominio.\n- Unidades organizativas (UO): MontrealUsers (sync con Azure AD Connect), ParisUsers (sync con Azure AD Connect), SeattleUsers (NO sincroniza con Azure AD).\n- Usuarios AD: Operator1 (Users, Domain Admins), Operator2 (MontrealUsers, Users), Operator3 (SeattleUsers, Server Operators).\n- Usuarios solo en la nube: Admin1 (Colaborador de máquina virtual), Admin2 (Desktop Virtualization Contributor), Admin3 (Desktop Virtualization Session Host Operator), Admin4 (Desktop Virtualization Host Pool Contributor).\n\n**Red:**\n- Todas las redes virtuales de Azure están emparejadas. La red local se conecta a las redes virtuales.\n- VNET4 fue creada recientemente y está emparejada con las demás redes, pero NO contiene máquinas virtuales de AVD.\n- Todos los servidores ejecutan Windows Server 2019. Los portátiles y equipos de escritorio ejecutan Windows 10 Enterprise.\n- Los usuarios trabajan con documentos confidenciales y usan su equipo como cliente para conectarse a Remote Desktop Services (RDS).\n\n**Cuentas de almacenamiento (West US):**\n- storage1: StorageV2, Estándar | storage2: StorageV2, Premium | storage3: BlobStorage, Estándar | storage4: StorageV1, Premium\n\n**Infraestructura RDS existente:**\n- Montreal: Implementación AVD con Windows 10 Enterprise multi-sesión. Pool1, Group1, Workspace1, VMs con prefijo Pool1.\n- Seattle: Implementación RDS local con escritorios personales. VMs con prefijo Pool2.\n- París: Implementación RDS local con escritorios agrupados. VMs con prefijo Pool3. Se usan discos de perfil de usuario.\n\n**Cambios planificados:**\n- Implementar contenedores de perfiles FSLogix para las oficinas de París.\n- Implementar un grupo de hosts de Azure Virtual Desktop llamado Pool4.\n- Migrar la implementación RDS de Seattle a Azure Virtual Desktop en la región West US.\n\n**Configuración de Pool4:**\n- Tipo: Agrupado | Límite máx. de sesiones: 7 | Equilibrio de carga: Profundidad primero\n- Imagen: Windows 10 Enterprise multi-sesión | Tamaño VM: Standard D2s v3\n- Prefijo de nombre: Pool4 | Número de VMs: 5 | Red virtual: VNET4\n\n**Requisitos técnicos:**\n- Antes de migrar Seattle, obtener la configuración recomendada basada en la utilización actual de RDS.\n- Para Montreal: deshabilitar salida de audio en la configuración de redirección de dispositivos.\n- Para Seattle: almacenar los contenedores de perfiles FSLogix en Azure Storage.\n- Permitir a Operator2 modificar las propiedades RDP de la implementación AVD de Montreal.\n- Desde un servidor llamado Server1, convertir los clics de perfil de usuario a contenedores de perfiles FSLogix.\n- Garantizar que las máquinas virtuales de Pool1 solo estén en ejecución durante el horario laboral.\n- Principio de mínimo privilegio.","question":"Necesita configurar los ajustes de redirección de dispositivos. La solución debe cumplir los requisitos técnicos.\n¿Dónde debería configurar los ajustes?","options":{"A":"Workspace1","B":"MontrealUsers","C":"Group1","D":"Pool1"},"answer":"D","scenario_title":"Caso práctico: Contoso, Ltd. (Firma de abogados)"},{"id":339,"type":"mc","question":"Introductory Info Case study This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to\ncomplete each case. However, there may be additional case studies and sections on this exam. You must manage\nyour time to ensure that you are able to complete all questions included on this exam in the time provided.\nTo answer the questions included in a case study, you will need to reference information that is provided in the\ncase study. Case studies might contain exhibits and other resources that provide more information about the\nscenario that is described in the case study. Each question is independent of the other questions in this case study.\nAt the end of this case study, a review screen will appear. This screen allows you to review your answers and to\nmake changes before you move to the next section of the exam. After you begin a new section, you cannot return\nto this section.\nTo start the case study To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore\nthe content of the case study before you answer the questions. Clicking these buttons displays information such\nas business requirements, existing environment, and problem statements. If the case study has an All Information\ntab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you\nare ready to answer a question, click the Question button to return to the question.\nOverview Contoso, Ltd. is a law firm that has a main office in Montreal and branch offices in Paris and Seattle. The Seattle\nbranch office opened recently.\nContoso has an Azure suscripción and uses Microsoft 365.\nExisting Infrastructure. Active Directory\nThe network contains an local (on-premises) Active Directory domain named contoso.com and an Azure Active Directory\n(Azure AD) tenant. One of the domain controllers runs as an Azure máquina virtual and connects to a virtual\nnetwork named VNET1. All internal name resolution is provided by DNS server that run on the domain controllers.\nThe local (on-premises) Active Directory domain contains the organizational units (OUs) shown in the following table.\n\nThe local (on-premises) Active Directory domain contains the users shown in the following table.\n\nThe Azure AD tenant contains the solo en la nube users shown in the following table.\n\nExisting Infrastructure. Network Infrastructure\nAll the Azure red virtuals are peered. The local (on-premises) network connects to the red virtuals.\nA red virtual named VNET4 was recently created are peered to the other red virtuals. VNET4 does NOT\ncontain any AVD máquina virtuals.\nAll servers run Windows Server 2019. All laptops and desktop computers run Windows 10 Enterprise.\nSince users often work on confidential documents, all the users use their computer as a client for connecting to\nEscritorio remoto Services (RDS).\nIn the West US Azure region, you have the cuenta de almacenamientos shown in the following table.\n\nExisting Infrastructure. Escritorio remoto Infrastructure\nContoso has a Escritorio remoto infrastructure shown in the following table.\n\nRequirements. Planned Changes Contoso plans to implement the following changes:\nImplement FSLogix contenedor de perfiless for the Paris offices.\nDeploy an Azure Virtual Desktop grupo de hosts named Pool4.\nMigrate the RDS implementación in the Seattle office to Azure Virtual Desktop in the West US Azure region.\nRequirements. Pool4 Configuration\nPool4 will have the following settings:\nHost pool type: Pooled\nMax session limit: 7\n\nEquilibrio de carga algorithm: Profundidad primero\nImages: Windows 10 Enterprise multi-session\nVirtual machine size: Standard D2s v3\nName prefix: Pool4\nNumber of VMs: 5\nVirtual network: VNET4\nRequirements. Technical Requirements\nContoso identifies the following technical requirements:\nBefore migrating the RDS implementación in the Seattle office, obtain the recommended implementación configuration\nbased on the current RDS utilization.\nFor the Azure Virtual Desktop implementación in the Montreal office, disable audio output in the device redirection\nsettings.\nFor the Azure Virtual Desktop implementación in the Seattle office, store the FSLogix contenedor de perfiless in Azure\nStorage.\nEnable Operator2 to modify the RDP Properties of the Azure Virtual Desktop implementación in the Montreal office.\nFrom a server named Server1, convert the user profile clicks to the FSLogix contenedor de perfiless.\nEnsure that the Pool1 máquina virtuals only run during business hours.\nUse the principle of least privilege. Question ¿Cuáles tres PowerShell modules should you install on Server1 to\nmeet the technical requirements? Cada respuesta correcta presenta parte de la solución.\nNOTE: Each correct selection is worth one point.","options":{"A":"Pester","B":"RemoteDesktop","C":"ServerManager","D":"ActiveDirectory","E":"Hyper-V"},"answer":"ADE"},{"id":340,"type":"mc","scenario":"**Empresa: Contoso, Ltd.** — Firma de abogados con oficina principal en Montreal y sucursales en París y Seattle (recientemente abierta).\nContoso tiene una suscripción de Azure y usa Microsoft 365.\n\n**Active Directory:**\n- Dominio local: contoso.com con tenant de Azure AD. Un controlador de dominio corre como máquina virtual de Azure en VNET1. DNS resuelto por los controladores de dominio.\n- Unidades organizativas (UO): MontrealUsers (sync con Azure AD Connect), ParisUsers (sync con Azure AD Connect), SeattleUsers (NO sincroniza con Azure AD).\n- Usuarios AD: Operator1 (Users, Domain Admins), Operator2 (MontrealUsers, Users), Operator3 (SeattleUsers, Server Operators).\n- Usuarios solo en la nube: Admin1 (Colaborador de máquina virtual), Admin2 (Desktop Virtualization Contributor), Admin3 (Desktop Virtualization Session Host Operator), Admin4 (Desktop Virtualization Host Pool Contributor).\n\n**Red:**\n- Todas las redes virtuales de Azure están emparejadas. La red local se conecta a las redes virtuales.\n- VNET4 fue creada recientemente y está emparejada con las demás redes, pero NO contiene máquinas virtuales de AVD.\n- Todos los servidores ejecutan Windows Server 2019. Los portátiles y equipos de escritorio ejecutan Windows 10 Enterprise.\n- Los usuarios trabajan con documentos confidenciales y usan su equipo como cliente para conectarse a Remote Desktop Services (RDS).\n\n**Cuentas de almacenamiento (West US):**\n- storage1: StorageV2, Estándar | storage2: StorageV2, Premium | storage3: Blo let state = {
  screen:'welcome', mode:'exam',
  examCount: 0, // 0 = todas
  questions:[], current:0,
  answers:{}, flags:new Set(), revealed:new Set(), startTime:null
};

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(){
  let pool=shuffle(ALL_QUESTIONS);
  if(state.mode==='exam' && state.examCount>0){
    pool=pool.slice(0,state.examCount);
  }
  state.questions=pool;
  state.current=0; state.answers={}; state.flags=new Set(); state.revealed=new Set();
  state.startTime=Date.now(); state.screen='quiz'; render();
}

function getCorrectAnswer(q){
  if(q.type==='mc')return q.answer;
  if(q.type==='hotspot')return q.subquestions.map(s=>s.answer);
  if(q.type==='dragdrop')return q.answer;
}

function checkAnswer(q,ua){
  if(!ua)return false;
  if(q.type==='mc'){
    const ca=q.answer||''; const uca=String(ua||'');
    // Multi-answer (e.g. "AE", "CE", "BD")
    if(ca.length>1 && /^[A-F]+$/.test(ca)){
      const caSet=new Set(ca.split(''));
      const uaSet=new Set(uca.split('').filter(c=>/[A-F]/.test(c)));
      return caSet.size===uaSet.size && [...caSet].every(c=>uaSet.has(c));
    }
    return uca===ca;
  }
  if(q.type==='hotspot'){
    if(!Array.isArray(ua))return false;
    return q.subquestions.every((s,i)=>ua[i]===s.answer);
  }
  if(q.type==='dragdrop'){
    if(!Array.isArray(ua))return false;
    return JSON.stringify(ua)===JSON.stringify(q.answer);
  }
  return false;
}

function render(){
  const app=document.getElementById('app');
  if(state.screen==='welcome'){app.innerHTML=renderWelcome();bindWelcome();return;}
  if(state.screen==='score'){app.innerHTML=renderScore();bindScore();return;}
  app.innerHTML=renderQuiz();bindQuiz();
}

    if(cs) cs.classList.toggle('count-selector-hidden', m==='study');
  };
  window.selectCount=function(n){
    state.examCount=n;
    document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('count-active'));
    document.getElementById('count-'+n).classList.add('count-active');
  };
}

  const q=state.questions[state.current];

  return`<div class="header">

    <div style="display:flex;align-items:center;gap:7px">

    </div>
  </div>
</div>
<div class="main">

      let cls='';
      if(i===state.current)cls='current';
      else if(isAns)cls=isCorrect?'correct':'wrong';
      else if(isFlagged)cls='flagged';
      if(isCS)cls+=' casestudy';
      return`<div class="q-dot ${cls}" onclick="goTo(${i})" title="Q${qq.id}">${i+1}</div>`;
    }).join('')}</div>
